# =============================================================================
# RECOMMENDATION
# =============================================================================
recommendation:
  chosen: A3_turboquant_2block
  reasoning: |
    A3 is the Pareto-dominant option. It inherits A2's physical simplicity
    (2 blocks, one Wishbone slave, one clock domain, ~92 tests) while adopting
    a bleeding-edge 2026 algorithm that makes the silicon genuinely novel.

    Three structural facts make this work:
      1. TurboQuant decode requires NO multipliers. The expensive dequant
         multiplier fabric in A2 (~32 × 16b multipliers) is replaced with a
         64-byte ROM and a butterfly network of adders. Net area is LOWER
         than A2's current design, plus the forward Hadamard network.
      2. The Walsh-Hadamard substitution for QR-decomposed rotation is
         validated by Block-Rotation-for-MXFP4 [C-12] (Nov 2025) — rotations
         equivalent under the concentration argument that makes TurboQuant work.
      3. Every block in A3 is verifiable by one person in under 4 weeks (the
         rule from PRD-v1-prudent.md §1). This rule is preserved.

    The 2026-frontier story matters. A2 as a tape-out in 2028 would land as
    "open-source INT4 on 130nm" — correct but dated. A3 lands as "first silicon
    implementation of TurboQuant" — a defensible first in an active research
    area, publishable at DAC/ICCAD/MICRO beyond the student-workshop tier.

  guardrails:
    - Keep INT4 as a silicon fallback mode. If TurboQuant post-silicon
      characterization is disappointing, the chip still demonstrates rotated
      INT4 (mode 1) and baseline INT4 (mode 2). The paper narrative has a
      branch for every outcome.
    - Start the Python Lloyd-Max golden model in June 2026, one month before
      Phase 0 formally starts. The codebook values must be bit-exact in the
      ROM, and this is the single largest verification risk.
    - Freeze codebook offline. No online k-means, no online codebook updates,
      no learned parameters. Data-obliviousness [C-01] is a feature, not a
      limitation — it means the hardware is a pure transform.
    - Hadamard scaling factor handling — apply the 1/sqrt(32) exactly once, at
      dequant, absorbed into the optional magnitude word. Never mid-pipeline.
      Document in every file.
    - Do NOT add Stretches A/B/C from PRD-v1-prudent.md onto A3. Those stretch
      blocks were designed for the A2 chip. If A3 completes early, the stretch
      should be a QJL 1-bit residual stage from TurboQuant [C-01], not the
      token importance unit.

  if_not_chosen:
    A2_fallback:
      condition: If TurboQuant golden model fails to produce bit-exact output
        by September 2026 OR team is smaller than 4 people
      action: Revert to A2 prudent baseline. Same physical shell, just simpler
        KV Cache Engine. No physical redesign needed.
    A1_not_recommended:
      condition: Under no circumstance unless the team expands to 7+ people
        with dedicated verification bandwidth
      reason: Verification load is ~2x the calendar time available

  next_concrete_steps:
    - 1_write_A3_prd: >
        Draft PRD-v2-turboquant.md using PRD-v1-prudent.md as skeleton. Replace
        §4 (KV Cache Engine) with the TurboQuant/Hadamard/Lloyd-Max block
        specification. Keep §5 (SRAM Buffer Controller) unchanged. Add a
        §4.5 codebook specification file (Python + ROM init).
    - 2_validate_golden_model: >
        Before committing to A3, implement TurboQuant in Python and verify
        against the [C-01] numerical results on a reference dataset (e.g.,
        WikiText-2 KV dumps from Llama-2-7B). Target: reproduce the 3.5-bit
        quality-neutrality claim within 10% tolerance.
    - 3_walsh_hadamard_spice: >
        Simulate a 32-point Walsh-Hadamard butterfly at 130nm in SPICE (or
        gate-level with SKY130 liberty). Verify the 5-stage depth fits in
        <8 ns. This is the single timing risk; everything else is adders,
        comparators, and LUT reads.
    - 4_codebook_format_spec: >
        Write a short spec for the Lloyd-Max codebook ROM: 8 centroids × 16-bit,
        checked-in as a Python dataclass, auto-synthesized into a Verilog
        initial block for the ROM. This is the bit-exact contract between
        golden model and hardware.

# =============================================================================
# CITATIONS — every [C-xx] reference used above
# =============================================================================
citations:
  C-01:
    title: "TurboQuant: Online Vector Quantization with Near-optimal Distortion Rate"
    authors: [Zandieh Amir, Daliri Majid, Hadian Majid, Mirrokni Vahab]
    venue: ICLR 2026
    arxiv: "2504.19874"
    year: 2025
    published_html: https://arxiv.org/abs/2504.19874
    notes: >
      Primary reference. Proves near-optimal rate-distortion for MSE and inner-
      product metrics. Uses random QR-decomposed orthogonal rotation followed by
      per-coordinate Lloyd-Max scalar quantization. 3.5-bit neutrality, 2.5-bit
      marginal degradation. 6x KV memory reduction, 8x speedup on H100.
      No silicon implementation reported as of April 2026.
  C-02:
    title: "PolarQuant: Quantizing KV Caches with Polar Transformation"
    authors: [Han Insu, et al.]
    venue: NeurIPS 2025
    arxiv: "2502.02617"
    year: 2025
    notes: >
      Different algorithm from C-01 despite similar naming. Uses actual polar
      coordinates (magnitude + angles) with trig reconstruction. 3.875 bits/coord
      effective, 4.2x compression. Rejected for 130nm due to sin/cos/sqrt cost.
  C-03:
    title: "Titanus: Enabling KV Cache Pruning and Quantization On-the-Fly for LLM Acceleration"
    venue: GLSVLSI 2025
    notes: >
      Cascade pruning + quantization co-design. 159.9x energy efficiency over
      A100 (simulated). Closest architectural analog to A1. Referenced in
      design-rationale.md §17.
  C-04:
    title: "GEAR: An Efficient KV Cache Compression Recipe for Near-Lossless Generative Inference of LLM"
    arxiv: "2403.05527"
    year: 2024
    notes: >
      Shows simple quantization gets most of the compression benefit. Used as
      perplexity baseline for INT4 uniform (algorithms.int4_uniform).
  C-05:
    title: "RotateKV: Accurate and Robust 2-bit KV Cache Quantization for LLMs via Outlier-Aware Adaptive Rotations"
    venue: AAAI 2025
    notes: >
      Validates that Hadamard rotation + INT2/INT4 is near-lossless.
      Source for PPL delta numbers in algorithms.hadamard_int4 and algorithms.int2_uniform.
  C-06:
    title: "QuaRot: Outlier-Free 4-Bit Inference in Rotated LLMs"
    authors: [Ashkboos Saleh, et al.]
    venue: OpenReview dfqsW38v1X
    year: 2024
    notes: >
      4-rotation architecture (R1-R4). Hadamard transform as rotation primitive.
      7% overhead at software level; validates low-overhead of rotation in HW.
  C-07:
    title: "SpinQuant: LLM Quantization with Learned Rotations"
    arxiv: "2405.16406"
    year: 2024
    notes: >
      Learned (not random) rotations. For our purposes, validates that the
      rotation-plus-quantization paradigm is general; we use fixed Hadamard.
  C-08:
    title: "Optimizing Inference for Long Context and Large Batch Sizes with NVFP4 KV Cache"
    publisher: NVIDIA Developer Blog
    year: 2026
    notes: >
      NVFP4 KV cache on Blackwell. Tensor-core native. <1% accuracy loss at
      50% KV memory reduction vs FP8. Blackwell-only hardware acceleration.
  C-09:
    title: "KVQuant: Towards 10 Million Context Length LLM Inference with KV Cache Quantization"
    venue: NeurIPS 2024
    url: https://www.stat.berkeley.edu/~mmahoney/pubs/neurips-2024-kvquant.pdf
    notes: >
      Sub-4-bit quantization with sensitivity-aware mixed precision. Algorithm
      complexity beyond A3 scope but referenced as frontier.
  C-10:
    title: "Oaken: Fast and Efficient LLM Serving with Online-Offline Hybrid KV Cache Quantization"
    venue: ISCA 2025
    arxiv: "2503.18599"
    year: 2025
    notes: >
      ISCA 2025 silicon KV cache accelerator. 1.79x throughput over GPU baseline,
      0.87% accuracy loss, 8.21% area overhead, 70% bitwidth reduction. Uses
      outlier-threshold INT4, not rotation+codebook — so A3 is architecturally
      distinct despite being in the same family of "hardware KV cache quantizers".
  C-11:
    title: "HadaCore: Tensor Core Accelerated Hadamard Transform Kernel"
    publisher: PyTorch Blog
    year: 2025
    notes: >
      Industrial-grade Hadamard kernel on Hopper. Demonstrates Hadamard as a
      production primitive. Not directly comparable to 130nm ASIC Hadamard but
      validates the operation's practicality.
  C-12:
    title: "Block Rotation is All You Need for MXFP4 Quantization"
    arxiv: "2511.04214"
    year: 2025
    notes: >
      Nov 2025. Shows block-diagonal and Walsh-Hadamard rotations achieve
      equivalent or better accuracy than global Gaussian rotations. Critical
      support for A3's substitution of Walsh-Hadamard for QR-decomposed random
      rotation in TurboQuant [C-01]. Also quantifies rotation latency overhead
      at 40% reduction with block-wise scheme.
  C-13:
    title: "LASSO Design Rationale"
    local_path: design-rationale.md
    notes: >
      Internal document establishing 130nm density rules, SRAM assumptions,
      and rejection rationale for FP4 / PolarQuant-proper / MoE / hardwired
      model architectures.

# =============================================================================
# OPEN QUESTIONS — things this document does not resolve
# =============================================================================
open_questions:
  - id: Q-01
    question: >
      Is a per-dimension-group codebook (separate Lloyd-Max centroids for
      different subsets of the rotated vector) better than a single shared
      codebook?
    status: research_to_validate_in_golden_model
    impact: Affects ROM size (64 bytes shared vs 4-16 KB per-group). Shared is
      almost certainly fine post-Hadamard; confirm empirically.
  - id: Q-02
    question: >
      Should the Walsh-Hadamard be fully unrolled combinational (5 add-levels
      deep, ~8 ns at 130nm) or pipelined across 2-3 cycles to enable 100 MHz?
    status: physical_design_iteration_decision
    impact: Affects critical path and pipeline stage count, not correctness.
  - id: Q-03
    question: >
      What is the right group size — 32 (matches current KV Cache Engine
      design) or 128 (matches typical attention head dim and reduces storage
      overhead)?
    status: architecture_decision_pending
    impact: Larger groups = less scale/magnitude overhead but larger Hadamard
      network (128-point WHT = 7 stages × 64 ops = 448 add/sub per stage).
      Recommend starting at 32 for parity with existing design.
  - id: Q-04
    question: >
      Is the QJL 1-bit residual stage from TurboQuant worth implementing as a
      stretch goal? Adds ~0.05 mm² and ~10 tests.
    status: defer_to_post_baseline_stretch_window
    impact: Would let us claim full TurboQuant (both stages) rather than just
      the first stage. Moderate publication upside, small feasibility cost.
  - id: Q-05
    question: >
      How is the codebook parametrized for bits_per_element != 3? At 2 bits,
      the codebook has 4 centroids; at 4 bits, 16. Do we support multiple
      modes with multiple ROMs?
    status: CSR_configurable_multi_codebook_design
    impact: Trivial in area (~256 extra bytes of ROM); nontrivial in
      verification (adds mode coverage).

# =============================================================================
# WHAT THIS DOCUMENT DELIBERATELY DOES NOT CONTAIN
# =============================================================================
excluded:
  - FP4 / MXFP4 / NVFP4 in any mode — rejected at 130nm [see design-rationale.md]
  - PolarQuant-proper — rejected [C-02], requires trig hardware
  - Hardware page table in A3 — scope control
  - DMA engine in A3 — scope control
  - Attention compute in A3 — scope control
  - Token importance scoring in hardware for A3 — scope control
  - Analog / mixed-signal / SRAM sense-amp customization
  - Floating-point datapaths of any width
