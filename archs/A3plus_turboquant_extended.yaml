# ============================================================================
# A3⁺ — 2-block TurboQuant extended with QJL + FP4 mode + compressed-domain Q·K
# ============================================================================
# Same physical shell as A3 (two blocks + SRAM) but the KV Cache Engine is
# extended with three cheap-but-novel additions:
#   (1) Full two-stage TurboQuant (codebook + QJL 1-bit residual) per [C-01]
#   (2) FP4 codebook mode (NVFP4 E2M1 levels) selectable via CSR
#   (3) Compressed-domain Q·K inner product exploiting Hadamard orthogonality
#
# Net result: same 2-block physical shell, same timeline risk, richer paper.
# This is the Pareto sweet spot for a 2-block tape-out.
# ============================================================================

id: A3plus
name: TurboQuant LASSO — 2-block extended
tier: ambitious
status: proposed_sweet_spot
one_line_summary: >
  2-block A3 extended with full two-stage TurboQuant (QJL residual),
  CSR-selectable NVFP4 codebook mode, and compressed-domain inner-product
  computation. Same physical envelope, materially stronger research claims.

depends_on:
  shared:
    process: _shared/process.yaml
    citations: _shared/citations.yaml
    evaluation: _shared/evaluation_axes.yaml
    shared_risks: _shared/shared_risks.yaml
    algorithms: _shared/algorithms.yaml
  algorithm_ids:
    primary: turboquant
    extended: turboquant_qjl
    alternative_codebook: fp4_e2m1_as_codebook
    fallback_modes: [hadamard_int4, int4_uniform]
  inherits_from: A3_turboquant_minimal.yaml

# ----------------------------------------------------------------------------
# Research narrative
# ----------------------------------------------------------------------------
research_narrative:
  paper_title_candidate: >
    Single-Die Multi-Mode KV Cache Quantization — Silicon Comparison of
    TurboQuant, NVFP4, and Rotated INT4 on Open-Source SKY130
  novelty_strength: 10
  comparable_prior_art: [C-01, C-08, C-10]
  differentiation: >
    Four distinct, defensible silicon firsts that none of A1/A2/A3 alone
    can claim:
      (a) First silicon implementation of FULL TurboQuant (both stages).
      (b) First silicon running TurboQuant, NVFP4, and rotated INT4 with
          CSR-selectable mode — direct apples-to-apples comparison on the
          same die with the same test vectors.
      (c) First demonstration of compressed-domain inner products via
          Hadamard orthogonality — Q·K computed without dequantizing the
          stored key.
      (d) First zero-multiplier KV cache dequantization path.
  additional_novelty_hooks:
    - >
      "CSR-selectable codebook ROM: a single 1-bit register selects between
      Lloyd-Max optimal (TurboQuant) and NVFP4 E2M1 fixed codebooks. Hardware
      difference: one 16-byte mux."
    - >
      "QJL residual stage adds unbiased inner-product estimation at 1 extra
      bit per coordinate. Hardware: 32 sign-flips + XOR reduction. No
      multipliers."
    - >
      "Compressed-domain Q·K exploits <Hq, Hk> = <q, k>: host rotates query
      once per attention step, then scores computed directly from codebook
      indices via table lookup into a precomputed ⟨H_q, codebook_value⟩ LUT."

# ----------------------------------------------------------------------------
# Hardware blocks
# ----------------------------------------------------------------------------
blocks:

  - id: kv_cache_engine_turboquant_extended
    function: >
      Inherits from kv_cache_engine_turboquant (A3). Adds: (a) QJL 1-bit
      residual stage (sign projection + XOR reduction), (b) second 16-byte
      codebook ROM for FP4 E2M1 with 1-bit mode mux, (c) 32-wide
      compressed-domain dot product ⟨q_rotated, codebook[k_index]⟩.
    area_mm2: 0.22
    verification_tests: 118
    risk: medium
    area_breakdown_mm2:
      walsh_hadamard_network: 0.012
      nearest_centroid_comparators: 0.018
      codebook_rom_turboquant: 0.001
      codebook_rom_fp4: 0.001
      codebook_mode_mux: 0.0005
      bit_pack_unpack_3bit: 0.006
      bit_pack_unpack_qjl_1bit: 0.003
      qjl_projection_xor: 0.004
      compressed_domain_dot_product: 0.060   # 32 × 16b multiply + adder tree
      int4_fallback_datapath: 0.035
      pipeline_registers_control: 0.080

  - id: sram_buffer_controller
    function: >
      Wishbone B4 slave, address decode, bank arbitration, CSR file with
      extended mode bits (codebook select, QJL enable, compressed-domain
      enable), mode select, interrupt.
    area_mm2: 0.03                # +0.01 over A3 for extra CSRs and mode logic
    verification_tests: 25
    risk: low

  - id: sram_subsystem
    function: 4-8 banks of CF_SRAM_16384x32
    area_mm2: 3.50_to_7.00
    verification_tests: 5
    risk: low

# ----------------------------------------------------------------------------
# Resource summary (baseline: 6 banks)
# ----------------------------------------------------------------------------
resource_summary:
  logic_area_mm2: 0.25
  sram_area_mm2: 5.25
  physical_overhead_mm2: 1.60
  total_mm2_4bank: 5.35
  total_mm2_6bank: 7.10
  total_mm2_8bank: 8.85
  caravel_user_area_mm2: 10.28
  headroom_6bank_mm2: 3.18
  headroom_8bank_mm2: 1.43

# ============================================================================
# DESIGN SPACE — A3⁺ adds new knobs on top of A3's
# ============================================================================
design_space:

  # Knobs inherited from A3
  sram_bank_count:
    inherits_from: A3_turboquant_minimal.yaml.design_space.sram_bank_count
    default: 6
  hadamard_size:
    inherits_from: A3_turboquant_minimal.yaml.design_space.hadamard_size
    default: 32
  codebook_sharing:
    inherits_from: A3_turboquant_minimal.yaml.design_space.codebook_sharing
    default: single_shared
  magnitude_preservation:
    inherits_from: A3_turboquant_minimal.yaml.design_space.magnitude_preservation
    default: per_group_l2_norm
  hadamard_pipelining_depth:
    inherits_from: A3_turboquant_minimal.yaml.design_space.hadamard_pipelining_depth
    default: combinational_5_stage

  # A3⁺ additional knobs
  qjl_residual_stage:
    type: bool
    values: [true, false]
    default: true
    trade_offs:
      true:
        area_mm2: +0.007
        verification_tests: +10
        storage_overhead_bits_per_group_of_32: +32
        quality_improvement: unbiased inner-product estimator per [C-01] §5
        research_claim: "first silicon FULL TurboQuant (both stages)"
      false:
        area_mm2: 0
        verification_tests: 0
        quality: "first-stage only; biased estimator"
    recommendation: true
    rationale: >
      Cheap in area (~0.007 mm², ~3% of logic) and tests (+10). The research
      claim upgrade from "first silicon TurboQuant stage 1" to "first silicon
      FULL TurboQuant" is material.

  alternate_codebook_modes:
    type: enum_set
    values: [turboquant_lloyd_max, fp4_e2m1, int3_uniform]
    default: [turboquant_lloyd_max, fp4_e2m1]
    trade_offs:
      single_mode_turboquant_only:
        rom_bytes: 16
        verification_tests: 0 (baseline)
        research_value: "first silicon TurboQuant"
      with_fp4_e2m1:
        rom_bytes: 32        # +16 for FP4 ROM
        mode_mux: +0.0005 mm²
        verification_tests: +5
        research_value: >
          first silicon TurboQuant-vs-NVFP4 apples-to-apples comparison on
          the same die with same test vectors
      with_all_three:
        rom_bytes: 48
        verification_tests: +10
        research_value: >
          adds unrotated INT3 as baseline; minor additional value over just
          TurboQuant+FP4
    recommendation: [turboquant_lloyd_max, fp4_e2m1]
    rationale: >
      Adding FP4 codebook is almost free (16 bytes ROM, one 1-bit mux, 5
      tests). The comparison story is disproportionately valuable: you can
      run the same vectors through TurboQuant and NVFP4 on the same silicon
      and report a head-to-head. Currently no published paper can do this.

  compressed_domain_dot_product:
    type: bool
    values: [true, false]
    default: true
    trade_offs:
      true:
        area_mm2: +0.060 (32 × 16-bit multiply + adder tree)
        verification_tests: +15
        throughput_advantage: "skips dequant on scoring path"
        research_claim: >
          first silicon compressed-domain attention scoring exploiting
          Hadamard orthogonality <Hq, Hk> = <q, k>
        mathematical_basis: >
          For orthogonal H: <q, k> = <Hq, Hk>. Host rotates q once per
          attention step. Then for each stored key, <Hq, codebook[k_index]>
          is a LUT into precomputed inner-products between rotated query
          and each of the 8 codebook centroids. Per-lane: 32 LUT reads
          (3 bits → 16 bits) + 32 multiplies (optional; can be avoided with
          precomputed <Hq, c> per-centroid). Fully compressed-domain.
        implementation_options:
          simple:
            description: LUT-based <Hq, c_i> plus sum
            area_mm2: +0.02
            precomputation_cost: "8 inner products per query, done on host"
          standalone_dot_product_unit:
            description: 32 × 16-bit multiply + adder tree separately
            area_mm2: +0.060
            precomputation_cost: 0
      false:
        area_mm2: 0
        verification_tests: 0
    recommendation: true_simple_lut_form
    recommendation_detail: >
      Implement the LUT-based variant: per-query host precomputes 8 inner
      products <Hq, c_i> for the 8 codebook centroids (cheap on host).
      Hardware per stored key: 32 × 3-bit index reads + 32 × 16-bit LUT
      reads + adder tree. No multipliers on the scoring path. Area ~0.02 mm².
    rationale: >
      LUT form is cheaper in area (+0.02 vs +0.06), same throughput, and
      cleaner research story ("inner products computed via table lookup").
      Standalone multiplier array would be wasteful given the LUT trick.

  outlier_detection_lane:
    type: bool
    values: [true, false]
    default: false
    trade_offs:
      true:
        area_mm2: +0.02
        verification_tests: +10
        quality_improvement: ~0.1 PPL on outlier-heavy layers
        research_value: nod to Oaken [C-10] style outlier handling
      false:
        area_mm2: 0
    recommendation: false
    rationale: >
      After Hadamard rotation, outliers are smeared across all coordinates.
      Outlier detection logic has less value when rotation has already
      flattened the distribution. Defer to v2.

  fallback_mode_support:
    inherits_from: A3_turboquant_minimal.yaml.design_space.fallback_mode_support
    default: [hadamard_int4, int4_uniform, bypass]

# ----------------------------------------------------------------------------
# Capabilities
# ----------------------------------------------------------------------------
capabilities:
  on_chip_kv_tokens_6bank_turboquant_3bit: 1575
  on_chip_kv_tokens_6bank_turboquant_qjl_4_5bit: 1228
  on_chip_kv_tokens_6bank_nvfp4_mode: 1228   # 4 b/elem + scale
  on_chip_kv_tokens_6bank_hadamard_int4: 1228
  on_chip_kv_tokens_6bank_bypass_fp16: 384
  on_chip_dot_product: partial   # compressed-domain only, in the KV engine
  on_chip_eviction: false
  on_chip_dma: false
  on_chip_page_table: false
  host_can_precompute_query_rotations: true   # enables compressed-domain mode
  host_responsibilities:
    - codebook_precomputation_offline
    - per_query_hadamard_rotation_and_centroid_inner_products
    - token_importance_scoring_decision (hw scores, host decides)
    - eviction_decisions
    - address_table_management
    - off_chip_dma_via_wishbone
    - softmax_mlp_everything_after_attention_scores

# ----------------------------------------------------------------------------
# Verification
# ----------------------------------------------------------------------------
verification:
  tests_estimate: 148
  person_months_estimate: 22
  breakdown:
    kv_cache_engine_extended: 118
    sram_buffer_controller: 25
    sram_subsystem: 5
  increment_over_A3:
    qjl_residual: +10
    fp4_codebook_mode: +5
    compressed_domain_dot_product: +15
    extended_CSRs_and_mode_logic: +6
    integration_tests: +10
    csr_coverage: +10
  golden_model_dependency:
    path: to_be_created
    description: >
      Python reference for (a) Lloyd-Max codebook, (b) FP4 codebook,
      (c) QJL 1-bit residual projection, (d) compressed-domain Q·K via LUT.
      All four produce bit-exact outputs compared to hardware.

# ----------------------------------------------------------------------------
# Fit scoring
# ----------------------------------------------------------------------------
fit_scoring:
  tapeout_feasibility: 8
  functional_correctness_confidence: 8
  research_novelty: 10
  compression_ratio: 9
  quality_preservation: 9
  area_efficiency: 8
  scalability_to_new_node: 10
  default_weighted_total: 8.85

# ----------------------------------------------------------------------------
# A3⁺-specific risks
# ----------------------------------------------------------------------------
risks:
  - id: R-A3P-01
    severity: medium
    category: verification_burden
    description: 148 tests is approaching A1's 125 — verification load is real
    mitigation: >
      The compressed-domain Q·K simple-LUT variant cuts 10+ tests vs the
      standalone-multiplier variant. Prioritize that implementation.
  - id: R-A3P-02
    severity: medium
    category: research_claim_scope
    description: Compressed-domain Q·K mathematical claim must hold for all codebooks
    mitigation: >
      The <Hq, Hk> = <q, k> property holds for ANY orthogonal H. Walsh-
      Hadamard is orthogonal (up to the 1/sqrt(32) normalization). Property
      is bulletproof as long as normalization is consistent. Document
      carefully in golden model.
  - id: R-A3P-03
    severity: medium
    category: multi_mode_coverage
    description: Mode combinations (TurboQuant × QJL × compressed-domain × FP4) create coverage combinatorics
    mitigation: >
      Test each mode INDEPENDENTLY first (bit-exact vs golden). Only test a
      small representative subset of mode combinations, not the full cross
      product. Document which combinations are supported.
  - id: R-A3P-04
    severity: low
    category: host_software
    description: Compressed-domain mode requires host to compute Hadamard of query
    mitigation: >
      Provide reference C/Python implementation in the golden-model repo.
      Walsh-Hadamard of 32 elements is ~160 add/sub on the host CPU —
      trivial.

# ----------------------------------------------------------------------------
# Open questions
# ----------------------------------------------------------------------------
open_questions:
  - id: Q-A3P-01
    question: >
      Compressed-domain Q·K: LUT form (cheap) vs standalone multiplier array (flexible)?
    status: architecture_decision_pending
    impact: ~0.04 mm² area, ~5 verification tests
    recommendation: lut_form
    deadline: 2026-06

  - id: Q-A3P-02
    question: >
      Should QJL stage be CSR-maskable so it can be disabled per operating
      mode (e.g., off in FP4 mode)?
    impact: trivial
    recommendation: yes_csr_maskable

  - id: Q-A3P-03
    question: >
      NVFP4 block size (16 per [C-08]) or MXFP4 block size (32)?
    status: defer_to_characterization
    impact: storage format only; hardware is agnostic
    recommendation: mxfp4_block_32_for_parity_with_group_size

# ----------------------------------------------------------------------------
# Critical decisions
# ----------------------------------------------------------------------------
critical_decisions:
  - id: D-A3P-01
    decision: Compressed-domain Q·K implementation style
    options: [lut_form_cheap, standalone_multiplier_array]
    recommendation: lut_form_cheap
    deadline: 2026-06
    rationale: >
      LUT form saves 0.04 mm² and 5 tests. No throughput loss. Cleaner
      research story (inner products via precomputed-LUT is elegant).

  - id: D-A3P-02
    decision: FP4 block size (NVFP4-16 vs MXFP4-32)
    options: [block_16, block_32]
    recommendation: block_32
    deadline: 2026-05
    rationale: >
      Match group_size default of 32. Hardware is agnostic; storage format
      adjustment only. MXFP4 is also broader industry standard.

  - id: D-A3P-03
    decision: QJL residual stage in silicon
    options: [include, omit]
    recommendation: include
    deadline: 2026-05
    rationale: >
      ~0.007 mm², ~10 tests. Upgrades research claim from "first silicon
      TurboQuant stage 1" to "first silicon FULL TurboQuant". Worth it.

  - id: D-A3P-04
    decision: Inherit all A3 critical decisions
    reference: A3_turboquant_minimal.yaml.critical_decisions
