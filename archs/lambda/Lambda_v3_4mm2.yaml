# =============================================================================
# Lambda v3 — All-SRAM Tiny-LLM Accelerator (4 mm² die)
# =============================================================================
# 2×2 mm tier. THE THIRD ARCHITECTURE CANDIDATE alongside v1 (coprocessor)
# and v2 (LPDDR-backed standalone). v3's defining choice: NO OFF-CHIP MEMORY
# AT ALL. The entire model lives in on-die SRAM.
#
# v1 = KV/attention coprocessor; host runs the model (no LPDDR, no PHY)
# v2 = standalone with LPDDR5X x16 PHY; runs 3-5B-class models off-chip
# v3 = standalone all-SRAM; runs 2-10M-parameter models entirely on-die
#
# What you give up:
#   - Model class drops from 3-5B (v2) to 2-10M (v3) — 1000× smaller
#   - The "real LLM" pitch goes away
# What you gain:
#   - No LPDDR PHY (1.0-1.2 mm² of die freed up for SRAM)
#   - No PHY licensing cost ($80-130K saved)
#   - No mixed-signal IP integration risk (LPDDR PHY is the team's biggest)
#   - Dramatically lower power (~0.5-1.5 W vs v2's 2.5-3.1 W)
#   - Always-on / battery / fanless deployment trivially feasible
#   - Faster decode (no bandwidth bottleneck — SRAM is essentially infinite BW)
# What it serves:
#   - Wake-word + voice-intent detection (always-on edge AI)
#   - TinyStories-class generative models (8-30M params from Microsoft research)
#   - Distilled-BERT classifiers (4-10M params)
#   - Domain-specific tiny instruction-tuned models
#   - Embedded LLM in IoT / robotics / wearables
#
# Companion files:
#   Lambda_v1_4mm2.yaml          — coprocessor alternative (host-paired)
#   Lambda_v2_4mm2.yaml          — LPDDR-backed standalone for 3-5B models
#   Lambda_v2_dataflow_walkthrough.md — block-by-block teaching doc (v2; v3
#                                       inherits MatE/VecU/KCE/MSC/LSU/HIF
#                                       structure with sizing reductions)
# =============================================================================

metadata:
  project: Longhorn Silicon
  chip_codename: Lambda
  arch_id: Lambda_v3
  arch_name: Lambda v3 — all-SRAM tiny-LLM accelerator at 4 mm²
  document: archs/lambda/Lambda_v3_4mm2.yaml
  version: 0.1-draft
  created: 2026-04-27
  author: Longhorn Silicon Architecture Team
  classification: CONFIDENTIAL — Internal Use Only
  tier: tiny_model_4mm2
  status: candidate_third_alternative
  one_line_summary: >
    Standalone 4 mm² ASIC running 2-10M-parameter transformers ENTIRELY on-die
    in ~2.5 MB SRAM. No LPDDR PHY, no off-chip memory, ~0.5-1.5 W power. Targets
    always-on edge LLM (wake-word, voice intent, TinyStories-class generators).
  companions:
    - archs/lambda/Lambda_v1_4mm2.yaml
    - archs/lambda/Lambda_v2_4mm2.yaml
    - archs/lambda/Lambda_v2_dataflow_walkthrough.md
    - STATUS.md

# =============================================================================
# DEFINITIVE FEATURE + BLOCK LIST
# =============================================================================
definitive_features_and_blocks:

  what_v3_is_in_one_sentence: |
    A standalone open-source 4 mm² transformer-decoder ASIC at TSMC N16FFC
    that runs 2-10M-parameter models (TinyStories-class, distilled BERTs,
    voice-intent classifiers) entirely on-die in ~2.5 MB SRAM, with NO LPDDR,
    NO off-chip memory, in a 0.5-1.5 W envelope — making always-on / battery /
    fanless edge LLM deployment trivially feasible.

  the_defining_architectural_choice: |
    NO LPDDR PHY. Drop the entire 1.0-1.2 mm² LPDDR5X x16 PHY block. Replace
    that area with SRAM. Everything the chip needs for inference — weights,
    KV cache, activations, codebooks — lives on-die. No mixed-signal IP, no
    PHY licensing, no off-chip bus integration risk.

    The trade is model class: SRAM at 16nm 1-port HD ≈ 1.25 MB/mm²; 4 mm² of
    die holds at most ~3 MB of SRAM after compute + I/O ring. At INT4 weights,
    that's 6M parameters max; at TurboQuant W3 (0.375 bytes/param), 8M; at
    INT2 with rotation, 12M.

  hardware_blocks:
    - id: MatE_mini
      name: Matrix Engine (mini) — 4×4 INT8×INT4 systolic
      function: All GEMMs (Q/K/V proj, attn output, FFN up/down, logits) at tiny scale
      pe_count: 16
      pe_op: INT8 × INT4 → INT16 accumulator
      peak_ops_per_cycle: 32                                   # 16 PEs × 2 (MAC)
      peak_gops_at_1ghz: 32                                    # 0.032 TOPS
      area_mm2: 0.04
      sizing_rationale: |
        v3's compute floor is set by tiny-model decode, not bandwidth. For 8M
        params at 100 tok/s: 8M × 2 × 100 = 1.6 GOPS. 16 PEs at 1 GHz = 32 GOPS
        peak — 20× headroom. We could clock at 100 MHz and still hit 200 tok/s.
        Smaller MatE (e.g. 2×2 = 4 PEs) is also feasible; chose 4×4 to keep
        microarch identical to v2 for design reuse.

    - id: VecU_mini
      name: Vector Unit (mini) — 4-lane SIMD
      function: Online softmax, RoPE, RMSNorm, SiLU/GELU, residual add, sampling
      lanes: 4                                                 # half v2's 8 lanes
      lane_bit_width: 16
      microcode_capacity: 512_instructions
      transcendental_luts: [exp_64entry, rsqrt_64entry, sigmoid_64entry]
      area_mm2: 0.07

    - id: KCE_mini
      name: KV Compression Engine — TurboQuant 16-pt Hadamard
      function: |
        Same as v2's KCE. Carries forward the TurboQuant research story even
        though v3's KV is small enough that compression is optional. Including
        it triples KV scratchpad capacity (FP16 → 3-bit) at zero extra die cost
        worth mentioning.
      hadamard_dim: 16
      codebook_centroids: 8
      compression_ratio_vs_fp16: 3.0
      area_mm2: 0.08
      kept_for_research_continuity: true

    - id: MSC_mini
      name: Memory Subsystem Controller (mini)
      function: |
        SRAM crossbar + tiny block table. NO LPDDR controller (no LPDDR exists).
        NO DMA descriptor engine (no off-chip transfers). Just internal SRAM
        routing and a small KV page table.
      sram_crossbar_ports: 4                                   # MatE / VecU / KCE / host
      block_table_entries: 64                                  # 16 tokens/block × 64 = 1K-token KV pages
      lpddr_controllers: 0                                     # ★ THE HEADLINE ★
      hw_features:
        - simple_internal_routing
        - on_demand_kv_decompress (KCE inverse path)
      explicitly_NOT_present:
        - lpddr_controller
        - dma_descriptor_engine
        - prefetch_unit
        - phy_calibration_state_machine
      area_mm2: 0.08

    - id: LSU_tiny
      name: Layer Sequencer (tiny)
      function: |
        Walks the pre-compiled tiny-model schedule. For an 8M-parameter
        TinyStories-class model with 8 layers, the full schedule is ~500 LSU
        instructions — fits comfortably in 2 KB microcode.
      isa: 32-bit fixed-width, 32 instructions
      registers_general_purpose: 16x32b
      microcode_capacity: 2k_instructions                      # smaller than v2's 4K
      area_mm2: 0.08

    - id: HIF
      name: Host Interface — USB-C 2.0 endpoint
      function: |
        Boot-load the tiny model (1.5-2 MB takes ~30 ms over USB 2.0); receive
        prompts; stream tokens. Boot-once-per-power-on; tokens flow at minimal
        bandwidth. JTAG + scan chain for debug.
      protocol: USB-C 2.0 (480 Mbps)
      doorbell_queue_depth: 16
      area_mm2: 0.30
      power_w: 0.05                                            # USB 2.0 is low-power

    - id: on_chip_sram
      name: On-chip SRAM — 2.5 MB total (the whole point)
      banks:
        - id: weight_bank
          size_mb: 2.0
          purpose: |
            ★ THE WHOLE MODEL LIVES HERE ★
            Holds the tiny transformer's weights, quantized at TurboQuant 3-bit
            or INT4. At 2 MB capacity:
              - INT4 (0.5 bpp):     4M params max
              - TurboQuant W3 (0.375 bpp):  5.3M params max
              - W2-with-rotation (0.25 bpp):  8M params max
            Read by MatE on every layer dispatch; written ONCE at boot from host.
          ports: 1                                             # boot-write + steady-read
          read_bandwidth_gbs: 256                              # at 1 GHz, 256-byte access
        - id: kv_scratchpad
          size_mb: 0.3
          purpose: |
            Compressed KV staging. At TurboQuant 3-bit + 8 KV heads × 64 dim,
            holds ~670 single-layer tokens (TinyStories-8M layout) or ~330 with
            16-head models. Generous on-die KV — long-context isn't usually a
            tiny-model use case.
          ports: 1
        - id: activation_buffer
          size_mb: 0.15
          purpose: FlashAttention working set + per-token QKV scratch + MLP intermediates
          ports: 2
        - id: codebook_const_rom
          size_kb: 32                                          # half v2's 64 KB; tiny model needs less
          purpose: TurboQuant centroids + RoPE freqs + transcendental LUTs
          ports: 1
      total_size_mb: 2.45
      total_area_mm2: 2.20                                     # 2.45 / 1.25 × 1.10 overhead

  area_summary_mm2:
    matE_4x4: 0.04
    vecU_4_lane: 0.07
    kce_mini: 0.08
    msc_mini: 0.08
    lsu_tiny: 0.08
    hif_usbc: 0.30
    sram_2_5mb: 2.20
    clock_power_routing: 0.30                                  # smaller than v2 because simpler chip
    io_ring_pads_esd: 0.76
    routing_buffer: 0.10
    total: 4.01
    headroom_mm2: -0.01
    die_utilization_pct: ~100
    note: |
      Marginally over budget; first shrink path (drop activation buffer to 0.10 MB
      saves ~0.05 mm²) yields 3.96 mm² with comfortable headroom.

  power_summary_w:
    decode_at_1ghz: ~1.5                                       # peak performance mode
    decode_at_200mhz: ~0.5                                     # interactive mode (still 200+ tok/s)
    decode_at_50mhz: ~0.25                                     # always-on / wake-word mode (50+ tok/s)
    deep_idle_clock_gated: ~0.5                                # leakage only (16nm 4 mm²)
    fanless_envelope: very_comfortable
    battery_envelope: feasible_with_aggressive_clock_gating

  performance_summary:
    target_models:
      "TinyStories-1M":   { params: 1_000_000,  decode_tok_per_sec: 5000_at_1ghz, verdict: trivially_fast }
      "TinyStories-8M":   { params: 8_000_000,  decode_tok_per_sec: 600_at_1ghz,  verdict: still_overkill }
      "TinyStories-28M":  { params: 28_000_000, decode_tok_per_sec: ~170,         verdict: doesnt_fit_on_die }
      "DistilBERT-mini":  { params: ~4_000_000,  decode_tok_per_sec: 1500,         verdict: fits }
      "voice_intent_4M":  { params: 4_000_000,  decode_tok_per_sec: 1500,         verdict: ideal_for_use_case }
    decode_regime: compute_bound (no bandwidth wall — SRAM is on-die)
    prefill_regime: also_compute_bound (small model, large array)
    interactive_clock: 200 MHz delivers 100+ tok/s on 8M model — drops power 5×

  features_supported:
    weight_quantization:
      - INT4 per-channel groupwise (W4 primary)
      - TurboQuant W3 (3-bit weights with Hadamard rotation)
      - W2 with rotation (for largest possible model fit)
      - INT8 fallback for accuracy-critical layers
    activation_quantization:
      - INT8 per-token dynamic
      - FP16 fallback (only at v3's tiny scale is FP16 affordable)
    kv_quantization_modes:
      - TurboQuant 3-bit + 16-pt Hadamard (primary)
      - Hadamard-INT4
      - bypass FP16 (since KV is small, FP16 KV is fine here)
    attention_variants_supported:
      - vanilla MHA
      - GQA / MQA
      - FlashAttention-3 (overkill at this scale; included for hardware reuse)
    serving_features_in_hardware:
      - boot_time_model_load (host writes 2 MB into weight_bank over USB-C; ~30 ms)
      - single_session_streaming_decode
      - clock_gating + per-block power gating (for always-on use)
    explicitly_NOT_supported_in_v3:
      - external memory of any kind
      - models > ~10M parameters
      - continuous batching
      - multi-session
      - host-DRAM eviction (no PCIe)

# =============================================================================
# FEASIBILITY AUDIT
# =============================================================================
feasibility_audit:
  question: "Can 4 mm² hold a STANDALONE TINY transformer accelerator with NO off-chip memory at 16nm?"
  answer: "Yes. Drop LPDDR PHY (1.0-1.2 mm²), replace with SRAM. Largest model class: 4-10M params depending on quantization."

  fixed_cost_floor_at_4mm2:
    items:
      - id: io_ring_pads_esd
        area_mm2: 0.76
        basis: same as v1 and v2 — 100 µm × perimeter
      - id: clock_tree_power_grid_routing_overhead
        area_mm2: 0.30
        basis: |
          Smaller than v2's 0.40 because: (a) no PHY clock domain to bridge,
          (b) simpler chip means less inter-block routing, (c) DVFS-friendly
          power grid is simpler than v2's heterogeneous power requirements.
      - id: minimal_host_serial_iface
        area_mm2: 0.30
        basis: USB-C 2.0 — same as v1 and v2
      - id: subtotal_fixed_cost
        area_mm2: 1.36
        notes: 34% of die for unavoidable infra (vs v2's 65% with the LPDDR PHY)

  what_fits_after_floor:
    available_budget_mm2: 2.64                                 # vs v2's 1.34
    proposed_allocation:
      - block: matrix_engine_4x4
        area_mm2: 0.04
        basis: 16 PEs × ~600 µm²/PE × 1.4 overhead ≈ 0.04 mm²; 32 GOPS at 1 GHz
      - block: vector_unit_4_lane
        area_mm2: 0.07
        basis: 4 lanes × 16-bit + LUT bank; half of v2's 8-lane
      - block: kv_compression_engine_mini
        area_mm2: 0.08
        basis: same 16-pt Hadamard + Lloyd-Max as v2; carries TurboQuant story
      - block: memory_subsystem_controller_mini
        area_mm2: 0.08
        basis: 4-port SRAM crossbar + 64-entry block table; no LPDDR controller
      - block: layer_sequencer_tiny
        area_mm2: 0.08
        basis: 2K microcode (vs v2's 4K); tiny model = shorter schedule
      - block: SRAM_total_2_5mb
        area_mm2: 2.20
        basis: |
          2.5 MB at 1.25 MB/mm² + 10% compiler overhead = 2.20 mm²
          The big bet of this architecture. Allocates almost half the die to
          weight + KV + activation memory. Where v2 has a PHY, v3 has SRAM.
    total_compute_and_memory_mm2: 2.55
    headroom_mm2: 0.09
    verdict: comfortable_at_baseline

# =============================================================================
# PROCESS — same as v1/v2; reference-only
# =============================================================================
process:
  inherits_from_doc: archs/lambda/Lambda_v2_4mm2.yaml#/process
  notes: |
    Same TSMC N16FFC, 28.2 MTr/mm², 1.25 MB/mm² HD 1-port SRAM, 0.8 V core,
    1 GHz target with aggressive clock-down option for power-sensitive modes.
    Same IMEC / Europractice mini@sic 2.0 shuttle path; no PHY IP licensing
    needed.

# =============================================================================
# TARGET WORKLOAD
# =============================================================================
target_workload:
  primary_model_class:
    name: 2-10M-parameter dense decoder transformer
    examples:
      - "TinyStories-1M"   # 1M params, 4 layers, 1 head, 64 dim
      - "TinyStories-8M"   # 8M params, 8 layers, 16 heads, 64 dim — primary candidate
      - "TinyStories-3M"   # 3M params, 6 layers, 8 heads, 64 dim
      - "DistilBERT-mini"  # ~4M params; classifier
      - "Custom_voice_intent" # 4-8M params for voice-command intent classification
      - "Domain_specific_tiny_LLM" # 4-10M params for bounded-domain assistants
    parameters: 2M_to_10M
    weight_bits_target: 3                                      # TurboQuant W3 primary
    weight_bytes_total_w3_8M: 3_000_000                        # 8M × 0.375 bytes/param = 3 MB → tight in 2 MB
    weight_bytes_total_w3_5M: 1_900_000                        # 5M model fits comfortably
    activation_bits: 8
    head_dim_typical: 64
    n_heads_kv_typical: 1_to_16
    n_layers_typical: 4_to_12

  context_length_targets:
    baseline_tokens: 256
    stretch_tokens: 1024
    stretch_with_kv_streaming: 4096                            # only if KV scratchpad sized aggressively

  serving_regime:
    primary: single_user_streaming_inference
    operating_modes:
      - always_on_wake_word: clock at 50 MHz, ~0.25 W average, ~50 tok/s when active
      - voice_intent_classify: clock at 200 MHz, ~0.5 W, ~200 tok/s
      - generative_chat: clock at 1 GHz, ~1.5 W peak, ~1000 tok/s for 8M model
    deliberately_excluded:
      - any model > ~10M parameters
      - multi-session
      - long-context (>1K) without streaming tricks
      - continuous batching
      - real LLM workloads (use v2 or larger chips for those)

  why_this_workload: |
    The 2-10M parameter class is genuinely deployable for narrow tasks:
    - Wake-word detection ("Hey Bevo" — 100s of trained phrases)
    - Voice command intent ("turn on lights", "play music", ~50 commands)
    - TinyStories-class generative writing (publishable academic result)
    - Edge classifiers (sentiment, topic, simple routing)
    - Always-on voice interfaces in fanless / battery devices

    These are NOT competitive with cloud LLMs on quality. They are
    competitive on POWER (≤1 W vs ≥5 W for any cloud-paired alternative)
    and LATENCY (zero network round-trip).

# =============================================================================
# MEMORY HIERARCHY
# =============================================================================
memory_hierarchy:

  off_chip_dram: NONE                                          # ★ THE WHOLE POINT ★

  on_chip_sram:
    total_target_mb: 2.5
    organization: weight_dominant_partition
    banks:
      - id: weight_bank
        size_mb: 2.0
        purpose: |
          Holds the entire model. Written ONCE at boot from host (~30 ms over
          USB-C 2.0 for 2 MB). Read steady-state by MatE for every GEMM.
          Single-port (writes happen once, then reads forever).
        bandwidth_gb_s_at_1ghz: 256
        latency_cycles: 1
        port_count: 1
      - id: kv_scratchpad
        size_mb: 0.3
        purpose: |
          Compressed KV. At TurboQuant 3.5b with 8 KV × 64 dim × 8 layers:
            per-token all-layer KV = 8 × 64 × 2 × 3.5/8 × 8 = 3,584 bytes
            0.3 MB / 3,584 = 86 all-layer tokens fits
          Or per-layer: 0.3 MB / 448 bytes = 670 single-layer tokens.
          Plenty for tiny-model decode contexts.
        port_count: 1
      - id: activation_buffer
        size_mb: 0.15
        purpose: FlashAttention working set + per-token QKV scratch
        port_count: 2
      - id: codebook_const_rom
        size_kb: 32
        purpose: TurboQuant centroids + small RoPE table + transcendental LUTs (smaller than v2)
        port_count: 1
    total_sram_area_mm2: 2.20

  bandwidth_to_host:
    interface: USB-C 2.0
    sustained_bandwidth_gb_s: 0.06                             # 480 Mbps = 60 MB/s
    notes: |
      Boot loads model (~2 MB / 60 MB/s = 33 ms one-time). Tokens are <1 KB
      each — at 100 tok/s = 100 KB/s, far below USB 2.0's capacity.

  bandwidth_internal:
    weight_read_steady_state: 256 GB/s (on-die SRAM)
    sram_to_compute: ~256 GB/s aggregate across crossbar
    notes: |
      No bandwidth wall. v3 is 100% compute-bound, not memory-bound.
      This is a structurally different regime from v2.

# =============================================================================
# QUANTIZATION STRATEGY
# =============================================================================
quantization_strategy:
  weights:
    primary: turboquant_w3_with_hadamard
    primary_basis: |
      W3 (3-bit weights) with TurboQuant rotation enables 5.3M params per MB
      vs INT4's 2M/MB. Critical for fitting useful model classes in 2 MB.
      RotateKV/QuaRot/TurboQuant literature confirms W3 quality is recoverable
      with rotation for narrow-task models.
    secondary: int4_per_channel                                # standard W4 fallback
    aggressive: w2_with_rotation                               # for max model fit (8M in 2 MB)
  activations:
    primary: int8_per_token_dynamic
    secondary: fp16                                            # only at this tiny scale is FP16 affordable
  kv_cache:
    primary: turboquant_3bit_16pt_hadamard
    secondary: bypass_fp16                                     # KV is small enough that FP16 is fine
  attention_compute:
    primary: int8_q_x_int8_pv_with_fp16_softmax_accum

# =============================================================================
# PERFORMANCE TARGETS
# =============================================================================
performance_targets:

  decode_throughput_table:
    derivation_basis: |
      Compute-bound regime: tok/s = MatE_GOPS × 0.6 util / (params × 2 ops/param)
      MatE 4×4 at 1 GHz = 32 GOPS peak; 19.2 GOPS sustained at 60% util
    targets:
      - model: TinyStories-1M
        params: 1_000_000
        compute_per_tok_gops: 0.002
        tok_per_sec_at_1ghz: 9600
        tok_per_sec_at_200mhz: 1920
        verdict: trivially_overkill
      - model: TinyStories-3M
        params: 3_000_000
        compute_per_tok_gops: 0.006
        tok_per_sec_at_1ghz: 3200
        verdict: trivially_overkill
      - model: TinyStories-8M
        params: 8_000_000
        compute_per_tok_gops: 0.016
        tok_per_sec_at_1ghz: 1200
        tok_per_sec_at_200mhz: 240
        tok_per_sec_at_50mhz: 60
        verdict: ★_primary_demo_target
      - model: hypothetical_4M_intent_classifier
        params: 4_000_000
        compute_per_tok_gops: 0.008
        tok_per_sec_at_50mhz_always_on: 120
        verdict: ideal_for_voice_use_case
      - model: 10M_max_ceiling
        params: 10_000_000
        compute_per_tok_gops: 0.020
        tok_per_sec_at_1ghz: 960
        verdict: at_weight_capacity_ceiling

  largest_reasonable_model:
    by_weight_capacity:
      at_w4: 4_000_000                                         # 2 MB / 0.5 bpp
      at_w3_turboquant: 5_300_000                              # 2 MB / 0.375 bpp ← practical sweet spot
      at_w2_with_rotation: 8_000_000                           # 2 MB / 0.25 bpp
      at_w1_extreme: 16_000_000                                # 2 MB / 0.125 bpp — quality risk high
    by_compute: |
      Compute is essentially never the bottleneck at this scale. Bandwidth
      to weight_bank is on-die at ~256 GB/s — vastly faster than any model
      v3 can hold. Decode rate is gated only by clock frequency.

  prefill_latency:
    notes: |
      With on-die weights and a small array, prefill is fast even for 1K-prompt
      tiny-model use. 1K prompt × 8M model × 2 ops = 16 GOPS. At 19 GOPS
      sustained = 0.85 sec for full 1K prefill. Comfortable for any UX.

  power_budget:
    target_modes:
      always_on_50mhz:
        watts: 0.25
        use_case: wake-word + intent classification; 50+ tok/s when active
        leakage_dominant: true
      interactive_200mhz:
        watts: 0.50
        use_case: voice/text response in real time; 200+ tok/s
      peak_1ghz:
        watts: 1.50
        use_case: max throughput batch decoding; 1000+ tok/s
      deep_idle_clock_gated:
        watts: 0.50
        notes: leakage-only (16nm 0.8V 4 mm² typical)
    sources:
      - LPDDR-free design eliminates ~0.7 W of PHY+DRAM power vs v2
      - Smaller compute fabric (4×4 vs 8×8 MatE, 4-lane vs 8-lane VecU) ~0.3 W less
      - Static SRAM access at low duty <0.2 W (vs v2's 0.16 W)
    verdict: |
      ★ FANLESS / BATTERY / ENERGY-HARVESTING DEPLOYMENT FEASIBLE ★
      AAA-battery operation: 2500 mAh × 1.5 V = 3.75 Wh. At 0.25 W average,
      runs ~15 hours continuously. At 0.05 W deep-idle (typical always-on
      duty), runs months on a coin cell.

  energy_per_token:
    at_8M_model_200mhz: ~2_mJ_per_token                        # 0.5 W × 4 ms/tok at 240 tok/s
    comparable_baselines:
      x86_cpu_8M_inference: ~50_to_100_mj_per_token            # 30-50 W × 1.5 ms/tok
      mobile_npu_8M: ~1_to_3_mj_per_token                      # estimated proprietary
    notes: |
      v3 is 25-50× better than CPU for tiny-model inference. Comparable to
      proprietary mobile NPUs at this scale. The pitch is open-source +
      deeply integrable (not "fastest" — "smallest, lowest-power, open").

  peak_compute_int8w4_tops: 0.032

# =============================================================================
# VERIFICATION
# =============================================================================
verification:
  total_tests_estimated: 200
  breakdown_by_block:
    matE_4x4: 35                                               # smaller systolic = fewer corner cases
    vecU_4_lane: 20
    kce_mini: 60                                               # mostly LASSO inheritance
    msc_mini: 30                                               # MUCH smaller than v2's 90 (no LPDDR controller)
    lsu_tiny: 25
    hif_usbc: 25
    sram_array: 5                                              # foundry compiler; integration only
  reuse_from_v2: ~70%                                          # most blocks are scaled-down v2
  effective_new_tests: ~80
  estimated_person_months: ~12_to_15
  notes: |
    ★ HALF the verification load of v2. ★ The biggest reduction comes from
    eliminating LPDDR controller verification (~30 tests gone) and tightening
    every block to its minimum size. The shorter test calendar makes v3 the
    fastest-to-silicon Lambda variant by ~3-4 months.

# =============================================================================
# COST
# =============================================================================
cost_analysis:
  shuttle_cost_estimate_usd: 60_000_to_100_000
  shuttle_cost_basis: |
    IMEC / Europractice mini@sic 2.0 academic-discount Full Block at TSMC 16nm.
    Same minimum block as v1 / v2.
  ip_licensing_cost_estimate_usd: 0_to_30_000
  ip_licensing_basis: |
    NO LPDDR PHY license needed (~$80-130K saved vs v2). USB 2.0 controller
    typically free or minimal. Total IP licensing ~$0-30K.
  total_chip_cost_usd: 60_000_to_130_000
  vs_v2: ~50%_of_v2_total_cost
  vs_v1: comparable_to_v1

# =============================================================================
# COMPARISON TO v1 / v2
# =============================================================================
prior_art_comparison:

  vs_lambda_v1:
    v1_role: KV/attention coprocessor — host runs the model
    v3_role: standalone tiny-model accelerator — runs the model end-to-end
    differentiator: |
      v1 needs a host CPU and a software stack to demo. v3 is fully self-
      contained — plug into USB-C, send prompt, get tokens. No software
      integration burden.

  vs_lambda_v2:
    v2_target: 3-5B-class models with LPDDR5X x16
    v3_target: 2-10M-class models entirely on-die
    differentiator: |
      v2 trades chip area for model class; v3 trades model class for chip
      simplicity. Same 4 mm² die, same shuttle cost, but v3 has no mixed-
      signal IP, no PHY licensing, half the verification load, sub-watt power.
      v3 ships months earlier with much lower silicon risk.

  vs_apple_neural_engine_tiny:
    ane_workload: small on-device classifiers (proprietary, integrated SoC)
    v3_workload: same workload class, open-source, standalone die
    differentiator: |
      v3 is the first OPEN-SOURCE academic standalone tiny-LLM ASIC. ANE
      is closed proprietary IP integrated into M-series SoC. Different
      deployment story (standalone vs integrated) but same workload regime.

  vs_groq_lpu:
    groq_strategy: 230 MB SRAM per die, no DRAM, scale-out across hundreds of dies
    v3_strategy: 2.5 MB SRAM per die, no DRAM, single-die only
    differentiator: |
      v3 IS Groq strategy at academic-shuttle scale — 1/100th the SRAM,
      1/100th the model class. Same architectural insight ("on-die memory
      beats off-die at any cost"), single-die instantiation.

# =============================================================================
# RISKS
# =============================================================================
risks:

  - id: R-Lv3-01
    severity: high
    description: 2-10M parameter model class may not be useful enough for sponsor / paper interest
    evidence: |
      Most contemporary "edge LLM" announcements target 1B+ class (Llama-3.2-1B,
      Phi-3.5-mini). Sub-100M models are typically classifiers, not generators.
      The TinyStories paper from MSR is a real research artifact but not
      something most sponsors would fund silicon for.
    mitigation: |
      Position v3 explicitly as the "always-on / battery / fanless"
      deployment niche, NOT as a competitor to v2's 3-5B target. Pair with
      a specific demo: voice wake-word + intent classification, 0.25 W avg,
      runs months on a coin cell. That's a real product story even if the
      model is tiny.

  - id: R-Lv3-02
    severity: medium
    description: SRAM density estimate (1.25 MB/mm²) load-bearing in a SRAM-dominated chip
    evidence: |
      In v3, SRAM is 55% of die area. If foundry compiler delivers only 1.0 MB/mm²
      (the conservative estimate), total SRAM drops from 2.5 to 2.0 MB — and
      max model class drops from ~10M to ~8M.
    mitigation: |
      Confirm SRAM density from TSMC Memory Compiler datasheet before locking
      die dimensions. If 1.0 MB/mm², shrink other blocks (drop activation
      buffer to 0.10 MB) to recover capacity.

  - id: R-Lv3-03
    severity: medium
    description: W3 / W2 quantization quality on tiny models is less studied
    evidence: |
      Most low-bit quantization research targets >1B models. Tiny models
      (1-10M) often have less redundancy and may quantize worse. RotateKV
      / TurboQuant claim quality preservation generalizes but tiny-model
      data is thin.
    mitigation: |
      Python golden-model evaluation against TinyStories-8M at W4, W3, W2.
      If W3 doesn't hold quality, fall back to W4 with 4M-param ceiling.

  - id: R-Lv3-04
    severity: low
    description: USB-C 2.0 boot-load time may be UX-limiting
    evidence: |
      2 MB at 60 MB/s = 33 ms boot. Acceptable for one-time-per-power-on.
      But if the chip is power-cycled often (battery save), accumulated
      boot time becomes a UX issue.
    mitigation: |
      Consider USB-C 3.2 (faster, larger PHY) OR a small flash-ROM bootloader
      that loads weights from on-package flash (adds packaging complexity).
      v0.2 decision deferred.

  - id: R-Lv3-05
    severity: low
    description: No off-chip memory means no model swapping at runtime
    evidence: |
      User wants to switch from voice-intent model to text-summary model →
      must power-cycle and reboot with new model. No "load model on demand."
    mitigation: |
      Acceptable for the always-on / fixed-task use case. Not acceptable for
      multi-purpose deployment. Position v3 explicitly as single-task chip.

# =============================================================================
# RECOMMENDATION
# =============================================================================
recommendation:
  status: PROPOSED_THIRD_ALTERNATIVE
  one_line: |
    Choose Lambda v3 if (a) the team wants the lowest-risk, fastest-to-silicon
    path, (b) the demo story can be "always-on tiny-LLM ASIC at <1 W standalone,"
    or (c) v2's LPDDR PHY risk is unacceptable.

  when_to_choose_v3:
    - Software engineering for v1's host stack is unstaffed AND v2's LPDDR PHY risk feels too high
    - Faculty/sponsor interest is in always-on edge AI, IoT, robotics, voice
    - Team wants the lowest verification load (~12 PM vs v2's ~28 PM)
    - Earliest possible silicon return is the priority
    - Customer demo wants "look, it runs entirely on a coin cell"

  when_to_NOT_choose_v3:
    - Customer wedge requires "real LLM" capability (3B+); v3 is 1000× too small
    - Research story needs to compete with H100 / mobile NPU on real workloads
    - Sponsors specifically want LPDDR-class memory bandwidth in the demo

  why_proceed: |
    v3 is the LOWEST-RISK Lambda variant. No mixed-signal IP. No off-chip
    integration. Half the verification load of v2. Could ship silicon in
    Q4 2027 instead of Q1 2028. Genuine standalone demo capability with
    no software stack required to run.

    The model class IS small. But the academic-research story ("first open-
    source standalone always-on tiny-LLM ASIC") is real, and the deployment
    story (always-on / battery / fanless) is a market gap that mobile NPUs
    only address via integrated SoCs.

  next_concrete_steps:
    - 1_decide_v1_v2_v3: explicit choice between three architectures
    - 2_quote_imec_4mm2: same as v1/v2; no additional vendor work for v3
    - 3_pick_demo_model: TinyStories-8M vs custom voice-intent-4M vs DistilBERT-mini
    - 4_python_golden_model: evaluate W3/W2 quantization quality on chosen model
    - 5_define_use_case: wake-word + intent? generative chat? domain assistant?

# =============================================================================
# OPEN QUESTIONS
# =============================================================================
open_questions:
  - id: Q-Lv3-01
    question: Is W3 TurboQuant quality acceptable on TinyStories-8M? Falls back to W4 (4M ceiling) if not.
    status: needs_python_golden_model_eval
  - id: Q-Lv3-02
    question: USB-C 2.0 sufficient for 33 ms boot, OR add USB 3.2 for 1 ms boot at +0.2 mm² area cost?
    status: deferred_to_use_case_decision
  - id: Q-Lv3-03
    question: Should KCE be dropped entirely (KV at FP16 fits in 0.6 MB) to save 0.08 mm²?
    status: keep_kce_for_research_continuity_unless_area_audit_forces_drop
  - id: Q-Lv3-04
    question: Should v3 use the SAME RTL as v2 with parameterized smaller dimensions, or a fork?
    status: shared_RTL_with_param_overrides_recommended
    impact: ~70% RTL reuse; saves 6+ person-months of separate development
  - id: Q-Lv3-05
    question: Add hardware power-gating for compute fabric during always-on idle?
    status: yes_for_v0_2_design

