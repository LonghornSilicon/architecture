shared_risks:
  - id: R-SH-01
    severity: critical
    description: Efabless chipIgnite shuttle schedule slip
    applies_to: [A1, A2, A3]
    mitigation: Track chipIgnite dates quarterly; Tiny Tapeout as backup vehicle
  - id: R-SH-02
    severity: high
    description: CF_SRAM_16384x32 macro fails timing or DRC in OpenLane
    applies_to: [A1, A2, A3]
    mitigation: Standalone OpenLane validation in Phase 0 (Summer 2026)
  - id: R-SH-03
    severity: high
