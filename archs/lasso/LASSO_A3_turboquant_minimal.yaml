# ============================================================================
# A3 — 2-block TurboQuant (minimal)
# ============================================================================
# Same physical shell as A2 but the KV Cache Engine implements TurboQuant
# [C-01]: Walsh-Hadamard rotation + Lloyd-Max codebook LUT + inverse
# Hadamard. No QJL residual stage, no FP4 comparison mode, no
# compressed-domain operations. Ships plain TurboQuant as the sole primary
# algorithm, with Hadamard-INT4 and INT4 kept as fallback modes for safety.
# ============================================================================

id: A3
name: TurboQuant LASSO — 2-block minimal
tier: ambitious
status: candidate
one_line_summary: >
  First silicon implementation of TurboQuant's rotation-plus-codebook
  paradigm, in a 2-block chip that verifies like A2 but ships a 2026-
  frontier algorithm.

depends_on:
  shared:
    process: _shared/process.yaml
    citations: _shared/citations.yaml
    evaluation: _shared/evaluation_axes.yaml
    shared_risks: _shared/shared_risks.yaml
    algorithms: _shared/algorithms.yaml
  algorithm_ids:
    primary: turboquant
    fallback_modes: [hadamard_int4, int4_uniform]
  companion: ../../archs.yaml (master comparison)

# ----------------------------------------------------------------------------
# Research narrative
# ----------------------------------------------------------------------------
research_narrative:
  paper_title_candidate: >
    First Silicon Implementation of TurboQuant — Rotation-and-Codebook
    KV Cache Compression on Open-Source SKY130
  novelty_strength: 9
  comparable_prior_art: [C-01, C-10]
  differentiation: >
    TurboQuant [C-01] was published at ICLR 2026 with CUDA kernels targeting
    H100 tensor cores. No silicon implementation exists as of April 2026.
    Oaken [C-10] is the closest silicon prior art but uses outlier-threshold
    INT4, not rotation-plus-codebook. This chip is the first fabricated ASIC
    of the rotation-plus-scalar-codebook paradigm — a defensible first.
  additional_novelty_hooks:
    - "Zero-multiplier KV cache dequantization path"
    - "32-point Walsh-Hadamard transform in ~0.012 mm² at 130nm"
    - "Lloyd-Max codebook ROM for Beta-distributed rotated KV data"

# ----------------------------------------------------------------------------
# Hardware blocks
# ----------------------------------------------------------------------------
blocks:

  - id: kv_cache_engine_turboquant
    function: >
      Forward 32-point Walsh-Hadamard transform (5-stage butterfly of adders),
      nearest-centroid classification via fixed-codebook comparator tree,
      3-bit packing, reverse path with codebook LUT and inverse Hadamard.
      INT4 and Hadamard-INT4 fallback modes also present, mode-selectable
      via CSR.
    area_mm2: 0.09
    verification_tests: 65
    risk: medium
    internal_primitives:
      adders_16bit_butterfly: 160
      comparators_16bit: 255   # 31 for max-abs tree + 224 for codebook
      multipliers_16x16: 32    # for INT4/Hadamard-INT4 fallback only
      lut_bytes: 64            # 8 centroids × 16-bit × 4 dim-groups
      barrel_shifters: 1
    area_breakdown_mm2:
      walsh_hadamard_network: 0.012
      nearest_centroid_comparators: 0.018
      codebook_rom: 0.001
      bit_pack_unpack_3bit: 0.006
      int4_fallback_datapath: 0.035
      pipeline_registers_control: 0.018

  - id: sram_buffer_controller
    function: Wishbone B4 slave, address decode, bank arbitration, CSR file, mode select
    area_mm2: 0.02
    verification_tests: 22     # +2 over A2 for TurboQuant mode coverage
    risk: low

  - id: sram_subsystem
    function: 4-8 banks of CF_SRAM_16384x32
    area_mm2: 3.50_to_7.00
    verification_tests: 5
    risk: low

# ----------------------------------------------------------------------------
# Resource summary (baseline: 6 banks, the target config)
# ----------------------------------------------------------------------------
resource_summary:
  logic_area_mm2: 0.11
  sram_area_mm2: 5.25                # 6 banks
  physical_overhead_mm2: 1.60
  total_mm2_4bank: 5.21
  total_mm2_6bank: 6.96              # target
  total_mm2_8bank: 8.71
  caravel_user_area_mm2: 10.28
  headroom_4bank_mm2: 5.07
  headroom_6bank_mm2: 3.32
  headroom_8bank_mm2: 1.57

# ============================================================================
# DESIGN SPACE
# ============================================================================
design_space:

  sram_bank_count:
    type: int
    values: [4, 5, 6, 7, 8]
    default: 6
    rationale: Same as A2 knob; target 6 banks.
    trade_offs: see A2_prudent_int4.yaml.design_space.sram_bank_count

  hadamard_size:
    type: enum
    values: [16, 32, 64, 128]
    default: 32
    trade_offs:
      16:
        butterfly_stages: 4
        add_sub_cells: 64
        area_mm2: 0.005
        latency_ns: 6
        quality_impact: "less smearing of outliers; ~0.05 PPL worse"
      32:
        butterfly_stages: 5
        add_sub_cells: 160
        area_mm2: 0.012
        latency_ns: 8
        quality_impact: baseline
      64:
        butterfly_stages: 6
        add_sub_cells: 384
        area_mm2: 0.029
        latency_ns: 10
        quality_impact: "slightly better outlier smearing; negligible"
      128:
        butterfly_stages: 7
        add_sub_cells: 896
        area_mm2: 0.067
        latency_ns: 12
        quality_impact: "matches typical attention head dim; marginal improvement"
        physical_design_risk: elevated
    recommendation: 32
    rationale: >
      32 matches the existing KV Cache Engine datapath width and amortizes
      well against typical group sizes. Larger sizes offer marginal quality
      gain at nontrivial area and latency cost.

  lloyd_max_bit_width:
    type: int
    values: [2, 3, 4]
    default: 3
    trade_offs:
      2:
        centroids: 4
        comparators_per_lane: 3
        codebook_bytes: 8
        bits_per_elem_effective: 2.5
        compression_vs_fp16: 6.4
        quality_vs_turboquant_3bit: "moderate PPL degradation (~0.5 PPL per [C-01])"
        recommendation_note: "stretch mode, worth supporting"
      3:
        centroids: 8
        comparators_per_lane: 7
        codebook_bytes: 16
        bits_per_elem_effective: 3.5
        compression_vs_fp16: 4.57
        quality_vs_turboquant_3bit: baseline (near-lossless per [C-01])
        recommendation_note: primary mode
      4:
        centroids: 16
        comparators_per_lane: 15
        codebook_bytes: 32
        bits_per_elem_effective: 4.5
        compression_vs_fp16: 3.56
        quality_vs_turboquant_3bit: "slightly better, not worth the cost"
    recommendation: support_2_and_3_selectable_via_CSR
    rationale: >
      Support both 3-bit (primary) and 2-bit (compression stretch). Skip 4-bit
      because Hadamard-INT4 fallback mode already covers the 4.5 b/elem case.

  codebook_sharing:
    type: enum
    values: [single_shared, per_dim_group_4, per_dim_group_16]
    default: single_shared
    trade_offs:
      single_shared:
        rom_bytes: 16
        area_mm2: 0.001
        quality_impact: baseline (TurboQuant assumes single codebook post-rotation)
        verification_tests: 0
      per_dim_group_4:
        rom_bytes: 64
        area_mm2: 0.003
        quality_impact: ~0.02 PPL improvement
        verification_tests: +3
      per_dim_group_16:
        rom_bytes: 256
        area_mm2: 0.01
        quality_impact: ~0.05 PPL improvement
        verification_tests: +6
    recommendation: single_shared
    rationale: >
      [C-01] demonstrates that after random rotation, per-coordinate
      distributions are near-identical (Beta with same parameters). A single
      shared codebook is the paper's own claim and should be trusted until
      golden-model experiments suggest otherwise.

  magnitude_preservation:
    type: enum
    values: [none, per_group_l2_norm, per_group_max_abs]
    default: per_group_l2_norm
    trade_offs:
      none:
        storage_overhead: 0
        quality_impact: "[C-01] reports degraded inner-product unbiasedness without magnitude"
      per_group_l2_norm:
        storage_overhead_bits_per_group_of_32: 16
        quality_impact: preserves the magnitude explicitly; matches [C-01] §4
        computation_cost: "one sqrt + one magnitude multiply per group, offline-able"
      per_group_max_abs:
        storage_overhead_bits_per_group_of_32: 16
        quality_impact: "similar to L2; simpler hardware"
        computation_cost: "one comparator tree per group"
    recommendation: per_group_l2_norm
    rationale: >
      [C-01] recommends L2 norm preservation. Store as magnitude per group;
      multiply back in on dequant as a single scalar. Shared across the
      codebook reconstruction, not per-element.

  hadamard_pipelining_depth:
    type: enum
    values: [combinational_5_stage, pipelined_2_cycle, pipelined_3_cycle]
    default: combinational_5_stage
    trade_offs:
      combinational_5_stage:
        latency_ns: 8
        cycles_per_group: 1
        timing_margin_at_50mhz: 4x
        area_impact: 0
      pipelined_2_cycle:
        latency_ns: 4 per stage
        cycles_per_group: 2
        timing_margin_at_50mhz: 8x
        area_impact: +0.002 (pipeline registers)
        enables: 100_mhz_operation
      pipelined_3_cycle:
        latency_ns: ~3 per stage
        cycles_per_group: 3
        area_impact: +0.003
        enables: 150_mhz_operation_stretch
    recommendation: combinational_5_stage
    rationale: >
      At 50 MHz target, combinational Hadamard has 4x timing margin. Only
      pipeline if Phase 3 timing closure demands it; reversible change.

  fallback_mode_support:
    type: enum_set
    values: [hadamard_int4, int4_uniform, int2_uniform, bypass]
    default: [hadamard_int4, int4_uniform, bypass]
    trade_offs:
      include_all:
        verification_tests: "+20 over turboquant_only"
        area_mm2: "+0.04 (INT4 datapath — 32 multipliers)"
        research_value: "direct silicon comparison of rotated vs unrotated quantization"
      turboquant_only:
        verification_tests: 0
        area_mm2: "-0.04"
        research_value: "weaker characterization; no fallback if TurboQuant disappoints"
    recommendation: [hadamard_int4, int4_uniform, bypass]
    rationale: >
      Keeping INT4 fallbacks is the insurance policy. If post-silicon
      TurboQuant characterization disappoints, the chip still demonstrates
      rotated INT4 and baseline INT4. Paper narrative has a branch for
      every outcome.

# ----------------------------------------------------------------------------
# Capabilities
# ----------------------------------------------------------------------------
capabilities:
  on_chip_kv_tokens_6bank_turboquant_3bit: 1575
  on_chip_kv_tokens_6bank_hadamard_int4: 1228
  on_chip_kv_tokens_6bank_int4_baseline: 1228
  on_chip_kv_tokens_6bank_bypass_fp16: 384
  on_chip_dot_product: false
  on_chip_eviction: false
  on_chip_dma: false
  on_chip_page_table: false
  host_responsibilities:
    - codebook_precomputation_offline_python_lloyd_max
    - token_importance_scoring
    - eviction_decisions
    - address_table_management
    - off_chip_dma_via_wishbone
    - full_attention_compute_softmax_mlp

# ----------------------------------------------------------------------------
# Verification
# ----------------------------------------------------------------------------
verification:
  tests_estimate: 92
  person_months_estimate: 14
  breakdown:
    kv_cache_engine_turboquant: 65
    sram_buffer_controller: 22
    sram_subsystem: 5
  golden_model_dependency:
    path: to_be_created
    description: >
      Python Lloyd-Max codebook generator against Beta distribution. Output
      is a dataclass that also emits a Verilog ROM init file. Bit-exactness
      between Python and hardware ROM is the primary correctness contract.

# ----------------------------------------------------------------------------
# Fit scoring
# ----------------------------------------------------------------------------
fit_scoring:
  tapeout_feasibility: 9
  functional_correctness_confidence: 8
  research_novelty: 9
  compression_ratio: 8
  quality_preservation: 8
  area_efficiency: 7
  scalability_to_new_node: 10
  default_weighted_total: 8.50

# ----------------------------------------------------------------------------
# A3-specific risks
# ----------------------------------------------------------------------------
risks:
  - id: R-A3-01
    severity: medium
    category: bit_exactness
    description: Lloyd-Max centroids in ROM must match Python golden exactly
    mitigation: >
      Auto-generate ROM contents from checked-in Python script during
      synthesis. Single source of truth.
  - id: R-A3-02
    severity: medium
    category: numerical
    description: Walsh-Hadamard scaling factor (1/sqrt(32)) footgun
    mitigation: >
      Defer scaling until dequant; absorb into magnitude word. Never
      normalize mid-pipeline. Document in every file.
  - id: R-A3-03
    severity: medium
    category: research_integrity
    description: TurboQuant is a 2025-2026 paper; peer review may surface issues
    mitigation: >
      Keep Hadamard+INT4 as Mode 1 and plain INT4 as Mode 2. Chip still
      demonstrates useful architectures even if TurboQuant claims are
      later found to be optimistic.
  - id: R-A3-04
    severity: low
    category: hardware
    description: 3-bit bit-packing is slightly more complex than 4-bit
    mitigation: Design 3-bit packer first; it is the harder case.

# ----------------------------------------------------------------------------
# Open questions
# ----------------------------------------------------------------------------
open_questions:
  - id: Q-A3-01
    question: Single shared codebook vs per-dim-group codebooks?
    status: validate_in_golden_model
    impact: ROM size (16 B vs 256 B); quality ~0.05 PPL
    recommendation_pending: 2026-07

  - id: Q-A3-02
    question: Hadamard 32-point combinational vs pipelined?
    status: defer_to_phase_3_PD
    impact: timing closure safety
    decision_point: Phase 3a place-and-route

  - id: Q-A3-03
    question: Should 2-bit TurboQuant mode be primary or optional?
    status: architecture_decision_pending
    impact: token capacity at extreme compression
    recommendation: optional_via_CSR

# ----------------------------------------------------------------------------
# Critical decisions
# ----------------------------------------------------------------------------
critical_decisions:
  - id: D-A3-01
    decision: Codebook sharing scheme (single vs per-dim-group)
    options: [single_shared, per_dim_group_4]
    recommendation: single_shared
    deadline: 2026-07  # by golden-model completion
    gate: Python golden model shows <0.1 PPL delta between options

  - id: D-A3-02
    decision: Support 2-bit TurboQuant mode
    options: [primary_only_3bit, primary_3bit_plus_optional_2bit]
    recommendation: primary_3bit_plus_optional_2bit
    deadline: 2026-05
    rationale: adds ~5 tests, ~0.005 mm²; enables compression-stretch claim

  - id: D-A3-03
    decision: SRAM bank count for RTL freeze
    options: [4, 6]
    recommendation: 4_rtl_freeze_6_PD_stretch
    deadline: 2027-06

  - id: D-A3-04
    decision: Fallback-mode coverage in RTL freeze
    options: [turboquant_only, turboquant_plus_hadamard_int4_plus_int4]
    recommendation: turboquant_plus_hadamard_int4_plus_int4
    deadline: 2026-05
    rationale: verification tax (+20 tests) is worth the insurance value
