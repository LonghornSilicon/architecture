# ============================================================================
# Risks that apply to every LASSO architecture candidate
# ============================================================================
# Architecture-specific risks live in each per-arch file's `risks` block.
# The risks in this file are either shuttle-level, process-level, or
# team-level — things that would happen regardless of which architecture
# was chosen.
# ============================================================================

metadata:
  name: Shared LASSO tape-out risks
  version: 1.0
  last_updated: 2026-04-21

shared_risks:

  - id: R-SH-01
    severity: critical
    category: program
    description: Efabless chipIgnite shuttle schedule slip or cancellation
    likelihood: low
    impact: "delays silicon return by 6+ months"
    mitigation:
      - Track chipIgnite dates quarterly
      - Maintain Tiny Tapeout as backup vehicle (even at reduced scope)
      - GDSII-ready earlier than deadline (Oct 2027 vs Nov 2027)

  - id: R-SH-02
    severity: high
    category: ip_validation
    description: CF_SRAM_16384x32 macro fails timing closure or DRC in OpenLane
    likelihood: medium
    impact: "forces fallback to smaller macros or fewer banks"
    mitigation:
      - Standalone OpenLane validation of macro in Phase 0 (Summer 2026)
      - Maintain 4-bank fallback floorplan as safe landing
      - Keep in-tree SKY130 liberty files pinned to known-good version

  - id: R-SH-03
    severity: high
    category: team
    description: Team attrition mid-project
    likelihood: medium
    impact: "critical-path block work stalls"
    mitigation:
      - Modular block ownership with documented handoff
      - Cross-training on RTL and verification
      - Golden model developed BEFORE any RTL (it survives attrition)

  - id: R-SH-04
    severity: medium
    category: physical_design
    description: SRAM leakage dominates power at 130nm
    likelihood: high
    impact: "characterization power numbers look worse than comparable papers"
    mitigation:
      - Accept; characterize post-silicon and report honestly
      - Note: this is a 130nm characteristic, not an architectural flaw
      - Frame in paper as "node-limited; scales with SRAM scaling"

  - id: R-SH-05
    severity: medium
    category: toolchain
    description: OpenLane 2 regression breaks Phase 3 flow
    likelihood: medium
    impact: "physical-design iteration time doubles"
    mitigation:
      - Pin OpenLane version before RTL freeze
      - Run full flow end-to-end at least monthly during Phase 2
      - Keep a reference known-good OpenLane docker image

  - id: R-SH-06
    severity: medium
    category: tooling
    description: Verilator + cocotb simulation incompatibility with gate-level sim
    likelihood: low
    impact: "gate-level sim is slow; full regression on netlist may take days"
    mitigation:
      - Run targeted subset of tests on netlist, not full regression
      - Rely on RTL regression + formal equivalence check where possible

  - id: R-SH-07
    severity: medium
    category: process
    description: SKY130 corner cases in slow/hot PVT fail timing
    likelihood: medium
    impact: "silicon works at typical PVT but not at specified corners"
    mitigation:
      - Sign off at SS/125°C/1.62V corner with OpenSTA
      - Use fallback 25 MHz clock if 50 MHz SS corner fails
      - Publish only typical-PVT performance numbers; characterize corners post-silicon

  - id: R-SH-08
    severity: low
    category: program
    description: Scope creep from faculty advisors or sponsors
    likelihood: high
    impact: "team adds features late in schedule, verification gap widens"
    mitigation:
      - This document + archs.yaml + per-arch YAML are the scope contract
      - Hard stretch-window close date (Apr 2027) — no features added after
      - Requires advisor sign-off on per-arch file before PRD draft

  - id: R-SH-09
    severity: low
    category: legal_ip
    description: SRAM macro or standard cell IP licensing issue
    likelihood: very_low
    impact: "tape-out blocked"
    mitigation:
      - CF_SRAM_16384x32 and SKY130 PDK are open-source; vetted in Phase 0
      - No proprietary cells in any candidate architecture

  - id: R-SH-10
    severity: medium
    category: post_silicon
    description: Silicon returns but doesn't boot (power, clock, reset sequencing)
    likelihood: medium
    impact: "bring-up delayed weeks; may mask functional bugs"
    mitigation:
      - Scan chain operational from first reset (required signal path)
      - SRAM self-test as first bring-up step
      - Wishbone alive check (CSR read/write) as second step
      - If these pass, functional testing can proceed incrementally
