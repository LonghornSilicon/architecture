# =============================================================================
# Lambda v2 — Standalone end-to-end transformer accelerator (4 mm² die)
# =============================================================================
# 2×2 mm tier. THE AMBITIOUS ALTERNATIVE to Lambda v1 at the same area budget.
#
# v1 (sibling: Lambda_v1_4mm2.yaml) is a KV cache + compressed-domain attention
# COPROCESSOR: no LPDDR, requires a host CPU/GPU running the rest of the model.
#
# v2 (this file) is a STANDALONE end-to-end mini-accelerator: includes a
# LPDDR5X x16 channel (~12 GB/s sustained), a tight 8×8 MatE / 8-lane VecU /
# KCE-mini compute fabric, and runs the entire transformer decode loop on-die.
#
# **Largest reasonable model: 4-5B-class** (Llama-3.2-3B, Phi-3.5-mini,
# Qwen2.5-3B, Mistral-NeMo-3B comfortably; pushing up to ~5B at borderline
# interactive 5 tok/s). The headline win: at the SAME 4 mm² as v1, v2 serves
# the same model class as the abandoned 25 mm² flagship was targeting,
# because we trade bandwidth depth (1× LPDDR5X x16 at 12 GB/s vs flagship's
# 2× LPDDR5X x64 at 100 GB/s) for area we can afford.
#
# A v2-stretch option (LPDDR5X x32 PHY) is documented at the bottom of this
# file: pushes the largest reasonable model to 7-8B at 5 tok/s, but compute-
# bottlenecked rather than bandwidth-bottlenecked, and forces near-zero
# on-die KV scratchpad. Higher risk; documented for the user to evaluate.
#
# Trade vs v1:
#   v1 = lower risk, smaller verification surface, no LPDDR PHY integration,
#        but unusable without a host-side software stack
#   v2 = higher risk, harder verification, real LPDDR PHY integration,
#        but ships as a complete demo-able chip running 3-5B models on-die
#
# Both at 4 mm² IMEC / Europractice mini@sic 2.0, $60-100K shuttle range.
# =============================================================================

metadata:
  project: Longhorn Silicon
  chip_codename: Lambda
  arch_id: Lambda_v2
  arch_name: Lambda v2 — standalone 3-5B-class transformer accelerator at 4 mm²
  document: archs/lambda/Lambda_v2_4mm2.yaml
  version: 0.2-draft
  created: 2026-04-26
  author: Longhorn Silicon Architecture Team
  classification: CONFIDENTIAL — Internal Use Only
  tier: ambitious_4mm2
  status: candidate_alternative_to_v1
  one_line_summary: >
    Standalone end-to-end transformer accelerator at 4 mm² with LPDDR5X x16,
    8×8 MatE, KCE-mini, ~1.0 MB SRAM. Targets 3-5B-class models comfortably
    (3B at 8 tok/s; 4B at 6 tok/s; 5B at ~5 tok/s borderline). Same model
    class as the abandoned 25 mm² flagship, in 1/6 the area, at 1/5 the cost.
  companions:
    - archs/lambda/Lambda_v1_4mm2.yaml             # the conservative alternative
    - STATUS.md                                    # v1-vs-v2 comparison
    - PRDs/lasso-v0-original/design-rationale.md   # KCE inheritance reasoning
    - scripts/v2_design_space/                     # validation scripts (run lambda_v2_audit.py)

# =============================================================================
# DEFINITIVE FEATURE + BLOCK LIST — what v2 actually is
# =============================================================================
# Single canonical answer to "list everything in Lambda v2." Every value here
# verified by scripts/v2_design_space/lambda_v2_audit.py against published
# references. If a number disagrees with elsewhere in this file, THIS section
# is authoritative.

definitive_features_and_blocks:

  what_v2_is_in_one_sentence: |
    A standalone open-source 4 mm² transformer-decoder ASIC at TSMC N16FFC
    that runs 3-5B-class W4A8 LLMs (Llama-3.2-3B, Mistral-NeMo-3B, Qwen2.5-3B,
    Phi-3.5-mini) at 6-8 tok/s decode in a 2.5-3.1 W envelope, with TurboQuant
    KV compression in silicon and on-die long-context support up to 32K
    tokens for low-KV-head model layouts (Qwen2.5-3B specifically).

  hardware_blocks:
    # Six-block transformer-accelerator pattern, scaled to 4 mm²
    - id: MatE
      name: Matrix Engine — 8×8 INT8×INT4 weight-stationary systolic
      function: |
        All dense GEMMs in the transformer: Q/K/V projections, attention output,
        FFN up/down, logits projection.
      pe_count: 64
      pe_op: INT8 × INT4 → INT16 accumulator
      peak_tops: 0.128                                         # 64 × 2 ops × 1 GHz
      sustained_gops_at_60pct_util: 76.8
      area_mm2: 0.10
      power_w_at_50pct_util: 0.32
      key_decisions:
        - INT16 accumulator (not flagship's INT24) — 3-5B models tolerate it
        - Weight-stationary primary dataflow (output-stationary CSR alt for Q·K^T)
        - 1.6× compute headroom over bandwidth-bound floor across all reasonable models

    - id: VecU
      name: Vector Unit — 8-lane SIMD with online softmax
      function: |
        Programmable SIMD for online softmax (FlashAttention-3 style), RMSNorm,
        SiLU/GELU, RoPE pair-rotation, residual add, sampling.
      lanes: 8
      lane_bit_width: 16                                       # FP16/BF16 accumulate
      microcode_capacity: 1k_instructions
      transcendental_luts: [exp_64entry, rsqrt_64entry, sigmoid_64entry]
      area_mm2: 0.144
      power_w: 0.16

    - id: KCE
      name: KV Compression Engine — TurboQuant 16-point Hadamard
      function: |
        Walsh-Hadamard rotation + Lloyd-Max codebook quantization on K and V
        as MatE produces them. Inverse path (LUT + reverse Hadamard) on read
        for attention scoring. Multipliers ZERO on the dequant path.
      hadamard_dim: 16                                         # 64 add/sub vs flagship's 160
      codebook_centroids: 8                                    # 3-bit per element
      compression_ratio_vs_fp16: 3.0                           # at 5.3 b/elem effective
      modes:
        - turboquant_3bit_16pt (primary)
        - hadamard_int4_16pt (fallback)
        - turboquant_asymmetric_K3_V2 (free upgrade — alt codebook ROM, ~6× compression)
        - fp4_e2m1_codebook (free; alt 64-byte ROM with NVFP4 levels)
        - bypass_fp16 (debug / ablation)
      area_mm2: 0.08
      power_w: 0.05
      research_significance: |
        First-silicon implementation of rotation-codebook KV compression
        (TurboQuant, ICLR'26 arXiv 2504.19874) at a competitive node. Headline
        research first.

    - id: MSC
      name: Memory Subsystem Controller — single-channel
      function: |
        LPDDR5X x16 controller; 4-port SRAM crossbar (MatE, VecU, KCE, host);
        128-entry block table for vLLM-compatible KV paging; DMA descriptor
        engine; on-demand KCE inverse-path trigger for cold-page hits.
      lpddr_channels: 1
      sram_crossbar_ports: 4
      block_table_entries: 128                                 # 16 tokens/block × 128 = 2K-token KV pages
      hw_features:
        - dma_descriptor_fsm
        - simple_prefetch
        - on_demand_kv_decompress
        - request_arbitration_priority_queue
      explicitly_NOT_supported:
        - continuous_batching                                  # single-session chip
        - tier3_host_dram_eviction                             # no host-side KV swap path
        - prefix_sharing_across_sessions
      area_mm2: 0.18
      power_w: 0.15

    - id: LSU
      name: Layer Sequencer — minimal in-order RISC
      function: |
        Walks pre-compiled model schedule. Dispatches MatE GEMMs, KCE
        compress/decompress, VecU softmax/RMSNorm/RoPE, DMA prefetches.
        Loaded at boot via host iface.
      isa: 32-bit fixed-width, 32 instructions
      registers_general_purpose: 16x32b
      microcode_capacity: 4k_instructions                      # one model schedule fits
      issue_width: 1_scalar + 1_vector + 1_dma per cycle
      area_mm2: 0.10
      power_w: 0.05

    - id: HIF
      name: Host Interface — USB-C 2.0 endpoint
      function: |
        Boot-loads weights from host into LPDDR5X (~10-25 sec for 3B model);
        receives prompts; streams generated tokens. JTAG + scan chain for
        post-silicon debug. CSR access for chip configuration and microcode load.
      protocol: USB-C 2.0 (480 Mbps high-speed)                # OR simple LVDS SerDes alternative
      doorbell_queue_depth: 16                                 # smaller than flagship's 64
      sustained_bandwidth_gb_s: 0.06
      bandwidth_basis: |
        Tokens are <1 KB each at 8 tok/s = ~4 KB/s — 15,000× headroom. Weight
        load at boot is the only bandwidth-sensitive op; 1.5 GB / 60 MB/s = 25 sec.
      scan_chain: true
      area_mm2: 0.30
      power_w: 0.10
      why_not_pcie: |
        PCIe Gen3 x4 PHY ~1.0 mm² is gross overkill for token I/O at this
        scale. USB-C 2.0 is sufficient AND ~70% smaller. Acceptable demo
        story: "plug into any modern PC via USB-C; chip enumerates as
        a serial inference device."

    - id: on_chip_sram
      name: On-chip SRAM — 4 banks, 0.8 MB total (KV-dominant)
      banks:
        - id: kv_scratchpad
          size_mb: 0.4
          purpose: |
            Compressed KV staging for current layer's hot tokens. At 0.4 MB +
            TurboQuant 3.5b: holds 936 single-layer tokens for Llama-3.2-3B
            (8 KV × 128) and 3,744 single-layer tokens for Qwen2.5-3B (2 KV
            × 128). Older tokens stream from LPDDR.
          ports: 1
        - id: activation_buffer
          size_mb: 0.3
          purpose: |
            FlashAttention working set + per-token QKV scratch + MLP intermediates.
            FA tile=8-16 at batch 1 fits comfortably.
          ports: 2                                             # read-modify-write
        - id: weight_stream_buffer
          size_mb: 0.05
          purpose: |
            Tiny streaming staging FIFO. At 12 GB/s × 100 ns first-byte =
            1.2 KB minimum tile. 0.05 MB = 40× streaming minimum — ample.
          ports: 1
        - id: codebook_const_rom
          size_kb: 64
          purpose: |
            TurboQuant Lloyd-Max centroids (8 × 16-bit = 16 bytes), Hadamard
            scaling constants, RoPE freq table (~512 bytes), exp/sigmoid/rsqrt
            transcendental LUTs (~32 KB total).
          ports: 1                                             # read-only
      total_size_mb: 0.8
      total_area_mm2: 0.71

    - id: lpddr5x_x16_phy
      name: LPDDR5X x16 PHY — vendor IP
      function: Physical-layer interface to off-chip LPDDR5X-8533 package
      vendor: Synopsys DesignWare or Cadence Denali (selected by quote in Q2 2026)
      data_rate_mbps: 8533
      bus_width_bits: 16
      peak_bandwidth_gb_s: 17.07
      sustained_bandwidth_gb_s: 11.94                          # 70% of peak
      area_mm2: 1.20                                           # estimate; vendor NDA-gated
      area_mm2_uncertainty: ±0.3 mm²                           # 1.0 best / 1.5 worst case
      power_w_at_12gbs_sustained: 0.72
      power_basis: 7.5 mW/Gbps (LPDDR5X spec, 25% better than LPDDR5)
      validation: OPENEDGES has shipped LPDDR5/4 PHY in silicon at 14/16/22 nm

  area_summary_mm2:
    matE_8x8: 0.10
    vecU_8_lane: 0.144
    kce_mini: 0.08
    msc: 0.18
    lsu: 0.10
    hif_usbc: 0.30
    sram_0_8mb: 0.71
    lpddr5x_x16_phy: 1.20
    clock_power_routing: 0.40
    io_ring_pads_esd: 0.76
    routing_buffer: 0.10
    total: 4.07                                                # at PHY=1.2 mm² (mid case)
    # If PHY = 1.0 mm² (best case): 3.87 mm² total, 1.0 MB SRAM is feasible
    # If PHY = 1.5 mm² (worst case): 4.37 mm² → does NOT fit, must replan

  power_summary_w:
    decode_typical: 2.4
    prefill_peak: 3.1
    deep_idle: 0.7                                             # leakage only
    fanless_envelope: comfortable

  performance_summary:
    primary_demo_target: Mistral-NeMo-3B at 8.0 tok/s decode (or Llama-3.2-3B at 7.4)
    candidate_models_at_LPDDR5X_x16:
      "0.36B SmolLM2-360M":   { tok_per_sec: 66.4, verdict: overkill }
      "0.5B Qwen2.5-0.5B":    { tok_per_sec: 47.8, verdict: very_comfortable }
      "1.2B Llama-3.2-1B":    { tok_per_sec: 19.3, verdict: very_comfortable }
      "1.1B TinyLlama":       { tok_per_sec: 21.7, verdict: very_comfortable }
      "2B Gemma-2-2B":        { tok_per_sec: 11.9, verdict: comfortable }
      "3.0B Mistral-NeMo-3B": { tok_per_sec: 8.0,  verdict: comfortable_interactive }   # SWEET SPOT
      "3.1B Qwen2.5-3B":      { tok_per_sec: 7.7,  verdict: borderline_with_32K_on_die }
      "3.2B Llama-3.2-3B":    { tok_per_sec: 7.4,  verdict: borderline_interactive }
      "3.8B Phi-3.5-mini":    { tok_per_sec: 6.3,  verdict: borderline }
      "4B (hypothetical)":    { tok_per_sec: 6.0,  verdict: borderline }
      "5B (ceiling)":         { tok_per_sec: 4.8,  verdict: just_below_threshold }
      "7B (Mistral-7B)":      { tok_per_sec: 3.3,  verdict: requires_v2_stretch_or_W3 }
      "8B (Llama-3.1-8B)":    { tok_per_sec: 3.0,  verdict: requires_v2_stretch }
    largest_reasonable_model: 4-5B class at 5 tok/s threshold (4.78B theoretical max)
    decode_regime: bandwidth_bound (LPDDR5X x16 sustained 11.94 GB/s)
    prefill_regime: compute_bound — interactive prompt ceiling 64-128 tokens
    energy_per_token_3B: ~325 mJ (~10× better than CPU; ~1.5× worse than mobile NPU)

  features_supported:
    weight_quantization:
      - INT4 per-channel groupwise (W4A8 primary)
      - INT8 fallback (W8A8 for accuracy-critical layers)
    activation_quantization:
      - INT8 per-token dynamic
    kv_quantization_modes:
      - turboquant_3bit_16pt_Hadamard (primary, ~3× compression)
      - hadamard_int4_16pt (fallback, ~3.2× compression)
      - turboquant_asymmetric_K3_V2 (~6× compression — production-mode upgrade)
      - fp4_e2m1_codebook (NVFP4 levels via alt ROM; CSR-selectable)
      - bypass_fp16 (debug / ablation)
    attention_variants_supported:
      - vanilla_multi_head (MHA)
      - grouped_query (GQA — Llama-3 family, Mistral-NeMo)
      - multi_query (MQA — degenerate GQA, 1 KV head)
    attention_algorithms_supported:
      - vanilla full attention
      - flash_attention_3 online softmax (microcoded in VecU)
      - paged_attention (vLLM block table in MSC)
    serving_features_in_hardware:
      - boot_time_model_load (LSU schedule loaded over USB-C)
      - prefill_decode_unification (MatE handles both)
      - speculative_decoding_compatible (architecturally; host coordinates draft tokens)
    explicitly_NOT_supported_v0_3:
      - continuous_batching (single-session chip)
      - tier3_host_dram_eviction
      - prefix_sharing_across_sessions
      - multi_latent_attention (DeepSeek MLA — needs different KV layout)
      - mixture_of_experts (routing)
      - multimodal_vision_or_audio
      - training_or_backprop
      - dvfs_or_runtime_voltage_scaling

  load_bearing_uncertainties:
    - id: lpddr5x_x16_phy_area
      estimate_mm2: 1.2
      uncertainty_mm2: ±0.3
      action: Synopsys + Cadence quote in Q2 2026 (eptsmc@imec.be can broker)
      blocking_for: floorplan freeze
    - id: imec_minisic_pricing
      estimate_usd: 60_000_to_100_000
      uncertainty: non_public
      action: direct quote via eptsmc@imec.be price-request form Q2 2026
      blocking_for: funding plan
    - id: w4_quality_on_3to4B_models
      literature_says: 3-6% MMLU degradation with AWQ INT4 vs FP16 (acceptable for demo)
      action: Python golden model evaluation against AWQ implementation; pick 1-2 demo models
      blocking_for: demo target choice
    - id: sram_density_at_16nm
      mid_estimate: 1.25 MB/mm²
      uncertainty: 1.0 (conservative) to 1.5 (optimistic)
      action: confirm via Memory Compiler datasheet from foundry
      blocking_for: SRAM bank sizing finalization

  next_concrete_steps:
    - 1_decide_v1_vs_v2:
        owner: architecture_lead + faculty_advisor
        deliverable: explicit go/no-go on v1-conservative vs v2-ambitious
        deadline: 2026-06
    - 2_quote_imec:
        owner: architecture_lead
        deliverable: written IMEC / Europractice mini@sic 2.0 quote for 4 mm² N16FFC
        deadline: 2026-05
    - 3_lpddr5x_x16_phy_quote:
        owner: architecture_lead
        deliverable: written quote (Synopsys + Cadence) for LPDDR5X x16 PHY at 16nm
        deadline: 2026-06
    - 4_choose_primary_demo_model:
        owner: architecture_lead + ML student
        deliverable: golden-model evaluation; pick Mistral-NeMo-3B vs Llama-3.2-3B vs Qwen2.5-3B as demo target
        deadline: 2026-07
    - 5_python_golden_model:
        owner: rtl_lead + ML student
        deliverable: cycle-accurate Python sim of full v2 dataflow on chosen model
        deadline: 2026-10
    - 6_tool_ramp_test_chip:
        owner: physical_design_lead
        deliverable: trivial inverter ring oscillator at N16FFC through IMEC mini@sic
        deadline: 2026-09

# -----------------------------------------------------------------------------
# Why this architecture at 4 mm² — the audit
# -----------------------------------------------------------------------------
feasibility_audit:
  question: "Can 4 mm² hold a STANDALONE end-to-end transformer accelerator at 16nm targeting 3-5B models?"
  answer: "Yes, with LPDDR5X x16 as the bandwidth tier and tight scope on every block."

  bandwidth_decision_is_load_bearing: |
    Decode is bandwidth-bound. Largest_model_GB ≈ bandwidth_GBs × time_per_tok / 2
    (factor 2 because INT4 is 0.5 bytes/param). For 5 tok/s threshold (200 ms/tok):
      - LPDDR4X x16 (6 GB/s):  1.2 GB → 2.4B params max
      - LPDDR5X x16 (12 GB/s): 2.4 GB → **4.8B params max**  ← v2 baseline
      - LPDDR5X x32 (25 GB/s): 5.0 GB → 10B params max (compute-bottlenecked; see stretch §)
    Choosing LPDDR5X x16 over LPDDR4X x16 costs +0.2 mm² PHY area (1.2 vs 1.0
    mm²) and +1 W power (1.5 vs 0.5 W). It DOUBLES the largest serviceable
    model class. Strict slam dunk for 3-5B target.

  key_architectural_decisions:
    - drop_pcie_for_simple_serial:
        rationale: |
          Tokens are kilobytes/sec. PCIe Gen3 x4 PHY (~1.0 mm²) is gross
          overkill at 4 mm². USB-C 2.0 (60 MB/s) is sufficient for I/O;
          weight load takes ~10 sec at boot for 4B-class models, acceptable.
        savings_mm2: 0.7
    - use_lpddr5x_x16_not_x64_or_x32:
        rationale: |
          LPDDR5X x64 PHY (~2.5 mm²) breaks the 4 mm² budget hard. x32 (~1.8 mm²)
          forces near-zero on-die SRAM and undersized compute (see v2-stretch §).
          x16 (~1.2 mm²) is the right balance: 12 GB/s sustained, leaves enough
          area for an 8×8 MatE plus 1 MB SRAM.
    - shrink_compute_fabric_aggressively:
        rationale: |
          Decode at 12 GB/s × 5 tok/s threshold needs ~24 GOPS sustained for
          a 4B model. 8×8 MatE = 0.13 TOPS = 130 GOPS peak, ~78 GOPS at
          60% utilization. **3× headroom over the bandwidth-bound floor.**
          0.10 mm² for 8×8 vs 1.2 mm² for the abandoned 32×32 flagship —
          right-sized for v2's model class and bandwidth tier.
    - shrink_KCE_to_16_point_hadamard:
        rationale: |
          16-point Walsh-Hadamard butterfly (64 add/sub) saves ~0.07 mm² vs
          flagship's 32-point (160 add/sub). Compression drops from 4.57× to
          ~3.0× — acceptable on this die size given KV is bandwidth-bound
          regardless.

  fixed_cost_floor_at_4mm2:
    # Corrected 2026-04-26 by lambda_v2_audit.py — see scripts/v2_design_space/
    items:
      - id: io_ring_pads_esd
        area_mm2: 0.76
        basis: |
          For 2000×2000 µm die: perimeter = 8000 µm × 100 µm ring width
          = 0.8 mm² before corner-cell sharing → 0.76 mm² after subtracting
          4 × (100×100 µm²) corner overlaps. Conservative 100 µm ring is
          standard for 16nm GPIO library (Sofics/TSMC) with 2 kV HBM ESD.
      - id: clock_tree_power_grid_routing_overhead
        area_mm2: 0.4
        basis: ~10% of die at 16nm (standard heuristic)
      - id: lpddr5x_x16_phy
        area_mm2: 1.2
        basis: |
          Single 16-bit LPDDR5X PHY at 16nm. Extrapolated from x64 ~2.5 mm²
          with sub-linear scaling (analog calibration is fixed cost; only
          data lanes scale with width). x16 ≈ 50% of x64 = 1.2 mm². NDA-gated.
          OPENEDGES has shipped LPDDR5/4 PHY in silicon at 14/16nm — feasibility
          confirmed; exact area requires direct vendor quote.
        risk: high                                             # ±0.3 mm² real swing; budget breaks at 1.5
      - id: minimal_host_serial_iface
        area_mm2: 0.3
        basis: USB-C 2.0 (480 Mbps) endpoint or simple SerDes
      - id: subtotal_fixed_cost
        area_mm2: 2.66
        notes: 66.5% of the 4 mm² die before any compute or memory.

  what_fits_after_floor:
    available_budget_mm2: 1.34                                 # corrected: 4.0 - 2.66 = 1.34
    proposed_allocation:
      - block: matrix_engine_8x8
        area_mm2: 0.10
        basis: |
          64 PEs × ~600 µm²/PE = 0.038 mm² + auxiliary (input/output buffers
          0.04, accumulator 0.02, activation Q/dQ 0.04, pipeline/control 0.02)
          ≈ 0.10-0.16 mm² total. Use 0.10 as the design target; budget 0.16
          if v0.3 audit finds the auxiliary blocks larger than expected.
          Flagship 32×32 at 1.2 mm² total / 1024 PEs scales sub-linearly.
      - block: vector_unit_8_lane
        area_mm2: 0.15
        basis: 8 lanes × 16-bit FP16/BF16. Quarter scale of flagship's 32-lane.
      - block: kv_compression_engine_mini
        area_mm2: 0.08
        basis: 16-point Walsh-Hadamard + 8-centroid Lloyd-Max + bit-pack 3-bit.
      - block: memory_subsystem_controller
        area_mm2: 0.18
        basis: 1 LPDDR ch + 4-port crossbar + 128-entry block table; no continuous batching, no Tier-3 eviction.
      - block: layer_sequencer_minimal
        area_mm2: 0.10
        basis: 32-instruction ISA, 4K microcode, 16×32b GPR.
      - block: SRAM_total
        area_mm2: 0.71
        size_mb_at_baseline: 0.8
        basis: |
          0.8 MB at 1.25 MB/mm² HD 1-port + ~10% compiler overhead = 0.71 mm².
          ROOM FOR 1.0 MB ONLY IF PHY comes in at 1.0 mm² (vendor best case);
          mid-case PHY at 1.2 mm² forces SRAM to 0.7-0.8 MB.
    total_compute_and_memory_mm2: 1.32
    headroom_mm2: 0.02                                         # 4.0 - 2.66 - 1.32 = 0.02
    verdict: feasible_with_essentially_zero_headroom_at_phy_1.2mm2_assumes_0.8MB_SRAM

  pivotal_uncertainty: |
    The single load-bearing variable is the LPDDR5X x16 PHY area.
      - At 1.0 mm² (vendor best case): v2 fits at 4.0 mm² with 1.0 MB SRAM
      - At 1.2 mm² (planning estimate): v2 fits at 4.0 mm² with 0.8 MB SRAM
      - At 1.5 mm² (vendor worst case): v2 does NOT fit at 4.0 mm²
                                        → must downgrade to LPDDR4X x16
                                          (loses bandwidth → 1.2B model max)
                                        OR grow die to 4.5 mm² (~+12% shuttle cost)
    The first concrete next step is the IMEC mini@sic 2.0 quote AND the LPDDR5X
    x16 PHY quote from Synopsys + Cadence. Until those arrive, every other
    decision is provisional.

  recommended_first_shrinks_in_priority_order:
    - id: shrink_sram_to_0_8mb
      saves_mm2: 0.18
      cost: |
        KV scratchpad drops to 0.4 MB (from 0.5 MB). ~370 single-layer tokens
        for Llama-3.2-3B (8 KV × 128); still 3,750 for Qwen2.5-3B (2 KV × 128).
        Activation buffer stays at 0.3 MB (FA tile=8-16 still works). Weight
        buffer stays at 0.1 MB (still 80× streaming minimum at 12 GB/s).
      recommended_first: true
    - id: tighten_io_ring_to_0_7mm2
      saves_mm2: 0.06
      cost: |
        Use a more aggressive 80 µm ring width at 16nm (vs 100 µm conservative).
        Possible with library tuning; consult Sofics 16nm GPIO docs.
      recommended_second_if_first_insufficient: true
    - id: shrink_host_iface_to_0_2mm2
      saves_mm2: 0.10
      cost: |
        Drop to a smaller host iface (e.g., 4-pin SPI + 2 GPIO interrupt + JTAG
        only). Loses USB-C convenience; user must connect via dev-board adapter.
      not_recommended_unless_sram_shrink_insufficient: true

# -----------------------------------------------------------------------------
# Process — same as flagship; reference for shared constants
# -----------------------------------------------------------------------------
process:
  node: TSMC N16FFC
  shuttle_program:
    primary: IMEC / Europractice mini@sic 2.0 (TSMC technologies) [C-imec-01]
    secondary: TSMC University FinFET Program via Europractice [C-imec-02]
    fallback: Muse Semiconductor (US-focused TSMC University FinFET path) [C-muse-fallback]
  pdk_status: classroom_pdk_publicly_available_fab_pdk_under_NDA
  feature_size_nm: 16
  density:
    gate_density_mtr_per_mm2: 28.2                             # WikiChip [C-14]
    sram_hd_density_mb_per_mm2: 1.25                           # 1-port HD planning estimate
  electrical:
    nominal_core_voltage_v: 0.8
    io_voltage_v: 1.8
    target_clock_mhz: 1000                                     # 1 GHz; 800 MHz fallback
  toolchain:
    synthesis: Cadence Genus or Synopsys Fusion Compiler
    pnr: Cadence Innovus or Synopsys IC Compiler II
    drc_lvs: Calibre or PVS
    timing_signoff: PrimeTime
    flow_note: |
      Commercial-flow only. OpenLane 2 does not signoff at 16nm. IMEC /
      Europractice provides tool access bundled with mini@sic registration.

# -----------------------------------------------------------------------------
# Target workload — 3-5B-class transformer inference
# -----------------------------------------------------------------------------
target_workload:
  primary_model_class:
    name: 3-5B-parameter dense decoder transformer
    examples:
      - Llama-3.2-3B (3B params, 28 layers, 8 KV × 128 dim)             # COMFORTABLE: 8 tok/s
      - Phi-3.5-mini-instruct (3.8B, 32 layers, 32 KV × 96 dim)         # 6 tok/s borderline
      - Qwen2.5-3B (3.1B, 36 layers, 2 KV × 128 dim)                    # 8 tok/s + 32K context fits on-die
      - Mistral-NeMo-3B (3B, 28 layers, 8 KV × 128 dim)                 # 8 tok/s
      - Gemma-2-2B (2B, 26 layers, 4 KV × 256 dim)                      # 12 tok/s comfortable
      - Llama-3.2-1B (1.2B, 16 layers, 8 KV × 64 dim)                   # 20 tok/s; uses bandwidth headroom
      - SmolLM2-360M (360M, 30 layers, 5 KV × 64 dim)                   # >50 tok/s
    parameters: 1B_to_5B
    weight_bits_target: 4
    weight_bytes_total_w4: 0.5_to_2.5_GB
    activation_bits: 8
    head_dim_typical: 64_to_128
    n_heads_kv_typical: 2_to_8
    n_layers_typical: 16_to_36
    largest_reasonable_model_basis: |
      "Reasonable" = 5 tok/s decode (above human reading speed; usable for
      chat/agent). With 12 GB/s sustained LPDDR5X x16 and 200 ms time budget:
      weights_GB = 12 × 0.2 = 2.4 GB. At INT4, that's 2.4 / 0.5 = 4.8B params.
      Round down to 4-5B as the design point; 5B is at the edge.

      Compute headroom check: 5B × 2 ops × 5 tok/s = 50 GOPS. Available
      0.13 TOPS × 60% util = 78 GOPS. Compute fits with 30%+ margin even
      at the largest model.

  context_length_targets:
    baseline_tokens: 4096
    stretch_tokens: 16384
    stretch_with_lpddr_streaming_tokens: 32768

  serving_regime:
    primary: single_user_single_session_decode
    secondary: NONE                                            # single-session chip
    deliberately_excluded:
      - large_batch_serving (won't fit in 0.3 MB activation buffer)
      - 7B+ models (LPDDR5X x16 12 GB/s caps reasonable model at ~5B)
      - long-context_>32K (KV bandwidth at 12 GB/s limits long context)
      - prefill_>256_tokens (compute fabric is small)

  why_this_workload: |
    The 3-5B class is the deployable on-device LLM regime in 2026-28. Llama-3.2
    family, Phi-3.5, Qwen2.5, Mistral-NeMo, Gemma-2 are all in this band.
    Apple Intelligence, Google Gemini Nano, Microsoft Copilot+ all target
    similar scales. Lambda v2 is the **first open-source academic standalone
    accelerator** at this scale — closest commercial cousins are Apple Neural
    Engine and Qualcomm Hexagon NPU, both proprietary integrated SoCs.

    The pitch is **3-5B inference at 3-4 W, standalone, open-source, 4 mm².**
    Not "the fastest on this workload" (an x86 CPU at 30-50 W is faster) but
    "the smallest, lowest-power, and only open-source option."

  capacity_math:
    # All numbers below verified by scripts/v2_design_space/lambda_v2_audit.py
    # KV byte formula: kv_heads × head_dim × 2 (K+V) × bits_per_elem / 8
    # 0.4 MB KV scratchpad assumed (post-shrink baseline)
    model_class_examples:
      - name: Llama-3.2-3B (8 KV × 128 dim, 28 layers)
        weight_bytes_w4: 1_605_000_000                         # 3.21B × 0.5
        per_token_kv_bytes_layer: 448                          # 8 × 128 × 2 × 3.5/8
        per_token_kv_bytes_all_layers: 12544                   # × 28 layers
        decode_ms_at_12gbs: 134
        decode_tok_per_sec: 7.4
        kv_scratchpad_capacity_tokens_at_0_4mb: 936            # 0.4 MB / 448
        kv_scratchpad_capacity_tokens_at_0_5mb: 1170
        notes: |
          Borderline interactive at 7.4 tok/s. 8K context spills to LPDDR
          (~1.7 ms/token additional read at 12 GB/s); still fits comfortably.
      - name: Qwen2.5-3B (2 KV × 128 dim, 36 layers)
        weight_bytes_w4: 1_545_000_000                         # 3.09B × 0.5
        per_token_kv_bytes_layer: 112                          # 2 × 128 × 2 × 3.5/8
        per_token_kv_bytes_all_layers: 4032                    # × 36 layers
        decode_ms_at_12gbs: 129
        decode_tok_per_sec: 7.7
        kv_scratchpad_capacity_tokens_at_0_4mb: 3744           # 0.4 MB / 112
        kv_scratchpad_capacity_tokens_at_0_5mb: 4681
        notes: |
          Long-context champion. 2 KV heads × 128 dim = 4× smaller per-token
          KV than 8-head models. 0.4 MB scratchpad holds 3,744 single-layer
          tokens — covers 4K context entirely on-die per layer. With 0.5 MB
          (PHY best-case), holds 4,681 tokens.
      - name: Mistral-NeMo-3B (8 KV × 128 dim, 28 layers)
        weight_bytes_w4: 1_500_000_000
        per_token_kv_bytes_layer: 448
        decode_tok_per_sec: 8.0
        kv_scratchpad_capacity_tokens_at_0_4mb: 936
        notes: Comfortable interactive 8 tok/s. Same KV layout as Llama-3.2-3B.
      - name: Phi-3.5-mini (32 KV × 96 dim, 32 layers)
        weight_bytes_w4: 1_910_000_000                         # 3.82B × 0.5
        per_token_kv_bytes_layer: 1344                         # 32 × 96 × 2 × 3.5/8
        per_token_kv_bytes_all_layers: 43008
        decode_ms_at_12gbs: 160
        decode_tok_per_sec: 6.3
        kv_scratchpad_capacity_tokens_at_0_4mb: 312
        notes: |
          KV-heavy model (32 KV heads is unusual). Borderline interactive at
          6.3 tok/s. 4K context KV per token ~5.5 MB at 12 GB/s = 0.46 ms
          extra; not a bottleneck. Recommended only if Phi-specific quality
          is required for the demo.
      - name: Llama-3.2-1B (8 KV × 64 dim, 16 layers)
        weight_bytes_w4: 620_000_000
        per_token_kv_bytes_layer: 224
        decode_tok_per_sec: 19.3
        kv_scratchpad_capacity_tokens_at_0_4mb: 1872
        notes: Very comfortable at 19 tok/s. Uses bandwidth headroom; 0.4 MB scratchpad fits 1.8K context.
      - name: hypothetical-5B (8 KV × 128 dim, 32 layers)
        weight_bytes_w4: 2_500_000_000
        decode_ms_at_12gbs: 209
        decode_tok_per_sec: 4.8
        notes: At threshold (just below 5 tok/s). 4-4.5B is the practical ceiling.

# -----------------------------------------------------------------------------
# Memory hierarchy
# -----------------------------------------------------------------------------
memory_hierarchy:

  off_chip_dram:
    technology: LPDDR5X
    standard_data_rate_mbps: 8533                              # JEDEC LPDDR5X peak [C-16]
    channel_width_bits: 16                                     # x16 — half-width vs x32 mobile typical
    channels_on_die: 1
    package_capacity_gb_per_channel: 4_to_8                    # standard mobile LPDDR5X package
    total_capacity_gb: 4_to_8
    peak_bandwidth_gb_s_per_channel: 17.1                      # 8533 × 16 / 8 / 1000
    sustained_bandwidth_gb_s_planning: 12                      # ~70% of peak
    phy_ip_source: Synopsys DesignWare or Cadence Denali LPDDR5X x16
    phy_area_estimate_mm2: 1.2
    estimate: true                                             # vendor-NDA-gated; verify
    why_x16_not_wider: |
      Wider PHYs (x32, x64) consume 1.8-2.5 mm² each, breaking the 4 mm²
      budget. x16 at 1.2 mm² is the largest LPDDR5X PHY that fits while
      leaving room for compute + SRAM. See `v2_stretch_lpddr5x_x32` block
      below for the alternative.

  on_chip_sram:
    total_target_mb: 1.0
    organization: KV-dominant_minimal
    banks:
      - id: kv_scratchpad
        size_mb: 0.4                                           # corrected v0.3: 0.5→0.4 to fit at PHY=1.2
        size_mb_if_phy_at_1mm2: 0.5                            # if PHY comes in best-case
        purpose: |
          Compressed KV scratchpad for current layer's hot tokens. Verified
          capacities (scripts/v2_design_space/kv_capacity.py) at 0.4 MB:
            - Llama-3.2-3B (8 KV × 128): 936 single-layer tokens
            - Qwen2.5-3B (2 KV × 128): 3,744 single-layer tokens
            - Mistral-NeMo-3B (8 KV × 128): 936 single-layer tokens
            - Phi-3.5-mini (32 KV × 96): 312 single-layer tokens
          KV beyond the scratchpad streams from LPDDR at 12 GB/s — extra cost
          is ~1-3 ms/token for 8K-context models, ~12-25 ms for 32K (Phi).
        bandwidth_gb_s: 64
        latency_cycles: 1
        port_count: 1
      - id: activation_buffer
        size_mb: 0.3
        purpose: |
          FlashAttention working set + per-token QKV scratch + MLP intermediates.
          Single-session/batch-1 with FA tile=8-16 fits comfortably.
        port_count: 2
      - id: weight_stream_buffer
        size_mb: 0.15
        purpose: |
          Streaming staging for weights from LPDDR. At 12 GB/s × 100 ns
          first-byte = 1.2 KB minimum tile; 0.15 MB = 125× minimum, ample.
        port_count: 1
      - id: codebook_const_rom
        size_kb: 64
        purpose: TurboQuant centroids, RoPE freqs, transcendental LUTs
        port_count: 1
    total_sram_area_mm2: 0.80                                  # 1.0 MB / 1.25 MB/mm²

  roofline_analysis:
    decode_phase:
      bytes_per_param_w4: 0.5
      arithmetic_intensity_batch_1: 4
      lpddr5x_x16_machine_balance_ops_per_byte: 11             # 0.13 TOPS / 12 GB/s
      bandwidth_bound_until_batch: ~3
      conclusion: |
        Decode is bandwidth-bound. At 12 GB/s sustained:
          1B model: 0.5 GB / 12 = 42 ms/tok = 24 tok/s
          3B model: 1.5 GB / 12 = 125 ms/tok = 8 tok/s
          4B model: 2.0 GB / 12 = 167 ms/tok = 6 tok/s
          5B model: 2.5 GB / 12 = 208 ms/tok = 4.8 tok/s (THRESHOLD)
        Compute (0.13 TOPS, 78 GOPS sustained) has 3-5× headroom over the
        bandwidth-bound floor at every model size in this range.
    prefill_phase:
      compute_bound: true_at_seq_len_>_32
      conclusion: |
        Prefill is compute-bound at any non-trivial prompt. 256-prompt on
        3B model: 2 × 256 × 3e9 = 1.5e12 FLOPs / 0.13 TOPS / 50% util
        = 23 sec. **Recommended interactive prompt ceiling: 64-128 tokens
        (~3-6 sec).** Same conclusion as flagship: decode-optimized.

# -----------------------------------------------------------------------------
# Functional blocks
# -----------------------------------------------------------------------------
blocks:

  - id: matrix_engine
    name: Matrix Engine (MatE) — 8×8
    function: |
      Weight-stationary systolic array, INT8 × INT4 PE, INT16 accumulate
      (smaller than flagship's INT24; 3-5B models tolerate it). Handles all
      GEMMs: Q/K/V projections, attention output, FFN up/down, logits.
    microarchitecture:
      array_dim_pe: 8x8                                        # 64 PEs
      pe_op: INT8 × INT4 → INT16 accumulate
      peak_ops_per_cycle: 128
      target_clock_mhz: 1000
      peak_tops_int8w4: 0.128
      sizing_rationale: |
        Decode at 12 GB/s for largest 5B model: needs 50 GOPS sustained.
        Available 0.13 TOPS × 60% util = 78 GOPS. **30%+ headroom even at
        the largest model.** 8×8 is the smallest array that meets bandwidth-
        bound performance with margin.
    dataflow: weight_stationary
    quantization_support:
      - format: int8_x_int4
        primary: true
      - format: int8_x_int8
        primary: false
        notes: fallback for accuracy-critical layers
    area_mm2: 0.10
    verification_tests: 50
    risk: medium

  - id: vector_unit
    name: Vector Unit (VecU) — 8-lane
    function: |
      8 lanes × 16-bit FP16/BF16. Online softmax, RMSNorm, GELU/SiLU, RoPE,
      residual add. Microcoded.
    microarchitecture:
      vector_width_lanes: 8
      lane_bit_width: 16
      ops_supported:
        - vector_add_sub_mul
        - vector_compare_max_min
        - exp_lut                                              # 64-entry LUT
        - reciprocal_sqrt_lut
        - sigmoid_lut
        - rotary_pair_rotate                                   # RoPE
      microcode_capacity: 1k_instructions
    online_softmax_specifics:
      algorithm: FlashAttention-3 style online softmax
      m_running_max_buffer: 8_lanes_x_16b
      l_running_sum_buffer: 8_lanes_x_16b
    area_mm2: 0.15
    verification_tests: 25
    risk: medium

  - id: kv_compression_engine
    name: KV Compression Engine (KCE-mini) — 16-point Hadamard
    function: |
      Walsh-Hadamard rotation (16-point, 64 add/sub) + Lloyd-Max codebook
      (8-centroid, 3-bit) + bit-pack. 16-point saves ~0.07 mm² vs flagship's
      32-point. Compression ~3.0× vs FP16.
    microarchitecture:
      hadamard_dim: 16
      hadamard_throughput_per_cycle: 16
      codebook_centroids: 8
      compression_ratio_vs_fp16: 3.0
      bypass_mode: true
    operating_modes:
      - id: turboquant_3bit_16pt
        bits_per_elem: 5.3
        compression_ratio: 3.0
      - id: hadamard_int4_16pt
        bits_per_elem: 5.0
        compression_ratio: 3.2
      - id: bypass_fp16
        bits_per_elem: 16
        compression_ratio: 1.0
    area_mm2: 0.08
    verification_tests: 60
    risk: low                                                  # mostly LASSO inheritance

  - id: memory_subsystem_controller
    name: Memory Subsystem Controller (MSC)
    function: |
      Single LPDDR5X x16 controller; 4-port SRAM crossbar; 128-entry block
      table for KV paging. Single-session — no continuous batching, no
      Tier-3 eviction.
    microarchitecture:
      lpddr5x_controllers: 1
      sram_crossbar_ports: 4
      block_table_entries: 128
      block_size_tokens: 16
      hw_features:
        - dma_descriptor_fsm
        - simple_prefetch
        - on_demand_kv_decompress
        - request_arbitration_pq
    area_mm2: 0.18
    verification_tests: 50
    risk: medium

  - id: layer_sequencer
    name: Layer Sequencer (LSU) — minimal
    function: |
      Tiny in-order RISC + vector dispatch. 32-instruction ISA, 4K microcode,
      16×32b GPR. Loads pre-compiled schedule for one model at boot.
    area_mm2: 0.10
    verification_tests: 30
    risk: low

  - id: host_interface
    name: Serial Host Interface (sHIF)
    function: |
      USB-C 2.0 endpoint. Tokens are <1 KB; 60 MB/s is 100,000× more than
      needed for token I/O. Weight load at boot: 1-2.5 GB / 60 MB/s = 17-42
      sec — acceptable. JTAG + scan chain for debug.
    bandwidth_gb_s: 0.06
    area_mm2: 0.30
    verification_tests: 25
    risk: low

# -----------------------------------------------------------------------------
# Top-level area accounting
# -----------------------------------------------------------------------------
top_level:
  die_area_target_mm2: 4.0
  die_area_target_mm2_basis: |
    IMEC / Europractice mini@sic 2.0 minimum block area at TSMC 16nm. Aligns
    with Muse Semiconductor 4 mm² Full Block. 2×2 mm or any X×Y summing to
    4 mm² acceptable per mini@sic 2.0 flexibility.
  area_accounting_mm2:
    # Corrected v0.3 by scripts/v2_design_space/area_audit.py
    # SRAM SHRUNK to 0.8 MB to fit 4.0 mm² at PHY=1.2 mm² (mid-case)
    matrix_engine_8x8: 0.10
    vector_unit_8_lane: 0.144
    kv_compression_engine_mini: 0.08
    memory_subsystem_controller: 0.18
    layer_sequencer: 0.10
    host_interface_serial: 0.30
    sram_kv_scratchpad_0_4mb: 0.35
    sram_activation_buffer_0_3mb: 0.26
    sram_weight_buffer_0_05mb: 0.05
    codebook_const_rom_64kb: 0.05
    on_chip_sram_total_subtotal: 0.71                          # 0.8 MB total
    lpddr5x_x16_phy: 1.20
    serial_host_phy: included_in_io_ring                       # USB-C SerDes pads in ring
    clock_tree_and_power_grid: 0.40
    io_ring_pads_esd: 0.76                                     # corrected v0.3: 0.70 → 0.76 per perimeter math
    routing_overhead_buffer: 0.10
    total_mm2: 3.974
    headroom_mm2: 0.026
    die_utilization_pct: 99
  area_status: WITHIN_BUDGET_AT_PHY_1_2_AND_SRAM_0_8MB
  area_sensitivity:
    phy_at_1_0mm2_best_case:
      total_mm2: 3.774
      sram_can_grow_to_mb: 1.0
      verdict: comfortable headroom; can keep original 1.0 MB SRAM target
    phy_at_1_2mm2_planning:
      total_mm2: 3.974
      sram_at_mb: 0.8
      verdict: fits with 0.026 mm² headroom; the v0.3 baseline
    phy_at_1_5mm2_worst_case:
      total_mm2: 4.274
      verdict: |
        Does NOT fit. Options: (a) downgrade to LPDDR4X x16 (loses model class
        from 4-5B to 1-2B), (b) grow die to 4.5 mm² (~+12% shuttle cost),
        (c) drop SRAM to 0.5 MB (loses on-die KV capacity).

  shrink_paths:
    - id: shrink_kv_scratchpad_to_0_4mb
      saves_mm2: 0.10
      cost: ~370 single-layer tokens (Llama-3.2-3B); still >1500 for Qwen-style
      recommended_first: true
    - id: shrink_activation_buffer_to_0_2mb
      saves_mm2: 0.08
      cost: forces FA tile=8 (smaller); slower per-tile but functional
    - id: drop_weight_stream_buffer_to_0_1mb
      saves_mm2: 0.04
      cost: minimal — 0.1 MB is still 80× streaming minimum
    - id: drop_to_lpddr4x_x16
      saves_mm2: 0.20
      cost: |
        Bandwidth halves to 6 GB/s; largest reasonable model drops from 5B
        to 1.2B. **Only do this if LPDDR5X PHY quote comes back > 1.5 mm²
        and budget cannot absorb the overage.**
      not_recommended: true                                    # whole point of v0.2 was upgrade to LPDDR5X x16

  preferred_landing: |
    4.0 mm² with `shrink_kv_scratchpad_to_0_4mb` if audit forces it. Most
    likely actual landing: 3.96 mm² with 0.9 MB SRAM.

# -----------------------------------------------------------------------------
# Quantization strategy
# -----------------------------------------------------------------------------
quantization_strategy:
  weights:
    primary: int4_per_channel_groupwise
  activations:
    primary: int8_per_token_dynamic
  kv_cache:
    primary: turboquant_3bit_with_16pt_hadamard
    secondary: hadamard_int4_16pt
    bypass: fp16
    fp4_codebook_mode: optional                                # alt ROM contents
  attention_compute:
    primary: int8_q_x_int8_pv_with_fp16_softmax_accum

# -----------------------------------------------------------------------------
# Performance targets
# -----------------------------------------------------------------------------
performance_targets:

  decode_throughput_table_lpddr5x_x16:
    # Verified 2026-04-26 by scripts/v2_design_space/roofline.py
    # All numbers derived: weight_GB / 11.94 GB/s sustained = ms/token
    # Sustained = 70% of peak (LPDDR5X-8533 x16 peak = 17.07 GB/s)
    derivation_basis: weight_GB / 11.94_GB_s_sustained = ms/token; 1000/ms = tok/s
    targets:
      - model: SmolLM2-360M
        params_billion: 0.36
        weight_GB_w4: 0.18
        ms_per_tok: 15.1
        tok_per_sec: 66.4
        verdict: very_comfortable_overkill
      - model: Qwen2.5-0.5B
        params_billion: 0.5
        weight_GB_w4: 0.25
        ms_per_tok: 20.9
        tok_per_sec: 47.8
        verdict: very_comfortable
      - model: Llama-3.2-1B
        params_billion: 1.24
        weight_GB_w4: 0.62
        ms_per_tok: 51.9
        tok_per_sec: 19.3
        verdict: very_comfortable
      - model: TinyLlama-1.1B
        params_billion: 1.1
        weight_GB_w4: 0.55
        ms_per_tok: 46.0
        tok_per_sec: 21.7
        verdict: very_comfortable
      - model: Gemma-2-2B
        params_billion: 2.0
        weight_GB_w4: 1.0
        ms_per_tok: 83.7
        tok_per_sec: 11.9
        verdict: comfortable
      - model: Llama-3.2-3B
        params_billion: 3.21
        weight_GB_w4: 1.605
        ms_per_tok: 134.4
        tok_per_sec: 7.4
        verdict: borderline_interactive                         # (was claimed 8 — corrected)
      - model: Qwen2.5-3B
        params_billion: 3.09
        weight_GB_w4: 1.545
        ms_per_tok: 129.3
        tok_per_sec: 7.7
        verdict: borderline_interactive
        notes: 32K context fits ON-DIE per layer (2 KV × 128 dim → 4,681 tokens at 0.5 MB)
      - model: Mistral-NeMo-3B
        params_billion: 3.0
        weight_GB_w4: 1.5
        ms_per_tok: 125.6
        tok_per_sec: 8.0
        verdict: comfortable_interactive                        # the genuine sweet spot
      - model: Phi-3.5-mini
        params_billion: 3.82
        weight_GB_w4: 1.91
        ms_per_tok: 159.9
        tok_per_sec: 6.3
        verdict: borderline_interactive
      - model: hypothetical_4B
        params_billion: 4.0
        weight_GB_w4: 2.0
        ms_per_tok: 167.4
        tok_per_sec: 6.0
        verdict: borderline_interactive
      - model: hypothetical_5B
        params_billion: 5.0
        weight_GB_w4: 2.5
        ms_per_tok: 209.3
        tok_per_sec: 4.8
        verdict: at_threshold (just below 5 tok/s)
      - model: Mistral-7B
        params_billion: 7.24
        weight_GB_w4: 3.62
        ms_per_tok: 303.0
        tok_per_sec: 3.3
        verdict: below_threshold_at_W4_needs_W3_or_v2_stretch
      - model: Llama-3.1-8B
        params_billion: 8.03
        weight_GB_w4: 4.01
        ms_per_tok: 336.1
        tok_per_sec: 3.0
        verdict: below_threshold_use_v2_stretch_lpddr5x_x32

  compute_headroom_check:
    # Verified by lambda_v2_audit.py: at bandwidth-bound decode,
    # GOPS_needed = 2 × bandwidth_GBs / W4_bytes_per_param = constant ≈ 48 GOPS
    # GOPS_available = peak_TOPS × util × 1000 = 0.128 × 0.6 × 1000 = 76.8 GOPS
    headroom_factor: 1.6
    notes: |
      Compute headroom is 1.6× across the entire bandwidth-bound model range
      (constant because compute_needed scales with bandwidth, not model size).
      NOT 3-5× as earlier claimed. 1.6× is adequate margin for production but
      tighter than originally suggested. Compute is NOT the bottleneck at any
      v2 baseline operating point; bandwidth is the entire story.

  largest_reasonable_model_summary:
    primary_target: 3-4B class (Llama-3.2-3B, Mistral-NeMo-3B, Qwen2.5-3B)
    primary_target_perf: 6-8 tok/s comfortable interactive
    ceiling: 5B at ~5 tok/s borderline interactive
    above_ceiling_with_aggressive_quant: |
      7B-class with W3 quantization could reach ~5 tok/s. Not the v0.2 target
      but plausible for a v1.0 stretch experiment IF W3 quality holds for the
      target model — needs evaluation against TurboQuant's 3.5b paper and
      RotateKV / QuaRot W3 results.

  prefill_latency_128_prompt_3B:
    target_ms: 6_000_to_9_000
    derivation: 2 × 128 × 3e9 = 7.7e11 FLOPs / 0.13 TOPS / 50% util = 12 sec → realistic 6-9 sec
    use_case: comfortable interactive prompt size

  prefill_latency_64_prompt_3B:
    target_ms: 3_000_to_5_000
    use_case: interactive_quick

  power_budget:
    # Verified by scripts/v2_design_space/power_budget.py
    target_watts_typical: 2.5                                  # decode bandwidth-bound, 50% MatE util
    target_watts_peak: 3.1                                     # prefill burst, 100% MatE util
    target_watts_basis: |
      Verified breakdown at LPDDR5X x16, 12 GB/s sustained:
        LPDDR PHY+DRAM (7.5 mW/Gbps × 96 Gbps = 720 mW)        0.72 W
        MatE 64 PEs at 50% util (5 W/TOPS × 0.128 × 0.5)       0.32 W
        VecU 8 lanes (0.04 W/lane × 8 × 0.5 util)              0.16 W
        SRAM 0.8 MB at 50% util (0.4 W/MB × 0.8 × 0.5)         0.16 W
        KCE                                                     0.05 W
        MSC + LSU + HIF                                         0.30 W
        Whole-chip leakage at 16nm 0.8V (~0.7 W for 4 mm²)     0.70 W
        TOTAL TYPICAL DECODE                                   ~2.4 W
        TOTAL PEAK PREFILL (100% util MatE+VecU, 80% SRAM)    ~3.1 W
    sources:
      - Samsung/Micron LPDDR5X product briefs (7.5 mW/Gbps system)
      - 16nm dense INT8 systolic energy ~5 W/TOPS (sparse can be 2-4x better)
      - 16nm 0.8V 4 mm² leakage estimate from TSMC FinFET reliability docs
    estimate: true                                             # post-silicon characterization needed
    margin_vs_fanless_envelope: |
      Single-USB-C delivery (5V × 3A = 15 W) leaves >10 W headroom even at
      worst-case 5 W chip operation. Fanless / battery deployment trivially
      feasible at ~3 W typical.

  energy_per_token_3B_at_7_to_8_tok_s:
    target_mj_per_token: ~325                                  # verified: 2.6 W × 125 ms = 325 mJ
    derivation: 2.6 W typical × 125-135 ms/tok (3B class) = 320-350 mJ/token
    comparable_baselines:
      x86_cpu_3b_inference: ~3000_to_5000_mj_per_token         # 30-50 W × 100 ms
      apple_neural_engine_3b: ~200_mj_per_token                # estimated; closed-source
      qualcomm_hexagon_npu_3b: ~250_mj_per_token               # estimated; closed-source
    notes: |
      v2 is **9-15× better than CPU-only inference** at 3B class — the main
      pitch (was claimed 6-10× with overstated 4 W power; verified 2.6 W
      makes the win larger). Closed-source mobile NPUs (Apple ANE / Qualcomm
      Hexagon) remain 1.5-2× better thanks to integration tightness; v2 is
      the open-source academic standalone version of the same workload.

  peak_compute_int8w4_tops: 0.128

# -----------------------------------------------------------------------------
# Verification
# -----------------------------------------------------------------------------
verification:
  total_tests_estimated: 240
  breakdown_by_block:
    matE: 50
    vecU: 25
    kce: 60
    msc: 50
    lsu: 30
    hif: 25
  reuse_from_lasso: ~40%
  effective_new_tests: ~180
  estimated_person_months_at_student_velocity: ~28

# -----------------------------------------------------------------------------
# Cost
# -----------------------------------------------------------------------------
cost_analysis:
  shuttle_cost_estimate_usd: 60_000_to_100_000
  shuttle_cost_basis: |
    IMEC / Europractice mini@sic 2.0 academic-discount Full Block at TSMC
    16nm. Pricing non-public; reconfirm via eptsmc@imec.be price-request form.
    Comparable Muse 4 mm² Full Block ~$75K.
  ip_licensing_cost_estimate_usd: 80_000_to_150_000
  ip_licensing_basis: |
    LPDDR5X x16 PHY (Synopsys or Cadence) ~$80-130K (LPDDR5X is more expensive
    than LPDDR4X by ~50%). USB 2.0 controller free or minimal. Total ~$80-150K.
  total_chip_cost_usd: 140_000_to_250_000

# =============================================================================
# v2 STRETCH — LPDDR5X x32 PHY (the larger-model alternative within v2)
# =============================================================================
# Documented for the user to evaluate. Not the v0.2 baseline.

v2_stretch_lpddr5x_x32:
  description: |
    Trade SRAM and KV scratchpad for ~2× more LPDDR bandwidth, enabling
    7-8B-class models on the same 4 mm² die. Compute becomes the bottleneck
    rather than bandwidth.

  area_accounting_mm2:
    lpddr5x_x32_phy: 1.80                                      # +0.6 vs v2 baseline x16
    serial_host_phy: 0.10
    io_ring_pads_esd: 0.70
    clock_tree_and_power_grid: 0.40
    matrix_engine_8x8: 0.10                                    # unchanged
    vector_unit_8_lane: 0.15
    kv_compression_engine_mini: 0.08
    memory_subsystem_controller: 0.18
    layer_sequencer: 0.10
    host_interface_serial: 0.30
    sram_kv_scratchpad_0_15mb: 0.12                            # -0.28 vs v2 baseline (huge cut)
    sram_activation_buffer_0_2mb: 0.16
    sram_weight_buffer_0_05mb: 0.04
    codebook_const_rom_64kb: 0.05
    routing_overhead_buffer: 0.10
    total_mm2: 4.38
    headroom_mm2: -0.38
    die_utilization_pct: ~110
  area_status: OVER_BUDGET — would need 4.4-4.5 mm² die, +20-25% shuttle cost

  bandwidth_and_perf:
    sustained_bandwidth_gb_s: 25
    largest_reasonable_model_at_5_tok_s: ~10B params (theoretical bandwidth)
    bottleneck_at_7B: compute (98 GOPS needed vs 78 GOPS sustained = 80% utilization required)
    realistic_perf:
      - model: Mistral-7B / Qwen2.5-7B / Llama-3.1-8B
        params_billion: 7_to_8
        weight_GB_w4: 3.5_to_4.0
        ms_per_tok_bandwidth: 140_to_160
        tok_per_sec_bandwidth_bound: 6.3_to_7.1
        tok_per_sec_compute_bound: ~5.5
        actual_tok_per_sec: ~5.5_to_6                          # min of the two; compute-bound
        verdict: borderline_5to6_tok_s
      - model: Llama-3-8B
        params_billion: 8
        weight_GB_w4: 4.0
        actual_tok_per_sec: ~5
        verdict: at_threshold

  trades_against_v2_baseline:
    pros:
      - Largest serviceable model class jumps from 5B to 7-8B (same as flagship targeted)
      - First open-source academic 8B-class accelerator at 4-4.5 mm²
      - Research story is materially stronger
    cons:
      - Die area pushes to ~4.4 mm²; ~20-25% shuttle cost overage (estimated $90-130K)
      - LPDDR5X x32 PHY area uncertainty is bigger absolute swing (1.8 ± 0.4 mm²)
      - On-die KV scratchpad shrinks to 0.15 MB — practically vestigial
      - Compute fabric bottlenecks at 7-8B (utilization > 80% required)
      - Verification load grows: ~30 PM (vs v2 baseline's ~28)
      - Power budget grows to ~5.5-6 W (LPDDR5X x32 ~3 W vs x16 ~1.5 W)

  when_to_choose_stretch:
    - Faculty/sponsor specifically wants "8B-class on 4 mm²" headline
    - Budget can absorb ~$90-130K shuttle (vs v2 baseline ~$60-100K)
    - Team is comfortable with LPDDR5X x32 PHY integration risk
    - Compute-bottlenecked operation is acceptable (drops sub-linear scaling
      vs bandwidth-bound)

  when_to_NOT_choose_stretch:
    - Cost overage is unfundable
    - PHY integration risk is already maxed out for the team
    - 3-5B model class is sufficient for the customer wedge
    - On-die KV scratchpad (essentially zero in stretch) is required for any reason

  recommendation: |
    Don't pre-commit to the stretch in v0.2. Get the LPDDR5X x16 quote first.
    If x16 PHY comes in well under 1.2 mm² (e.g., 1.0 mm²), the area savings
    can fund a stretch to x32 — or grow SRAM. If x16 comes in over 1.2 mm²,
    even baseline v2 is at risk and stretch is off the table.

# -----------------------------------------------------------------------------
# Recommendation
# -----------------------------------------------------------------------------
recommendation:
  status: PROPOSED_AMBITIOUS_ALTERNATIVE_TO_V1
  one_line: |
    Choose Lambda v2 if the team can absorb LPDDR PHY integration risk and
    wants a STANDALONE chip running 3-5B models on-die at 6-8 tok/s.

  why_v2_at_lpddr5x_x16: |
    The LPDDR5X x16 PHY upgrade vs LPDDR4X x16 doubles bandwidth (12 vs 6 GB/s)
    for +0.2 mm² die area and +1 W power. This SINGLE CHANGE quadruples the
    largest serviceable model class — from ~1.2B (LPDDR4X) to ~5B (LPDDR5X x16).
    At the SAME 4 mm² die. Lambda v2 now serves the same 3-4B model class
    that the abandoned 25 mm² flagship was targeting at 7-8B — in 1/6 the area
    and 1/5 the cost. Strict Pareto improvement over the prior LPDDR4X spec.

  why_proceed: |
    First open-source academic standalone transformer accelerator running
    3-4B-class models at 4 mm². No prior silicon at this scale + openness +
    workload class exists. Apple Neural Engine and Qualcomm Hexagon are the
    closest commercial cousins; both proprietary integrated SoCs.

  why_caution: |
    LPDDR PHY at 16nm is the team's first FinFET-era PHY integration. The
    1.2 mm² estimate has ±0.3 mm² real uncertainty. If PHY comes in at 1.5 mm²,
    every other block has to shrink. Hire/partner with senior PD engineer
    with FinFET + DDR PHY experience as condition of this path.

  next_concrete_steps:
    - 1_decide_v1_vs_v2:
        owner: architecture_lead + faculty_advisor
        deliverable: explicit go/no-go on v1-conservative vs v2-ambitious
        deadline: 2026-06
    - 2_quote_imec_4mm2:
        owner: architecture_lead
        deliverable: written IMEC / Europractice mini@sic 2.0 quote for 4 mm² N16FFC
        deadline: 2026-05
    - 3_lpddr5x_x16_phy_quote:
        owner: architecture_lead
        deliverable: written LPDDR5X x16 PHY quote at 16nm (Synopsys + Cadence)
        deadline: 2026-06
    - 4_choose_target_model:
        owner: architecture_lead + ML student
        deliverable: explicit primary model (Llama-3.2-3B vs Qwen2.5-3B vs Mistral-NeMo-3B)
        deadline: 2026-07

# -----------------------------------------------------------------------------
# Risks
# -----------------------------------------------------------------------------
risks:

  - id: R-Lv2-01
    severity: critical
    description: LPDDR5X x16 PHY integration is unprecedented for the team
    evidence: |
      Previous tape-out (LASSO) was all-digital via Caravel. v2 introduces
      LPDDR PHY: clock-domain crossings, reference voltages, calibration
      loops, analog corner verification.
    mitigation: |
      Mandatory hire/partner with senior PD engineer with FinFET + DDR PHY
      experience. Single biggest non-architectural risk.

  - id: R-Lv2-02
    severity: high
    description: Zero/negative headroom in 4 mm² area budget
    evidence: 4.06 mm² of 4.0 mm² target = 1.5% over.
    mitigation: Apply `shrink_kv_scratchpad_to_0_4mb` early in v0.2.

  - id: R-Lv2-03
    severity: high
    description: LPDDR5X x16 PHY area estimate (1.2 mm²) could be 1.0 to 1.5
    evidence: |
      Vendor IP at 16nm is NDA-gated. The 1.2 mm² estimate scales from x64
      LPDDR5X (~2.5 mm²) with ~50% sub-linear scaling.
    mitigation: |
      Vendor quote in Q2 2026. If 1.5 mm², chip becomes infeasible at 4 mm²
      → fall back to LPDDR4X x16 (loses model class) or grow to 4.5 mm².

  - id: R-Lv2-04
    severity: medium
    description: 3-5B model class commoditized by mobile SoC NPUs by 2028
    evidence: |
      Apple may target 3-4B by 2028; Snapdragon 8 Gen 4 may include 3B-class
      NPUs. The class may move up to 7-8B by tape-out time.
    mitigation: |
      Architecture supports up to 7B with W3 (stretch) or via LPDDR5X x32
      stretch. Position chip as "smallest viable open standalone accelerator"
      not "best 3-5B accelerator."

  - id: R-Lv2-05
    severity: medium
    description: 16-point Hadamard KCE has ~5% lower compression than 32-point
    mitigation: Acceptable — saves 0.07 mm². Document as deliberate trade.

  - id: R-Lv2-06
    severity: medium
    description: ~28 person-months verification scales tight against 5-7 person team
    mitigation: |
      Either grow team for v2 or accept v1's lower load (~22 PM). Don't try
      v2 with v1's team capacity.

  - id: R-Lv2-07
    severity: low
    description: Single-session-only operation limits demo richness
    mitigation: |
      Single-session is fine for "tiny LLM ASIC running standalone" pitch.
      If continuous batching matters, that argues for upsizing — currently
      excluded per 4 mm² budget commitment.

