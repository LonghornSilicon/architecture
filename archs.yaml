# Longhorn Silicon — Architecture Design Space (LASSO/SKY130 — ARCHIVED)
# =============================================================================
# STATUS as of 2026-04-26: ARCHIVED. The project pivoted from LASSO/SKY130 to
# Lambda (Lambda) on TSMC N16FFC in late April 2026. The current chip target
# is `archs/Lambda_25mm2.yaml`, with PRD/rationale in
# `PRDs/lambda-v2/`. The KCE block from A3+ carries forward into Lambda; the
# rest of LASSO is superseded.
#
# This file is preserved because:
#   - The KCE inheritance reasoning (Hadamard + Lloyd-Max codebook) is still
#     load-bearing for Lambda
#   - The algorithm-vs-algorithm rejection rationales (FP4 arithmetic, PolarQuant)
#     still inform Lambda decisions
#   - Inline §-references to `PRD.md` and `PRD-v1-prudent.md` below now point to
#     `PRDs/lasso-v0-original/PRD.md` and `PRDs/lasso-v1-prudent/PRD.md` respectively
#
# Purpose: Machine-readable comparison of three candidate architectures for
#   the LASSO KV cache coprocessor tape-out. This file is the single source of
#   truth for architectural trade-offs, grounded in specific research claims
#   and cited numerically. Every area/quality/throughput figure is either
#   (a) derived from a cited paper, (b) a 130nm rule-of-thumb estimate with
#   its basis stated, or (c) explicitly marked as speculative.
#
# How to use:
#   - `architectures.*` compares the three candidate chips end-to-end
#   - `algorithms.*` compares quantization schemes independent of any chip
#   - `decision_matrix` scores each architecture on weighted axes
#   - `citations` resolves every [C-xx] reference to a paper or artifact
#
# Editing rules:
#   - Every numeric claim must cite [C-xx] or be tagged `estimate: true`
#   - Never weaken a risk to make an option look better
#   - If a number is speculative, say so — don't launder it into a fact
# =============================================================================

metadata:
  project: Longhorn Silicon
  codename: LASSO
  document: archs.yaml
  version: 1.1
  date: 2026-04-21
  author: Longhorn Silicon Architecture Team
  classification: CONFIDENTIAL — Internal Use Only
  supersedes: null
  companions:
    - PRDs/lasso-v0-original/PRD.md              # Full 4-block vision (archived)
    - PRDs/lasso-v1-prudent/PRD.md               # Prudent 2-block baseline A2 (archived)
    - PRDs/lasso-v0-original/design-rationale.md # Why decisions were made (archived)
    - archs/README.md                            # Per-architecture design-space exploration (A2, A3, A3⁺, A4-lean)
    - PRDs/lambda-v2/PRD.md                      # CURRENT chip target (TSMC 16nm Lambda)
    - archs/Lambda_25mm2.yaml          # CURRENT chip YAML

# -----------------------------------------------------------------------------
# Where detailed per-architecture design spaces live
# -----------------------------------------------------------------------------
# This document is the master comparison/decision matrix/sensitivity analysis.
# For per-architecture knobs, trade-offs, and critical decisions, see the
# disaggregated files in `archs/`:
#
#   archs/
#   ├── _shared/
#   │   ├── process.yaml          Process + Caravel + density constants
#   │   ├── algorithms.yaml       INT4, Hadamard-INT4, TurboQuant, FP4, rejected variants
#   │   ├── citations.yaml        Reference bibliography [C-xx]
#   │   ├── evaluation_axes.yaml  Scoring dimensions and sensitivity-analysis variants
#   │   └── shared_risks.yaml     Risks that apply to every candidate
#   ├── A2_prudent_int4.yaml         Safe fallback — "always ships"
#   ├── A3_turboquant_minimal.yaml   2-block TurboQuant — "conservative ambitious"
#   ├── A3plus_turboquant_extended.yaml  2-block + QJL + FP4 + compressed-domain Q·K
#   └── A4lean_full_stack.yaml       4-block + TurboQuant, no DMA — "max ambition that ships"
#
# A1 (original 4-block INT4) and A4-full (4-block + DMA) were deliberately
# excluded from the subdirectory as "not worth exploring" — see archs/README.md
# for the rationale.

subdirectory_mapping:
  A1_full_4block:
    file: null
    status: excluded_from_subdirectory
    reason: dominated_by_A4lean
  A2_prudent_int4:
    file: archs/lasso/LASSO_A2_prudent_int4.yaml
    tier: prudent
    status: fallback
  A3_turboquant_2block:
    file: archs/lasso/LASSO_A3_turboquant_minimal.yaml
    tier: ambitious
    status: candidate
  A3plus_turboquant_extended:
    file: archs/lasso/LASSO_A3plus_turboquant_extended.yaml
    tier: ambitious
    status: proposed_sweet_spot
  A4lean_full_stack:
    file: archs/lasso/LASSO_A4lean_full_stack.yaml
    tier: stretch
    status: candidate

# -----------------------------------------------------------------------------
# Physical & process constants — the non-negotiables
# -----------------------------------------------------------------------------
process:
  node: SKY130
  feature_size_nm: 130
  vendor: SkyWater Technology Foundry
  shuttle: Efabless chipIgnite
  supply_voltage_v: 1.8
  die_area_mm2: 10.0
  die_area_usable_mm2: 8.5           # ~1.5 mm² lost to I/O ring and pads [C-13]
  gate_density_per_mm2: 150000       # logic cells, from design-rationale.md [C-13]
  sram_density_mb_per_mm2: 0.15      # typical 6T SRAM at 130nm [C-13]
  total_transistors: 15000000
  nominal_clock_mhz: 50              # conservative target, 100 MHz stretch [C-13]
  toolchain:
    synthesis: Yosys
    floorplan: OpenROAD
    placement: DREAMPlace
    routing: TritonRoute
    drc_lvs: Magic + Netgen
    flow: OpenLane 2
    simulation: Verilator + cocotb

sram_ip:
  macro: CF_SRAM_16384x32
  source: github.com/LonghornSilicon/SRAM_16384x32
  bytes_per_macro: 65536             # 16384 words × 32 bits ÷ 8
  area_per_macro_mm2: 0.875          # measured from PRD-v1-prudent.md §7
  read_latency_ns_estimate: 3.0      # 130nm 64KB macro; 50 MHz cycle = 20 ns ⇒ >5x margin
  read_latency_source: design-rationale.md §"Why 50MHz Clock Target"

host_interface:
  bus: Wishbone B4
  bus_width_bits: 32
  bus_target_mhz: 50
  caravel_compatible: true
  dma_master_available: true         # Caravel provides WB master; relevant for DMA stretch

team:
  size_min: 4
  size_target: 5
  roles:
    - architecture_lead
    - rtl_lead
    - verification_lead
    - physical_design_lead
    - flex_rtl_or_pd                 # 0–2 depending on architecture chosen

timeline:
  prd_freeze: 2026-05
  golden_model_done: 2026-08
  rtl_freeze_baseline: 2027-02
  stretch_window_close: 2027-04
  gdsii_submission: 2027-11
  silicon_return: 2028-01
  demo_deadline: 2028-05

# -----------------------------------------------------------------------------
# Evaluation axes — the dimensions we score architectures on
# -----------------------------------------------------------------------------
evaluation_axes:
  - id: tapeout_feasibility
    weight: 0.30
    description: Probability of shipping GDSII by Nov 2027 with DRC/LVS clean
    direction: higher_is_better
  - id: functional_correctness_confidence
    weight: 0.25
    description: Likelihood that the silicon returns and works as specified
    direction: higher_is_better
  - id: research_novelty
    weight: 0.15
    description: Publication strength — first-of-kind, defensible claim
    direction: higher_is_better
  - id: compression_ratio
    weight: 0.10
    description: Achievable KV cache compression (memory reduction vs FP16)
    direction: higher_is_better
  - id: quality_preservation
    weight: 0.10
    description: PPL degradation vs FP16 on standard benchmarks
    direction: lower_is_better
  - id: area_efficiency
    weight: 0.05
    description: Fraction of die used productively (SRAM + logic)
    direction: higher_is_better
  - id: scalability_to_new_node
    weight: 0.05
    description: How well the architecture re-synthesizes at 22nm/28nm
    direction: higher_is_better

# =============================================================================
# ALGORITHMS — the quantization schemes, independent of any specific chip
# =============================================================================
algorithms:

  # ---------------------------------------------------------------------------
  int4_uniform:
    name: INT4 symmetric per-group uniform quantization
    category: scalar_linear
    paper_reference: [C-04, C-05]    # GEAR, RotateKV use this as baseline
    status: well_understood
    encoding:
      operation_sequence:
        - per_group_max_abs          # 32-input comparator tree
        - shift_based_scale          # reciprocal via barrel shifter, no divider
        - multiply_and_round         # 32 parallel int multiplies
        - clamp_to_int4_range        # saturation
        - bitpack_4_per_word         # 8 values per 32-bit word
      primitives_required:
        comparators_16bit: 31        # 32→1 reduction tree
        multipliers_16x16: 32        # parallel quantize
        barrel_shifter: 1            # scale reciprocal
        lut_bytes: 0                 # none
        sqrt_units: 0
        trig_units: 0
    decoding:
      operation_sequence:
        - bitunpack_4_per_word
        - multiply_by_scale          # 32 parallel 16b × 16b
      primitives_required:
        multipliers_16x16: 32
        lut_bytes: 0
    storage_overhead_bits_per_group_of_32:
      scale_16bit: 16
      zero_point_16bit: 16           # only if asymmetric; symmetric mode omits
      payload: 128                   # 32 × 4 bits
      total_symmetric: 144           # 4.5 bits/element effective
      total_asymmetric: 160          # 5.0 bits/element effective
    effective_bits_per_element: 4.5
    compression_vs_fp16: 3.56
    quality:
      perplexity_delta_wikitext_llama2_7b: 0.21   # from GEAR [C-04] baseline int4
      source: C-04
      notes: Degrades on outlier-heavy layers without preprocessing
    hardware_friendly_score: 10      # scale: 1 (terrible) to 10 (trivial)
    verification_tests_estimate: 30

  # ---------------------------------------------------------------------------
  int2_uniform:
    name: INT2 symmetric per-group uniform quantization
    category: scalar_linear
    paper_reference: [C-05]          # RotateKV
    status: well_understood_with_caveat
    notes: >
      Raw INT2 without rotation preprocessing is not competitive; perplexity
      blows up because extreme outliers cannot be represented in 4 levels.
      RotateKV shows INT2 is viable ONLY after Hadamard rotation [C-05].
    effective_bits_per_element: 2.5  # 2 payload + 0.5 scale amortized
    compression_vs_fp16: 6.4
    quality:
      perplexity_delta_raw: 3.5      # significant, wikitext llama2 estimate from [C-04]
      perplexity_delta_with_hadamard: 0.29   # RotateKV INT2 result [C-05]
      source: C-05
    hardware_friendly_score: 10
    verification_tests_estimate: 30

  # ---------------------------------------------------------------------------
  hadamard_int4:
    name: Walsh-Hadamard rotation + INT4 (QuaRot/RotateKV style)
    category: scalar_linear_with_rotation
    paper_reference: [C-05, C-06, C-07]   # RotateKV, QuaRot, SpinQuant
    status: production_ready_in_gpu_software
    encoding:
      operation_sequence:
        - walsh_hadamard_transform   # 32-point WHT, 5 butterfly stages
        - per_group_max_abs          # post-rotation; distribution now flattened
        - shift_based_scale
        - multiply_and_round
        - clamp_to_int4_range
        - bitpack_4_per_word
      primitives_required:
        adders_16bit_butterfly: 160  # 5 stages × 32 ops = 160 add/sub [C-06 overhead analysis]
        comparators_16bit: 31
        multipliers_16x16: 32
        barrel_shifter: 1
        lut_bytes: 0
        sqrt_units: 0
        trig_units: 0
    decoding:
      operation_sequence:
        - bitunpack_4_per_word
        - multiply_by_scale
        - inverse_walsh_hadamard     # identical network to forward (self-inverse up to scale)
      primitives_required:
        adders_16bit_butterfly: 160
        multipliers_16x16: 32
    scaling_factor:
      note: >
        For a 32-point Hadamard, the normalized forward/inverse both multiply by
        1/sqrt(32). In hardware we defer the sqrt until dequantize and absorb it
        into the stored scale factor. This avoids runtime sqrt entirely.
    effective_bits_per_element: 4.5
    compression_vs_fp16: 3.56        # same compression as plain INT4
    quality:
      perplexity_delta_wikitext_llama2_7b: 0.11   # RotateKV INT4 result [C-05]
      source: C-05
      notes: >
        Hadamard "smears" outliers across dimensions, flattening the distribution.
        INT4 quantization error drops by roughly 50% vs plain INT4 at same bits.
    hardware_friendly_score: 9       # one butterfly stage is the only added complexity
    verification_tests_estimate: 35  # +5 for Hadamard: self-inverse round-trip checks

  # ---------------------------------------------------------------------------
  turboquant:
    name: TurboQuant — random rotation + Lloyd-Max scalar codebook
    category: codebook_with_rotation
    paper_reference: [C-01]          # Zandieh et al. arXiv 2504.19874, ICLR 2026
    status: bleeding_edge_software   # no silicon yet as of 2026-04
    priority_in_this_design: AMBITIOUS_TARGET
    algorithm_summary: >
      Apply a random orthogonal rotation (Walsh-Hadamard in hardware; QR-decomposed
      Gaussian in the original paper — equivalent up to a small constant under the
      concentration argument [C-01], [C-12]). The rotation induces a near-Beta
      distribution on each coordinate. Quantize each coordinate independently
      using a Lloyd-Max optimal scalar codebook of 2^b centroids, precomputed
      offline against the Beta distribution. No training, no fine-tuning, no
      per-prompt calibration. Decode = codebook LUT read + inverse rotation.
    critical_insight: >
      The original paper uses QR-decomposed Gaussian rotation. For hardware, we
      substitute a Walsh-Hadamard transform. Block-Rotation-for-MXFP4 [C-12]
      confirms (Nov 2025) that block-wise and Walsh-Hadamard rotations achieve
      equivalent or better quality on activation quantization. The concentration
      argument that makes TurboQuant work — that post-rotation coordinates
      approach a Beta distribution — holds for any sufficiently orthogonal
      rotation matrix, not just Gaussian-random ones.
    encoding:
      operation_sequence:
        - walsh_hadamard_transform   # 32-point WHT
        - nearest_centroid_per_coord # 7 comparators per lane against fixed 8-centroid codebook (3-bit case)
        - bitpack_3_per_word         # 10 values per 32-bit word + slack
      primitives_required:
        adders_16bit_butterfly: 160  # Hadamard
        comparators_16bit: 224       # 7 thresholds × 32 lanes for 3-bit codebook
        multipliers: 0               # encode needs NO multipliers [C-01]
        lut_bytes: 64                # 8 centroids × 16-bit × 1 shared codebook = 16 bytes; x4 for per-dim-group = 64 bytes
    decoding:
      operation_sequence:
        - bitunpack_3_per_word
        - codebook_lut_read          # 32 parallel LUT reads, 3b index → 16b centroid
        - inverse_walsh_hadamard     # same butterfly network
      primitives_required:
        adders_16bit_butterfly: 160
        multipliers: 0               # decode needs NO multipliers either [C-01]
        lut_bytes: 64                # same codebook as encode
    killer_hardware_property: >
      The dequantize path has ZERO multipliers. It is butterfly-adds + LUT-reads.
      This is dramatically cheaper than INT4's 32×16-bit multipliers for dequant.
      At 130nm, 32 multipliers ~ 0.04 mm²; their replacement with a 64-byte LUT
      and routing is ~ 0.003 mm² — an order of magnitude smaller.
    storage_overhead_bits_per_group_of_32:
      scale_16bit: 0                 # no per-group scale — codebook is fixed [C-01]
      magnitude_16bit: 16            # one preserved L2 norm per group (or optional)
      payload: 96                    # 32 × 3 bits
      total: 112                     # 3.5 bits/element effective
    effective_bits_per_element: 3.5
    compression_vs_fp16: 4.57
    quality:
      perplexity_delta_neutral_bits: 3.5   # [C-01] reports quality neutrality at 3.5 b/ch
      perplexity_delta_2_5_bits: 0.5       # [C-01] reports marginal degradation at 2.5 b/ch
      source: C-01
      notes: >
        TurboQuant explicitly proves near-optimal rate-distortion for both
        MSE and inner-product metrics. Inner-product preservation is what
        attention actually needs. [C-01] §3.
    hardware_friendly_score: 9       # actually FRIENDLIER than Hadamard+INT4 for decode
    verification_tests_estimate: 80  # golden model must be bit-exact against Python Lloyd-Max output
    verification_risks:
      - id: VR-TQ-01
        risk: Lloyd-Max centroids in ROM must match Python golden bit-exactly
        mitigation: Freeze codebook in checked-in Python; ROM initialization auto-generated
      - id: VR-TQ-02
        risk: Hadamard scale factor (1/sqrt(32)) handling
        mitigation: Defer scaling until dequant; absorb into optional magnitude

  # ---------------------------------------------------------------------------
  polarquant:
    name: PolarQuant — actual polar coordinate tree
    category: polar_tree
    paper_reference: [C-02]          # Han et al. arXiv 2502.02617, NeurIPS 2025
    status: rejected_for_130nm
    rejection_reason: >
      PolarQuant-proper requires sin/cos/atan2/sqrt at inference. Even with a
      3-bit angle LUT, reconstruction of a 128-dim vector requires 254 multiply
      operations organized in a 7-level sequential tree. At 130nm with 32 parallel
      lanes, the multiplier fabric alone consumes >0.3 mm² (≈5x the full KV Cache
      Engine). The quality win over Hadamard+INT4 is marginal (~0.1-0.2 PPL).
      See design-rationale.md §"Why Not PolarQuant for v1".
    encoding:
      primitives_required:
        sqrt_units: 1                # or squared-magnitude deferral
        atan2_or_threshold_compare: 31  # per-node angle classification
        multipliers_16x16: 32
    decoding:
      primitives_required:
        sin_cos_lut_bytes: 64
        multipliers_16x16: 62        # r × cos and r × sin at each of 31 tree nodes
        sequential_stages: 7         # cannot parallelize across tree levels
    effective_bits_per_element: 3.875   # [C-02] reports bFPN+46 per 16 coords
    compression_vs_fp16: 4.2
    quality:
      perplexity_delta: 0.08         # [C-02] near-lossless claim
      source: C-02
    hardware_friendly_score: 3
    verification_tests_estimate: 150

  # ---------------------------------------------------------------------------
  nvfp4:
    name: NVFP4 / MXFP4 microscaling floating point
    category: block_floating_point
    paper_reference: [C-08, C-12]
    status: rejected_for_130nm
    rejection_reason: >
      FP4 multipliers require exponent alignment, normalization, and subnormal
      handling. At 130nm this ~triples gate count per multiplier vs INT4 [C-08,
      design-rationale.md]. FP4's non-uniform levels help on unrotated data, but
      Hadamard rotation flattens the distribution and eliminates that advantage.
      NVFP4 has hardware acceleration only on NVIDIA Blackwell [C-08]; at 130nm
      we pay the gate-count cost without recovering the speedup. Block Rotation
      for MXFP4 [C-12] further confirms that global rotation is pathological
      with MXFP4's PoT block scaling — a hazard the paper was written to fix.
    decision: not_implemented_in_any_arch
    revisit_at_node: 28nm

# =============================================================================
# ARCHITECTURES — the three candidate chips
# =============================================================================
architectures:

  # ---------------------------------------------------------------------------
  A1_full_4block:
    name: Full LASSO — 4-block ambitious architecture
    source_doc: PRD.md
    summary: >
      KV Cache Engine + Token Importance Unit + Memory Hierarchy Controller +
      Lightweight Attention Compute Unit. All four blocks in silicon, with
      on-chip dot-product scoring, hardware page table, DMA, and eviction policy.
    blocks:
      - id: kv_cache_engine
        function: INT2/3/4 quantize/dequantize, bit-pack/unpack
        area_mm2: 0.07               # PRD.md §5
        verification_tests: 30
        risk: medium
      - id: token_importance_unit
        function: Per-token score accumulator, 8-wide comparator tree, eviction controller
        area_mm2: 0.02               # PRD.md §6 + PRD-v1-prudent.md §8
        verification_tests: 20
        risk: medium
      - id: memory_hierarchy_controller
        function: SRAM bank mgr, page table, DMA engine, compressed write-back
        area_mm2: 0.03               # estimate; includes DMA descriptor FSM
        area_mm2_estimate: true
        verification_tests: 45       # DMA + page table is the verif heavyweight
        risk: high
      - id: attention_compute_unit
        function: 32-wide Q·K dot product; mode A (dequant then MAC) or mode B (compressed-domain)
        area_mm2: 0.06               # PRD.md §8, matches PRD-v1-prudent.md Stretch B
        verification_tests: 25
        risk: medium
      - id: sram_subsystem
        function: 6–8 banks of CF_SRAM_16384x32
        area_mm2: 5.25               # 6 banks × 0.875
        verification_tests: 5        # macro is pre-verified IP
        risk: medium                 # physical design risk from congestion
    resource_summary:
      logic_area_mm2: 0.18
      sram_area_mm2: 5.25
      io_ring_mm2: 1.50
      routing_clock_mm2: 1.50
      total_mm2: 8.43
      die_utilization_pct: 84.3
      headroom_mm2: 0.07             # effectively no margin
      total_verification_tests: 125
    algorithm_support:
      primary: int4_uniform
      secondary: [int2_uniform]
      rotation: none                 # PRD.md does not include Hadamard
    capabilities:
      on_chip_kv_tokens_q4: 819      # PRD-v1-prudent.md §7 with 6 banks prorated
      on_chip_kv_tokens_q2: 1365
      on_chip_dot_product: true
      on_chip_eviction: true
      on_chip_dma: true
      on_chip_page_table: true
      host_can_run_attention_standalone: true  # chip can score tokens without host roundtrip
    software_offload:
      - softmax
      - v_weighting_final_sum
      - mlp_and_ffn
      - layer_norm
    critical_path:
      description: SRAM read → unpack → dequant multiply → adder tree → accumulator → WB write
      estimated_depth_ns: 14         # pushes up against 20 ns @ 50 MHz
      risk_at_100mhz: timing_closure_likely_fails
    timeline_fit:
      verification_effort_person_months: 24   # 125 tests × ~6 days each
      gdsii_by_nov_2027: false                # at 5-person team, arithmetic says mid-2028
      gdsii_by_nov_2027_confidence_pct: 25
    research_narrative:
      title_candidate: "LASSO: Open-source KV Cache Coprocessor with On-chip Eviction and Dot-Product Scoring"
      novelty_strength: 7            # /10 — first open-source hardware eviction policy
      comparable_prior_art: [C-03]   # Titanus (GLSVLSI'25)
      differentiation: >
        Titanus [C-03] shows simulated cascade-pruning+quantization energy
        efficiency. A1 would be the first open-source *taped-out* implementation
        of a complete KV cache coprocessor. Stronger paper than either A2 or A3,
        IF it ships. The risk is that it doesn't.
    risks:
      - id: R-A1-01
        severity: critical
        description: Four-block chip exceeds verification capacity of a student team
        evidence: >
          Published estimates for DMA engine verification alone are 30-40 tests
          over 6-8 weeks per person [PRD-v1-prudent.md §10]. Combined with page
          table, eviction logic, and attention compute, the verification burden
          is ~24 person-months against a ~12 person-month calendar.
      - id: R-A1-02
        severity: high
        description: Area budget leaves <1% headroom for routing/PD iteration
        evidence: 8.43 mm² of 10 mm² with logic, SRAM, I/O, and clock tree
      - id: R-A1-03
        severity: high
        description: Page table + DMA corner cases often miss tapeout
        evidence: design-rationale.md and standard industry experience
    fit_scoring:
      tapeout_feasibility: 3
      functional_correctness_confidence: 5
      research_novelty: 9
      compression_ratio: 6            # INT4/INT2, no rotation
      quality_preservation: 4         # lower is better; raw INT4 degrades on outliers
      area_efficiency: 9
      scalability_to_new_node: 8

  # ---------------------------------------------------------------------------
  A2_prudent_int4:
    name: Prudent LASSO — 2-block INT4 baseline
    source_doc: PRD-v1-prudent.md
    summary: >
      KV Cache Engine (INT2/3/4 uniform) + SRAM Buffer Controller only.
      Everything else runs on host. The chip proves the compression datapath
      in silicon and provides a Wishbone-addressable KV cache.
    blocks:
      - id: kv_cache_engine
        function: INT2/3/4 quantize, dequantize, bit-pack, unpack, bypass mode
        area_mm2: 0.07               # PRD-v1-prudent.md §4
        verification_tests: 30
        risk: medium
      - id: sram_buffer_controller
        function: Wishbone B4 slave, address decode, CSRs, bank arbitration
        area_mm2: 0.02               # PRD-v1-prudent.md §5
        verification_tests: 20
        risk: low
      - id: sram_subsystem
        function: 4-6 banks of CF_SRAM_16384x32
        area_mm2: 3.50               # 4 banks × 0.875 = 3.5 mm²
        verification_tests: 5
        risk: low
    resource_summary:
      logic_area_mm2: 0.09
      sram_area_mm2: 3.50
      io_ring_mm2: 1.50
      routing_clock_mm2: 1.50
      total_mm2: 6.59
      die_utilization_pct: 65.9
      headroom_mm2: 3.41             # generous — ~33% free for additional SRAM or margin
      total_verification_tests: 61
    algorithm_support:
      primary: int4_uniform
      secondary: [int2_uniform]
      rotation: none
    capabilities:
      on_chip_kv_tokens_q4: 819      # 4 banks × Q4 = 819 tokens per PRD-v1-prudent.md §7
      on_chip_kv_tokens_q2: 1365
      on_chip_dot_product: false     # host computes Q·K
      on_chip_eviction: false        # host manages address table
      on_chip_dma: false             # host reads/writes raw SRAM
      on_chip_page_table: false
      host_can_run_attention_standalone: false
    software_offload:
      - token_importance_scoring
      - eviction_decisions
      - address_table_management
      - off_chip_dma
      - full_attention_compute
      - softmax
      - everything_except_compression
    critical_path:
      description: SRAM read → unpack → dequant multiply → WB data out
      estimated_depth_ns: 8
      risk_at_100mhz: likely_closes
    timeline_fit:
      verification_effort_person_months: 9
      gdsii_by_nov_2027: true
      gdsii_by_nov_2027_confidence_pct: 85
    research_narrative:
      title_candidate: "LASSO v1: A Minimal Open-Source KV Cache Compression ASIC on SKY130"
      novelty_strength: 5            # /10 — correct, taped out, but INT4 is 2022-era
      comparable_prior_art: [C-04, C-05]
      differentiation: >
        Correct, publishable at student-workshop tier (MICRO-SRC, DAC WIP).
        But INT4-with-scale-factor is a 2022-era algorithm. In 2027 silicon,
        this is "the first open-source tape-out of a well-understood algorithm"
        — a fabrication achievement, not an architectural contribution.
    risks:
      - id: R-A2-01
        severity: medium
        description: Research contribution is thin if this is all we build
        evidence: TurboQuant [C-01], Oaken [C-10] have moved the frontier in 2025-26
      - id: R-A2-02
        severity: low
        description: INT4 without rotation degrades on outlier-heavy layers
        evidence: GEAR [C-04] shows this; mitigation = accept it and document
    fit_scoring:
      tapeout_feasibility: 10
      functional_correctness_confidence: 9
      research_novelty: 5
      compression_ratio: 6
      quality_preservation: 5
      area_efficiency: 6             # leaves 33% free
      scalability_to_new_node: 9

  # ---------------------------------------------------------------------------
  A3_turboquant_2block:
    name: TurboQuant LASSO — 2-block bleeding-edge algorithm implementation
    source_doc: this_file                # no separate PRD yet — see recommendation
    status: PROPOSED
    summary: >
      Same physical structure as A2 (two blocks + SRAM) but the KV Cache Engine
      implements TurboQuant [C-01] in silicon: Walsh-Hadamard rotation + Lloyd-Max
      codebook LUT + inverse Hadamard. First silicon implementation of
      TurboQuant-class KV cache compression.
    blocks:
      - id: kv_cache_engine_turboquant
        function: >
          32-point Walsh-Hadamard transform (forward and inverse), per-coordinate
          Lloyd-Max nearest-centroid classifier (7 comparators × 32 lanes for 3-bit),
          codebook ROM (64 bytes), bit-pack/unpack for 3-bit packed storage.
          Optional passthrough to INT4 mode for comparison/fallback.
        area_mm2: 0.09               # see breakdown below
        area_breakdown_mm2:
          walsh_hadamard_butterfly_network: 0.012     # 160 adders shared across 5 stages
          nearest_centroid_comparators: 0.018         # 7 × 32 = 224 comparators
          codebook_rom: 0.001                         # 64 B — trivial
          bit_pack_unpack_3bit: 0.006                 # slightly more complex than 4-bit
          int4_fallback_datapath: 0.035               # keep INT4 as mode A, optional
          pipeline_registers_control: 0.018
        verification_tests: 65
        risk: medium_high
      - id: sram_buffer_controller
        function: Wishbone B4 slave, address decode, CSRs, bank arbitration, mode select
        area_mm2: 0.02
        verification_tests: 22       # +2 for mode-select coverage
        risk: low
      - id: sram_subsystem
        function: 4-6 banks of CF_SRAM_16384x32
        area_mm2: 3.50
        verification_tests: 5
        risk: low
    resource_summary:
      logic_area_mm2: 0.11
      sram_area_mm2: 3.50
      io_ring_mm2: 1.50
      routing_clock_mm2: 1.50
      total_mm2: 6.61
      die_utilization_pct: 66.1
      headroom_mm2: 3.39
      total_verification_tests: 92
    algorithm_support:
      primary: turboquant            # mode 0: Hadamard + 3-bit Lloyd-Max codebook
      secondary: [hadamard_int4, int4_uniform]   # mode 1 and 2: fallback paths
      rotation: walsh_hadamard_32point
    operating_modes:
      - id: mode_0_turboquant
        bit_width: 3
        rotation: walsh_hadamard
        quantizer: lloyd_max_codebook
        bits_per_element_effective: 3.5
        compression_vs_fp16: 4.57
        expected_quality_ppl_delta: 0.05   # [C-01] 3.5b neutrality claim, conservative
      - id: mode_1_hadamard_int4
        bit_width: 4
        rotation: walsh_hadamard
        quantizer: uniform_with_scale
        bits_per_element_effective: 4.5
        compression_vs_fp16: 3.56
        expected_quality_ppl_delta: 0.11   # [C-05]
      - id: mode_2_int4_baseline
        bit_width: 4
        rotation: none
        quantizer: uniform_with_scale
        bits_per_element_effective: 4.5
        compression_vs_fp16: 3.56
        expected_quality_ppl_delta: 0.21   # [C-04]
      - id: mode_3_bypass
        bit_width: 16
        notes: raw pass-through for debug and host-managed mode
    capabilities:
      on_chip_kv_tokens_turboquant_3bit: 1050   # 4 banks × 3.5 bits/elem ≈ 1050 tokens @ 128-dim
      on_chip_kv_tokens_hadamard_int4: 819
      on_chip_kv_tokens_int4_baseline: 819
      on_chip_kv_tokens_bypass: 256
      on_chip_dot_product: false
      on_chip_eviction: false
      on_chip_dma: false
      on_chip_page_table: false
      host_can_run_attention_standalone: false
    software_offload:
      - codebook_precomputation_offline    # Python Lloyd-Max against Beta(α,β) distribution [C-01]
      - token_importance_scoring
      - eviction_decisions
      - address_table_management
      - off_chip_dma
      - full_attention_compute
    critical_path:
      description: SRAM read → unpack → codebook LUT → inverse Hadamard butterfly → WB data out
      estimated_depth_ns: 11
      risk_at_100mhz: medium_may_need_pipeline_cut
      notes: >
        Inverse Hadamard butterfly has 5 stages of adds, ~1.5 ns per stage at 130nm.
        Total rotation path is ~7.5 ns. LUT read + final register is ~3.5 ns. Fits
        20 ns budget at 50 MHz with ~8 ns margin. At 100 MHz, the butterfly should
        be pipelined across 2 cycles.
    timeline_fit:
      verification_effort_person_months: 14
      gdsii_by_nov_2027: true
      gdsii_by_nov_2027_confidence_pct: 70
      notes: >
        Modest overrun risk (1-2 months) if Lloyd-Max golden model takes longer
        than expected. Mitigate by starting golden model in June 2026, one month
        before Phase 0 nominally begins.
    research_narrative:
      title_candidate: "First Silicon Implementation of TurboQuant: Rotation-and-Codebook KV Cache Compression on Open-Source SKY130"
      novelty_strength: 9            # /10
      comparable_prior_art: [C-01, C-10]   # TurboQuant software, Oaken silicon (different algo)
      differentiation: >
        TurboQuant [C-01] was published as an ICLR 2026 paper with CUDA kernels
        for H100 GPUs. There is no silicon implementation as of April 2026.
        Oaken [C-10] is the closest silicon prior art but uses outlier-threshold
        INT4, not rotation-plus-codebook. This chip would be the first fabricated
        ASIC of the rotation-plus-scalar-codebook paradigm — a defensible first.
        Additional narrative: it's also the first ASIC demonstration that the
        rotation + codebook paradigm replaces 32 parallel multipliers with
        ~64 bytes of ROM, a structural hardware advantage over INT4.
    extra_narrative_hooks:
      - ascii_title: "Zero-multiplier KV cache dequantization"
        claim_basis: "TurboQuant decode is LUT + Hadamard butterfly; no multipliers needed [C-01] + this design"
      - ascii_title: "32-point Walsh-Hadamard transform in 0.012 mm² at 130nm"
        claim_basis: "5-stage butterfly, 160 add/sub cells; measurable artifact"
      - ascii_title: "Lloyd-Max codebook ROM for Beta-distributed rotated KV data"
        claim_basis: "[C-01] §4 analytic Beta distribution; Lloyd-Max offline computation"
    risks:
      - id: R-A3-01
        severity: medium
        description: Lloyd-Max golden model must match hardware ROM bit-exactly
        mitigation: >
          Auto-generate ROM contents from checked-in Python Lloyd-Max script
          during synthesis. Python script is both the golden model and the
          ROM init file. Fixed codebook across all experiments — no online
          update logic.
      - id: R-A3-02
        severity: medium
        description: Walsh-Hadamard scaling factor footgun
        mitigation: >
          Defer 1/sqrt(32) scaling until dequant; absorb into optional per-group
          magnitude word. Never normalize mid-pipeline. Document explicitly.
      - id: R-A3-03
        severity: medium
        description: TurboQuant is a 2025-2026 paper; peer review is ongoing
        mitigation: >
          Keep Hadamard+INT4 as Mode 1 and plain INT4 as Mode 2. If TurboQuant
          is later found to have flaws, the chip still demonstrates a useful
          architecture (rotated INT4) and paper narrative pivots.
      - id: R-A3-04
        severity: low
        description: Bit-pack at 3 bits is slightly more complex than 4-bit (10 values per word + slack)
        mitigation: Design 3-bit packer first; it is the more complex case
      - id: R-A3-05
        severity: low
        description: Codebook is fixed offline — quality depends on how representative the calibration is
        evidence_against: TurboQuant is data-oblivious by construction [C-01] §1
    fit_scoring:
      tapeout_feasibility: 9
      functional_correctness_confidence: 8
      research_novelty: 9
      compression_ratio: 8
      quality_preservation: 8        # mode_0 approaches lossless per [C-01]
      area_efficiency: 7
      scalability_to_new_node: 10    # rotation + codebook scales trivially to 28nm

# =============================================================================
# DECISION MATRIX — weighted scoring
# =============================================================================
decision_matrix:
  methodology: >
    Each architecture is scored 1-10 on each evaluation axis. Scores are
    multiplied by axis weights (defined above) and summed. Higher is better
    for all axes except `quality_preservation`, which is inverted so "9 in
    quality preservation" means PPL delta close to zero. A1 absorbs a penalty
    in `tapeout_feasibility` that the headline score reflects.
  weighted_scores:
    A1_full_4block:
      components:
        tapeout_feasibility:             {score: 3, weight: 0.30, weighted: 0.90}
        functional_correctness_confidence: {score: 5, weight: 0.25, weighted: 1.25}
        research_novelty:                {score: 9, weight: 0.15, weighted: 1.35}
        compression_ratio:               {score: 6, weight: 0.10, weighted: 0.60}
        quality_preservation:            {score: 4, weight: 0.10, weighted: 0.40}
        area_efficiency:                 {score: 9, weight: 0.05, weighted: 0.45}
        scalability_to_new_node:         {score: 8, weight: 0.05, weighted: 0.40}
      total: 5.35
    A2_prudent_int4:
      components:
        tapeout_feasibility:             {score: 10, weight: 0.30, weighted: 3.00}
        functional_correctness_confidence: {score: 9, weight: 0.25, weighted: 2.25}
        research_novelty:                {score: 5, weight: 0.15, weighted: 0.75}
        compression_ratio:               {score: 6, weight: 0.10, weighted: 0.60}
        quality_preservation:            {score: 5, weight: 0.10, weighted: 0.50}
        area_efficiency:                 {score: 6, weight: 0.05, weighted: 0.30}
        scalability_to_new_node:         {score: 9, weight: 0.05, weighted: 0.45}
      total: 7.85
    A3_turboquant_2block:
      components:
        tapeout_feasibility:             {score: 9, weight: 0.30, weighted: 2.70}
        functional_correctness_confidence: {score: 8, weight: 0.25, weighted: 2.00}
        research_novelty:                {score: 9, weight: 0.15, weighted: 1.35}
        compression_ratio:               {score: 8, weight: 0.10, weighted: 0.80}
        quality_preservation:            {score: 8, weight: 0.10, weighted: 0.80}
        area_efficiency:                 {score: 7, weight: 0.05, weighted: 0.35}
        scalability_to_new_node:         {score: 10, weight: 0.05, weighted: 0.50}
      total: 8.50
  ranking:
    - {rank: 1, arch: A3_turboquant_2block, total: 8.50}
    - {rank: 2, arch: A2_prudent_int4,      total: 7.85}
    - {rank: 3, arch: A1_full_4block,       total: 5.35}

# =============================================================================
# SENSITIVITY ANALYSIS — how do rankings change if you reweight?
# =============================================================================
sensitivity:
  if_tapeout_is_everything:
    note: Set tapeout_feasibility weight to 0.60, all others scaled down
    ranking:
      - {rank: 1, arch: A2_prudent_int4,      reason: "guaranteed to ship"}
      - {rank: 2, arch: A3_turboquant_2block, reason: "almost as safe, stronger story"}
      - {rank: 3, arch: A1_full_4block,       reason: "high risk of schedule miss"}
  if_research_novelty_is_everything:
    note: Set research_novelty weight to 0.50
    ranking:
      - {rank: 1, arch: A3_turboquant_2block, reason: "first silicon TurboQuant — defensible claim that ships"}
      - {rank: 2, arch: A1_full_4block,       reason: "strongest paper if it ships; 25% chance it does"}
      - {rank: 3, arch: A2_prudent_int4,      reason: "correct but algorithmically dated"}
  if_quality_is_everything:
    note: Set quality_preservation weight to 0.40
    ranking:
      - {rank: 1, arch: A3_turboquant_2block}
      - {rank: 2, arch: A2_prudent_int4}
      - {rank: 3, arch: A1_full_4block}
  observation: >
    A3 wins in every sensitivity scenario where we don't downweight novelty to
    zero. It also wins on the default weighting. This is not a narrowly
    dominant result — it's a structurally dominant one. The reason is that A3
    inherits A2's tapeout feasibility (same block count, similar area, similar
    test count) while adopting a 2026-frontier algorithm. It's the Pareto
    frontier of feasibility × novelty.

