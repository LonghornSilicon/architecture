# ============================================================================
# Reference bibliography for all LASSO architecture files
# ============================================================================
# Every numeric claim in per-arch files cites [C-xx] from this file.
# New citations must be added here with: title, authors/venue, year, URL,
# and a short "what this paper is load-bearing for" note.
# ============================================================================

metadata:
  name: LASSO research bibliography
  version: 1.0
  last_updated: 2026-04-21

citations:

  C-01:
    title: "TurboQuant: Online Vector Quantization with Near-optimal Distortion Rate"
    authors: [Zandieh Amir, Daliri Majid, Hadian Majid, Mirrokni Vahab]
    affiliation: Google Research
    venue: ICLR 2026
    arxiv: "2504.19874"
    year: 2025
    url: https://arxiv.org/abs/2504.19874
    load_bearing_for:
      - Primary algorithm for A3, A3⁺, A4-lean
      - 3.5-bit quality-neutrality claim
      - Zero-multiplier decode path
      - Lloyd-Max codebook against Beta distribution

  C-02:
    title: "PolarQuant: Quantizing KV Caches with Polar Transformation"
    authors: [Han Insu, et al.]
    affiliation: KAIST
    venue: NeurIPS 2025
    arxiv: "2502.02617"
    year: 2025
    url: https://arxiv.org/abs/2502.02617
    load_bearing_for:
      - Rejection rationale for polar-coordinate-based methods
      - Different algorithm from TurboQuant despite similar naming

  C-03:
    title: "Titanus: Enabling KV Cache Pruning and Quantization On-the-Fly for LLM Acceleration"
    venue: GLSVLSI 2025
    year: 2025
    load_bearing_for:
      - Closest architectural analog to A4-lean
      - 159.9x energy efficiency over A100 (simulated, not silicon)

  C-04:
    title: "GEAR: An Efficient KV Cache Compression Recipe for Near-Lossless Generative Inference of LLM"
    arxiv: "2403.05527"
    year: 2024
    load_bearing_for:
      - Baseline INT4 perplexity numbers for A2

  C-05:
    title: "RotateKV: Accurate and Robust 2-bit KV Cache Quantization for LLMs via Outlier-Aware Adaptive Rotations"
    venue: AAAI 2025
    year: 2025
    load_bearing_for:
      - Hadamard + INT2/INT4 near-lossless quality
      - Supports Hadamard-INT4 as Mode 1 fallback in A3⁺/A4-lean

  C-06:
    title: "QuaRot: Outlier-Free 4-Bit Inference in Rotated LLMs"
    authors: [Ashkboos Saleh, et al.]
    venue: OpenReview dfqsW38v1X
    year: 2024
    url: https://openreview.net/pdf?id=dfqsW38v1X
    load_bearing_for:
      - 4-rotation architecture validation
      - Walsh-Hadamard as production rotation primitive
      - 7% overhead benchmark for rotation in software

  C-07:
    title: "SpinQuant: LLM Quantization with Learned Rotations"
    arxiv: "2405.16406"
    year: 2024
    url: https://arxiv.org/pdf/2405.16406
    load_bearing_for:
      - Generality of rotation-plus-quantization paradigm

  C-08:
    title: "Introducing NVFP4 for Efficient and Accurate Low-Precision Inference"
    publisher: NVIDIA Developer Blog / Technical Blog
    year: 2026
    url: https://developer.nvidia.com/blog/introducing-nvfp4-for-efficient-and-accurate-low-precision-inference/
    load_bearing_for:
      - FP4 E2M1 codebook values {0, 0.5, 1, 1.5, 2, 3, 4, 6}
      - Blackwell-only tensor-core native FP4 acceleration
      - NVFP4 block size 16 vs MXFP4 block size 32

  C-09:
    title: "KVQuant: Towards 10 Million Context Length LLM Inference with KV Cache Quantization"
    venue: NeurIPS 2024
    url: https://www.stat.berkeley.edu/~mmahoney/pubs/neurips-2024-kvquant.pdf
    year: 2024
    load_bearing_for:
      - Sub-4-bit frontier context
      - Out-of-scope for v1 but referenced as longer-term direction

  C-10:
    title: "Oaken: Fast and Efficient LLM Serving with Online-Offline Hybrid KV Cache Quantization"
    venue: ISCA 2025
    arxiv: "2503.18599"
    year: 2025
    url: https://arxiv.org/abs/2503.18599
    load_bearing_for:
      - Closest silicon prior art for A3⁺/A4-lean
      - 1.79x throughput, 0.87% accuracy loss, 8.21% area overhead numbers
      - Architecturally distinct (outlier-threshold INT4, not rotation+codebook)

  C-11:
    title: "HadaCore: Tensor Core Accelerated Hadamard Transform Kernel"
    publisher: PyTorch Blog
    year: 2025
    url: https://pytorch.org/blog/hadacore/
    load_bearing_for:
      - Industrial Hadamard kernel reference
      - Validates Hadamard as production primitive

  C-12:
    title: "Block Rotation is All You Need for MXFP4 Quantization"
    arxiv: "2511.04214"
    year: 2025
    url: https://arxiv.org/abs/2511.04214
    load_bearing_for:
      - Critical support for substituting Walsh-Hadamard for QR-decomposed
        random rotation in TurboQuant
      - Quantifies rotation latency overhead (40% reduction with block-wise)
      - Nov 2025 frontier confirmation

  C-13:
    title: "LASSO Design Rationale (internal)"
    local_path: ../../design-rationale.md
    load_bearing_for:
      - 130nm density rules
      - FP4 rejection rationale
      - Process-node comparison table

  C-14:
    title: "SkyWater SKY130 PDK — Standard Cell Library Documentation"
    url: https://skywater-pdk.readthedocs.io/en/main/contents/libraries/foundry-provided.html
    load_bearing_for:
      - Standard cell gate density (266 kGates/mm² raw, 160 kGates/mm² routed)
      - sky130_fd_sc_hd library parameters

  C-15:
    title: "Caravel harness documentation (Efabless)"
    url: https://caravel-harness.readthedocs.io/
    load_bearing_for:
      - Caravel user project wrapper exact dimensions (2.92 × 3.52 mm)
      - 38 GPIO + 4 power pads provided by harness
      - Wishbone B4 interface spec

  C-16:
    title: "OpenRAM SKY130 macros (VLSIDA)"
    url: https://github.com/VLSIDA/OpenRAM
    load_bearing_for:
      - Small SRAM macro density calibration (1 KB = 0.191 mm²)

  C-17:
    title: "CF_SRAM_16384x32 (Longhorn Silicon)"
    url: https://github.com/LonghornSilicon/SRAM_16384x32
    load_bearing_for:
      - LASSO SRAM macro (64 KB per macro, 0.875 mm² area)
