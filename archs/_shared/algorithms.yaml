# ============================================================================
# Shared algorithm specifications for LASSO
# ============================================================================
# Each quantization scheme spec'd independent of any specific architecture.
# Per-architecture files reference algorithm IDs from this file by listing
# them in `depends_on.algorithms`.
#
# Every numeric claim cites [C-xx] from citations.yaml or is tagged as
# estimate: true. Quality numbers are reported against LLaMA-2-7B /
# WikiText-2 unless otherwise noted.
# ============================================================================

metadata:
  name: LASSO supported quantization algorithms
  version: 1.0
  last_updated: 2026-04-21

# ============================================================================
# INT4 uniform with per-group scale
# ============================================================================
int4_uniform:
  name: INT4 symmetric per-group uniform quantization
  category: scalar_linear
  status: well_understood
  paper_refs: [C-04]
  description: >
    Classical per-group uniform quantization. Find max-abs over a group of
    32 or 64 elements, derive a scale factor, multiply-round each element to
    a 4-bit signed integer, store scale alongside payload.

  encoding:
    operations:
      - per_group_max_abs            # 32-input comparator tree
      - shift_based_scale_reciprocal # barrel shifter, no divider
      - multiply_and_round           # 32 parallel 16×16 multiplies
      - clamp_to_int4_range
      - bitpack_4_per_word           # 8 values per 32-bit word
    hardware_primitives:
      comparators_16bit: 31
      multipliers_16x16: 32
      barrel_shifters: 1
      lut_bytes: 0
      sqrt_units: 0
      trig_units: 0

  decoding:
    operations:
      - bitunpack_4_per_word
      - multiply_by_scale            # 32 parallel 16×16
    hardware_primitives:
      multipliers_16x16: 32
      lut_bytes: 0

  storage_bits_per_group_of_32:
    scale_16bit: 16
    zero_point_16bit: 16             # asymmetric only
    payload: 128                     # 32 × 4
    total_symmetric: 144             # 4.5 b/elem effective
    total_asymmetric: 160            # 5.0 b/elem effective

  effective_bits_per_element: 4.5
  compression_vs_fp16: 3.56
  quality:
    perplexity_delta_wikitext_llama2_7b: 0.21
    source: C-04
    notes: Degrades on outlier-heavy layers without preprocessing.

  hardware_friendly_score: 10
  verification_tests_estimate: 30

# ============================================================================
# INT2 uniform with per-group scale
# ============================================================================
int2_uniform:
  name: INT2 symmetric per-group uniform quantization
  category: scalar_linear
  status: well_understood_with_caveat
  paper_refs: [C-05]
  description: >
    Same structure as int4_uniform but with 2-bit codewords. Raw INT2 is not
    competitive — outlier values cannot fit in 4 levels. Becomes viable only
    after Hadamard rotation preprocessing.

  effective_bits_per_element: 2.5
  compression_vs_fp16: 6.4
  quality:
    perplexity_delta_raw: 3.5
    perplexity_delta_with_hadamard: 0.29
    source: C-05

  hardware_friendly_score: 10
  verification_tests_estimate: 30

# ============================================================================
# Hadamard + INT4 (QuaRot / RotateKV style)
# ============================================================================
hadamard_int4:
  name: Walsh-Hadamard rotation followed by INT4 uniform quantization
  category: scalar_linear_with_rotation
  status: production_ready_in_gpu_software
  paper_refs: [C-05, C-06, C-07]
  description: >
    Apply a 32-point Walsh-Hadamard transform before quantizing. The rotation
    "smears" outliers across all dimensions, flattening the coordinate
    distribution and making uniform INT4 much more accurate. Inverse Hadamard
    applied on dequantize. The transform is its own inverse up to a scale
    factor of 1/sqrt(32), which we absorb into the stored scale.

  encoding:
    operations:
      - walsh_hadamard_transform_32pt   # 5 butterfly stages, 160 add/sub
      - per_group_max_abs
      - shift_based_scale_reciprocal
      - multiply_and_round
      - clamp_to_int4_range
      - bitpack_4_per_word
    hardware_primitives:
      adders_16bit_butterfly: 160       # 5 stages × 32 ops
      comparators_16bit: 31
      multipliers_16x16: 32
      barrel_shifters: 1

  decoding:
    operations:
      - bitunpack_4_per_word
      - multiply_by_scale
      - inverse_walsh_hadamard_32pt     # identical network to forward
    hardware_primitives:
      adders_16bit_butterfly: 160
      multipliers_16x16: 32

  scaling_factor_handling: >
    For 32-point WHT, normalized forward and inverse both multiply by
    1/sqrt(32). In hardware, defer the sqrt until dequant and absorb into
    the stored scale factor. Never normalize mid-pipeline.

  effective_bits_per_element: 4.5
  compression_vs_fp16: 3.56
  quality:
    perplexity_delta_wikitext_llama2_7b: 0.11
    source: C-05

  hardware_friendly_score: 9
  verification_tests_estimate: 35

# ============================================================================
# TurboQuant — the bleeding-edge target
# ============================================================================
turboquant:
  name: TurboQuant — random rotation + Lloyd-Max scalar codebook
  category: codebook_with_rotation
  status: bleeding_edge_software
  paper_refs: [C-01]
  silicon_prior_art: none_as_of_2026-04
  description: >
    Apply a random orthogonal rotation (Walsh-Hadamard in hardware; original
    paper uses QR-decomposed Gaussian — equivalent under concentration
    argument, see [C-12]). Rotation induces a Beta-distributed per-coordinate
    distribution. Each coordinate then quantized independently with a
    Lloyd-Max optimal scalar codebook (8 centroids for 3-bit case), computed
    offline against the Beta distribution. Decode = LUT + inverse rotation.

  critical_insight: >
    Decode path requires ZERO multipliers. Adders (Hadamard butterfly) and
    LUT reads (codebook) only. This is structurally cheaper than INT4 at
    the same bit budget — the dequant multiplier fabric is replaced by a
    64-byte ROM.

  encoding:
    operations:
      - walsh_hadamard_transform_32pt
      - nearest_centroid_per_coordinate   # 7 comparators per lane for 3-bit
      - bitpack_3_per_word                # 10 values per 32-bit word + slack
    hardware_primitives:
      adders_16bit_butterfly: 160
      comparators_16bit: 224              # 7 × 32 lanes for 3-bit
      multipliers: 0                      # ZERO
      lut_bytes: 64                       # 8 centroids × 16-bit × 4 dim-groups

  decoding:
    operations:
      - bitunpack_3_per_word
      - codebook_lut_read                 # 32 parallel LUT reads
      - inverse_walsh_hadamard_32pt
    hardware_primitives:
      adders_16bit_butterfly: 160
      multipliers: 0                      # ZERO
      lut_bytes: 64

  storage_bits_per_group_of_32:
    scale_16bit: 0                        # codebook is fixed; no per-group scale
    magnitude_16bit: 16                   # optional preserved L2 norm
    payload: 96                           # 32 × 3
    total: 112                            # 3.5 b/elem effective

  effective_bits_per_element: 3.5
  compression_vs_fp16: 4.57
  quality:
    perplexity_delta_neutral_bits: 3.5    # near-zero PPL degradation at 3.5 b/ch
    perplexity_delta_2_5_bits: 0.5        # marginal degradation at 2.5 b/ch
    source: C-01

  hardware_friendly_score: 9
  verification_tests_estimate: 80
  verification_risks_specific:
    - Lloyd-Max centroids in ROM must match Python golden bit-exactly
    - Hadamard scale factor (1/sqrt(32)) handled exactly once at dequant

# ============================================================================
# TurboQuant + QJL residual (full two-stage algorithm)
# ============================================================================
turboquant_qjl:
  name: TurboQuant with Quantized-JL 1-bit residual correction
  category: codebook_with_rotation_and_residual
  status: bleeding_edge_software
  paper_refs: [C-01]
  description: >
    Extension of turboquant. After the first-stage codebook quantization,
    compute the residual (x - reconstructed). Apply a 1-bit Quantized JL
    projection to the residual. The combined reconstruction is an unbiased
    estimator of the inner product ⟨q, x⟩.
  extra_over_turboquant:
    storage_bits_per_group_of_32:
      qjl_1bit_payload: 32              # one bit per dimension for residual
      total: 144                        # 112 + 32 = 4.5 b/elem effective
    hardware_primitives_added:
      sign_flips: 32                    # QJL projection = sign(<u, residual>)
      xor_reduction: 1
      lut_bytes: 0
  quality_improvement_over_turboquant: >
    Makes the inner-product estimator unbiased (first stage alone is MSE
    optimal but biased on <q, x>). Empirically improves downstream attention
    quality on long-context benchmarks per [C-01] §5.
  hardware_friendly_score: 8
  verification_tests_estimate: 10  # additional on top of turboquant

# ============================================================================
# FP4 (E2M1) — as a configurable codebook mode
# ============================================================================
fp4_e2m1_as_codebook:
  name: FP4 E2M1 storage — implemented as a fixed codebook on TurboQuant hardware
  category: codebook_fixed_non_uniform
  status: hardware_compatible_with_turboquant
  paper_refs: [C-08]
  description: >
    NVFP4/MXFP4 E2M1 uses 8 representable magnitudes: {0, 0.5, 1, 1.5, 2,
    3, 4, 6} plus sign. This is structurally identical to a TurboQuant
    3-bit codebook with fixed (not Lloyd-Max-optimal) centroids. On LASSO,
    FP4 is implemented as an alternative ROM contents for the codebook,
    selected via a 1-bit CSR. No additional hardware beyond turboquant.

  codebook_values_signed_magnitude: [0, 0.5, 1.0, 1.5, 2.0, 3.0, 4.0, 6.0]
  source_for_codebook: bitsandbytes-foundation issue #851, NVIDIA FP4 spec

  block_scale_options:
    mxfp4:
      block_size: 32
      scale_bits: 8       # E8M0 per-block exponent
    nvfp4:
      block_size: 16
      scale_bits: 8

  extra_over_turboquant:
    hardware_primitives_added:
      codebook_rom_bytes: 16           # second 8-entry × 16-bit ROM
      mode_select_mux: 1
    hardware_primitives_saved: 0

  quality_vs_turboquant_on_rotated_data:
    relative_mse: ~1.5_to_2.0_x_worse
    reason: >
      FP4 levels concentrate near zero (designed for raw Gaussian-like
      activations). After Hadamard rotation, data distribution approaches
      Beta, which is flatter than Gaussian. Lloyd-Max optimal codebook
      matches Beta; FP4 does not.
    applicability: Useful for on-die comparison vs NVIDIA Blackwell NVFP4.

  quality_vs_turboquant_on_unrotated_data:
    relative_mse: comparable
    reason: FP4 is well-tuned for raw activation distributions.

  verification_tests_estimate: 5  # additional on top of turboquant

  research_value: >
    First silicon that can run TurboQuant and NVFP4 on the same KV cache
    with CSR-selectable modes. Direct apples-to-apples comparison is
    currently unpublished.

# ============================================================================
# PolarQuant — rejected
# ============================================================================
polarquant_rejected:
  name: PolarQuant — actual polar coordinate tree (different from TurboQuant)
  category: polar_tree
  status: rejected_for_130nm
  paper_refs: [C-02]
  rejection_reason: >
    Requires sin/cos/atan2/sqrt at inference. Even with a 3-bit angle LUT,
    reconstruction of a 128-dim vector requires 254 multiply operations in
    a 7-level sequential tree. Multiplier fabric alone would consume
    >0.3 mm² — 5x the entire KV Cache Engine. Quality advantage over
    Hadamard+INT4 is marginal (~0.1–0.2 PPL).
  do_not_confuse_with: turboquant  # Despite similar naming, completely different algorithm

# ============================================================================
# FP4 with true arithmetic (NVIDIA tensor core style) — rejected
# ============================================================================
fp4_true_arithmetic_rejected:
  name: FP4 with real exponent arithmetic (NVFP4 tensor-core native)
  category: block_floating_point_with_arithmetic
  status: rejected_for_130nm
  paper_refs: [C-08]
  rejection_reason: >
    FP4 multipliers require exponent alignment, normalization, and subnormal
    handling. ~3× gate count per multiplier vs INT4 at 130nm. Hardware
    acceleration benefit only appears on Blackwell tensor cores; at 130nm we
    pay the area cost without recovering the speedup. Hadamard rotation
    flattens the distribution and removes FP4's non-uniform-level advantage.
  viable_alternative: fp4_e2m1_as_codebook
