# =============================================================================
# Lambda v1 — KV cache + compressed-domain attention coprocessor (4 mm² die)
# =============================================================================
# 2×2 mm tier. The smallest credible Lambda variant. Cannot fit a transformer
# accelerator at 4 mm² (proved below in `feasibility_audit`); instead this is a
# 16nm port of the LASSO thesis: a KV cache compression + compressed-domain
# attention scoring coprocessor that pairs with a host CPU/GPU. The host runs
# every other transformer block; Lambda v1 holds compressed KV on-die and
# accelerates the memory-bandwidth-bound parts of attention.
#
# Use as: research vehicle that establishes "first-silicon TurboQuant +
# compressed-domain attention scoring" before betting on the full Lambda
# 25 mm² die. Or: the chip that ships if funding falls through for the
# flagship and the team needs a defensible academic artifact at the lowest
# possible cost.
#
# Companion files in this directory:
#   Lambda_25mm2.yaml     — flagship 7-8B inference accelerator (current target)
#   Lambda_mini_9mm2.yaml — 3-4B inference accelerator (graceful Tier B)
# =============================================================================

metadata:
  project: Longhorn Silicon
  chip_codename: Lambda
  arch_id: Lambda_v1
  arch_name: Lambda v1 — KV cache + compressed-domain attention coprocessor at 4 mm²
  document: archs/lambda/Lambda_v1_4mm2.yaml
  version: 0.2-draft
  created: 2026-04-26
  author: Longhorn Silicon Architecture Team
  classification: CONFIDENTIAL — Internal Use Only
  tier: conservative_4mm2
  status: candidate_alternative_to_v2
  one_line_summary: >
    Conservative 4 mm² alternative to Lambda v2. KV cache + compressed-domain
    attention coprocessor (no LPDDR, no PCIe) — pairs with a host CPU/GPU
    that runs the rest of the model. Lower risk, smaller verification surface,
    but requires host-side software stack to demo.
  companions:
    - archs/lambda/Lambda_v2_4mm2.yaml             # the ambitious alternative
    - STATUS.md                                    # v1-vs-v2 comparison and rationale
    - PRDs/lasso-v0-original/design-rationale.md   # KCE inheritance reasoning
  document_status: |
    Second draft (v0.2). Numbers gated on (a) IMEC / Europractice mini@sic
    2.0 quote for 4 mm² N16FFC Full Block (estimated $60-100K), and (b)
    confirmation of host-serial-iface choice (USB-C 3.2 vs LVDS vs simple
    PCIe). The previous v0.1 was named "Lambda v1" with three-tier framing
    (pico/mini/flagship); v0.2 simplifies to a binary v1-vs-v2 choice at
    the same 4 mm² budget per direction from architecture lead 2026-04-26.

# -----------------------------------------------------------------------------
# Why this die size at all — the audit before you commit
# -----------------------------------------------------------------------------
feasibility_audit:
  question: "Can 4 mm² hold a transformer accelerator at 16nm?"
  answer: "No. Triple-checked below. This tier is a coprocessor, not an accelerator."

  fixed_cost_floor_at_4mm2:
    description: |
      Any chip at 16nm has unavoidable fixed-cost area. Even if you built a
      heroic compute fabric, you must still pay for these. Numbers verified by
      derivation — see basis under each.
    items:
      - id: io_ring_pads_esd
        area_mm2: 0.7
        basis: |
          For a 2000 µm × 2000 µm die, perimeter = 8000 µm. With a 100 µm-wide
          I/O ring (typical at 16nm for ESD + power straps), ring area =
          8000 × 100 = 0.8 mm² before corner overlaps. After corner-cell sharing
          and pad merging, realistic budget is ~0.7 mm² = 17.5% of total die.
        risk: estimate; could be 0.6–0.9 depending on pad count and ESD strategy
      - id: clock_tree_power_grid_routing_overhead
        area_mm2: 0.4
        basis: |
          ~10% of die is the standard 16nm budget for clock tree, power grid,
          and routing channels between blocks. At 4 mm² that's 0.4 mm².
        risk: estimate; standard heuristic at 16nm
      - id: minimal_host_interface
        area_mm2: 0.5
        basis: |
          A simple serial host interface (USB-C, 1-lane LVDS, or Wishbone-over-
          serial) without PCIe. Roughly the area cost of a small SerDes pair
          plus controller logic. Significantly less than PCIe Gen3 x4 (~1 mm²)
          but still nontrivial.
        risk: vendor-specific; could be 0.3–0.7
      - id: subtotal_fixed_cost
        area_mm2: 1.6
        notes: 40% of the 4 mm² die before any compute or memory.

  what_could_have_fit_but_doesnt:
    - item: 1× LPDDR5X PHY at 16nm
      area_mm2: 2.5
      basis: vendor estimate (NDA-gated; public figures cluster 2-3 mm² per channel)
      verdict: |
        Adding LPDDR pushes total infrastructure to 1.6 + 2.5 = 4.1 mm². Already
        over budget WITHOUT any compute or SRAM. **Lambda v1 therefore CANNOT
        have LPDDR.** Model weights live in host DRAM; transferred over the
        serial host link per layer (slow but tolerable for the coprocessor use
        case where Lambda v1 is not running the model end-to-end).
    - item: PCIe Gen3 x4 PHY
      area_mm2: 1.0
      basis: smallest mature PCIe IP at 16nm (Synopsys DesignWare)
      verdict: |
        Adding PCIe pushes infrastructure to 1.6 + 1.0 = 2.6 mm². Possible but
        leaves only 1.4 mm² for everything else. Better to use a smaller serial
        interface and keep the budget for compute.

  what_fits_after_floor:
    available_budget_mm2: 2.4
    proposed_allocation:
      - block: KCE (TurboQuant rotation + Lloyd-Max codebook + bit-pack)
        area_mm2: 0.15
        basis: same 32-pt Hadamard butterfly + 8-centroid classifier as flagship Lambda KCE
      - block: compressed_domain_attention_scoring
        area_mm2: 0.15
        basis: |
          INT8 Q × 3-bit K dot-product unit (32 lanes), small VecU softmax.
          Scoring runs in compressed domain — no full dequant needed.
      - block: small_MSC_with_block_table
        area_mm2: 0.20
        basis: 256-entry block table + simple arbitration; no LPDDR controller
      - block: minimal_LSU
        area_mm2: 0.10
        basis: |
          Even smaller than flagship LSU (no MatE schedule, no DMA descriptor
          chains; just KV-staging + scoring sequencing).
      - block: SRAM_kv_scratchpad
        size_mb: 1.5
        area_mm2: 1.40
        basis: |
          1.5 MB at 1.25 MB/mm² HD 1-port = 1.2 mm² + ~0.2 mm² compiler overhead
          (BIST + sense amps + decoders). Conservative.
      - block: codebook_ROM_const
        area_mm2: 0.04
      total_compute_and_memory_mm2: 2.04
    headroom_mm2: 0.36
    headroom_pct: 9
    verdict: feasible_with_modest_headroom

# -----------------------------------------------------------------------------
# Process — same as flagship; reference for shared constants
# -----------------------------------------------------------------------------
process:
  inherits_from_doc: archs/Lambda_25mm2.yaml#/process
  notes: |
    All process constants are the same as the flagship Lambda (TSMC N16FFC,
    28.2 MTr/mm², 1.25 MB/mm² HD 1-port SRAM, 0.8 V core, 1 GHz target). The
    only difference is the absence of LPDDR5X PHY (eliminating that single
    largest area uncertainty) and the use of a smaller serial host interface
    instead of PCIe.

# -----------------------------------------------------------------------------
# Target workload — what this coprocessor actually does
# -----------------------------------------------------------------------------
target_workload:
  primary_use_case: |
    KV cache + compressed-domain attention scoring coprocessor. Pairs with a
    host that runs the rest of the transformer (MatE-equivalent compute, FFN,
    sampling, weight management). Host sends K and V vectors as MatE produces
    them; Lambda v1 compresses (TurboQuant 3.5b), stores in 1.5 MB on-die SRAM,
    and answers attention-score queries from the host's Q vectors.

  primary_market: |
    CPU-only LLM inference (llama.cpp, ollama, transformers.js users). Memory-
    bandwidth-bound by DDR4/DDR5 system memory (25-50 GB/s). Lambda v1
    bypasses DRAM for the hot KV working set, providing 4-8× effective memory
    BW reduction on the attention-scoring critical path. Same thesis as
    LASSO on SKY130, but at 16nm with ~10× more on-die KV capacity and
    1 GHz compute.

  not_a_use_case:
    - GPU-paired inference (GPU's 360+ GB/s VRAM beats serial-bus traffic)
    - End-to-end model serving (host must do compute; Lambda v1 is not a
      transformer accelerator)
    - Long-context (>2K tokens) without tile-streaming from host

  capacity_math:
    per_token_kv_bytes_at_3_5b_8kv_heads_128dim: 896           # bytes/token/layer
    sram_capacity_mb: 1.5
    single_layer_hot_tokens: 1675                              # 1.5 MB / 896
    all_layer_hot_tokens_at_32_layers: 52                      # 1.5 MB / 28672
    interpretation: |
      For a Llama-3-8B-class model (32 layers, 8 KV heads, 128 dim): 1,675
      single-layer hot tokens means the chip can hold the FULL KV for one layer
      at ~1500-token context entirely on-die during that layer's attention.
      The host walks layers serially, fetching each layer's KV from Lambda v1
      via the serial host link.

      52 all-layer hot tokens is the persistent recent-window — enough for
      attention sinks (StreamingLLM-style) but not for substantive context.

# -----------------------------------------------------------------------------
# Memory hierarchy
# -----------------------------------------------------------------------------
memory_hierarchy:
  off_chip_dram: NONE                                          # the headline architectural choice
  on_chip_sram:
    total_target_mb: 1.5
    organization: single_bank
    banks:
      - id: kv_scratchpad
        size_mb: 1.5
        purpose: |
          Compressed KV staging. Holds one layer's hot tokens for active
          attention scoring; older tokens stream from host on demand.
        bandwidth_gb_s: 64                                     # at 1 GHz, 64-byte access
        latency_cycles: 1
        port_count: 1
      - id: codebook_const_rom
        size_kb: 64
        purpose: |
          TurboQuant Lloyd-Max centroids + Hadamard scaling constants. Same
          contents as flagship Lambda KCE.
        port_count: 1

  bandwidth_to_host:
    interface: serial_lvds_or_usb_c
    sustained_bandwidth_gb_s: 4
    bandwidth_basis: |
      USB-C 3.2 Gen 2x2 = 20 Gbps = 2.5 GB/s sustained, or 4-lane LVDS at
      2.5 Gbps/lane = 10 Gbps = 1.25 GB/s. Choose interface to clear ~4 GB/s
      sustained. PCIe Gen3 x4 (4 GB/s) is the architectural reference point;
      we approach the same speed with a smaller-footprint serial.
    notes: |
      The KV-coprocessor model is host-side latency-tolerant. Q/K/V vectors
      are kilobytes per token; transfer time is ~10s of microseconds even at
      4 GB/s. Bandwidth is not the bottleneck; on-die KV access pattern is.

# -----------------------------------------------------------------------------
# Functional blocks
# -----------------------------------------------------------------------------
blocks:

  - id: kv_compression_engine
    name: KV Compression Engine (KCE) — TurboQuant
    function: |
      Identical algorithm to flagship Lambda KCE. Walsh-Hadamard rotation,
      Lloyd-Max codebook, bit-pack 3-bit, inverse path on read. Same RTL.
    inherits_from: archs/lasso/LASSO_A3plus_turboquant_extended.yaml
    operating_modes:
      - turboquant_3bit
      - hadamard_int4_fallback
      - bypass_fp16
      - fp4_codebook                                           # NVFP4 levels in alt ROM
    area_mm2: 0.15
    verification_tests: 80
    risk: low                                                  # algorithm verified at 130nm by then

  - id: compressed_domain_attention
    name: Compressed-Domain Attention Scoring Unit (CDAS)
    function: |
      Computes Q·K^T scores against compressed-domain K (no full dequant).
      For symmetric quantization, score = scale × Σ Q[i] × K_q[i] — a 32-lane
      INT8×INT3 dot product is sufficient. Scale applied at the row sum.
      Online-softmax accumulator for numerical stability.
    microarchitecture:
      lane_count: 32
      lane_op: INT8 × INT3 → INT11 partial product
      reduction: Wallace tree → INT16 sum → multiply by FP16 scale
      softmax_unit: 1 instance, 32-lane online-softmax (m_i, l_i registers)
    area_mm2: 0.15
    area_breakdown_mm2:
      dot_product_32_lane: 0.05
      reduction_tree: 0.03
      scale_multiplier: 0.02
      softmax_online: 0.05
    verification_tests: 35                                     # mostly carryover from LASSO A3+ extended
    risk: medium                                               # compressed-domain math correctness vs PyTorch ref

  - id: memory_subsystem_controller
    name: Memory Subsystem Controller (MSC) — minimal
    function: |
      Block-table TLB for vLLM-style paged KV; arbitrate access between KCE
      writes, CDAS reads, and host serial port. No LPDDR controller.
    microarchitecture:
      block_table_entries: 256                                 # 16 tokens/block × 256 = 4096-token capacity
      block_size_tokens: 16
      page_table_in_sram: true
      hw_features:
        - dma_descriptor_fsm                                   # for serial-bus traffic
        - request_arbitration_pq
    area_mm2: 0.20
    verification_tests: 40
    risk: low                                                  # simpler than flagship MSC (no LPDDR)

  - id: layer_sequencer
    name: Layer Sequencer (LSU) — minimal
    function: |
      Coordinates KCE compress/decompress and CDAS scoring. Reads simple
      command stream from host; emits dispatch signals to KCE and CDAS.
      No model program (host owns the model schedule); no DMA descriptor
      chain compiler.
    area_mm2: 0.10
    microcode_capacity: 2k_instructions
    verification_tests: 25
    risk: low

  - id: host_interface
    name: Serial Host Interface (sHIF)
    function: |
      Single-lane USB-C 3.2 Gen 2x2 OR 4-lane LVDS-class serial. Receives
      Q/K/V vectors; returns scores or compressed-KV reads. CSR access for
      configuration. JTAG + scan chain for debug.
    bandwidth_gb_s: 4
    area_mm2: 0.50
    verification_tests: 50                                     # serial protocol IP integration
    risk: medium                                               # depends on chosen serial standard

# -----------------------------------------------------------------------------
# Top-level area accounting & floorplan
# -----------------------------------------------------------------------------
top_level:
  die_area_target_mm2: 4.0
  die_area_target_mm2_basis: |
    IMEC / Europractice mini@sic 2.0 TSMC 16nm minimum block area for academic Full Block. Pricing is non-public; estimated $60-100K via Europractice academic-discount path. Muse Semiconductor US-equivalent reference: ~$75K (@$18,750/mm² × 4 mm²). Re-quote both vendors in 2026.
  area_accounting_mm2:
    kv_compression_engine: 0.15
    compressed_domain_attention: 0.15
    memory_subsystem_controller: 0.20
    layer_sequencer: 0.10
    host_interface_serial: 0.50
    sram_kv_scratchpad_1_5mb: 1.40
    codebook_const_rom_64kb: 0.04
    io_ring_pads_esd: 0.70
    clock_tree_power_grid: 0.30
    routing_overhead_buffer: 0.10
    total_mm2: 3.64
    headroom_mm2: 0.36
    die_utilization_pct: 91
  area_status: WITHIN_BUDGET_with_modest_headroom

  shrink_paths:
    - id: shrink_sram_to_1mb
      saves_mm2: 0.5
      cost: KV scratchpad drops to ~1100 single-layer hot tokens; OK for short context only
    - id: drop_compressed_domain_scoring
      saves_mm2: 0.15
      cost: |
        Becomes pure KV compression coprocessor; host must dequantize K and
        do scoring. Loses the compressed-domain research story.
      not_recommended: true                                    # CDAS is half the research point

# -----------------------------------------------------------------------------
# Quantization strategy — same as flagship for KV path
# -----------------------------------------------------------------------------
quantization_strategy:
  inherits_from_doc: archs/Lambda_25mm2.yaml#/quantization_strategy/kv_cache
  weights: NOT_APPLICABLE                                      # host owns weights
  activations: NOT_APPLICABLE                                  # host owns FFN
  kv_cache:
    primary: turboquant_3bit_with_hadamard_rotation
    secondary: hadamard_int4
    bypass: fp16
    fp4_codebook_mode: optional                                # alt ROM contents; CSR-selectable
  attention_compute:
    primary: int8_q_x_int3_compressed_domain_with_fp16_softmax
    notes: Compressed-domain Q·K^T avoids full dequant; same as LASSO A3+ Mode B

# -----------------------------------------------------------------------------
# Performance targets — derived
# -----------------------------------------------------------------------------
performance_targets:

  kv_throughput_compress:
    target_tokens_per_sec: 1_000_000_000                       # 1 GHz × 1 vector/cycle = 1B vec/sec
    derivation: |
      KCE consumes one 32-element vector per cycle at 1 GHz. For 8 KV heads ×
      128 dim per token, that's 32 cycles to compress one full token's KV.
      Throughput = 1 GHz / 32 = 31.25M tokens/sec — vastly more than any
      transformer needs. Not a bottleneck.

  attention_scoring_throughput:
    target_scores_per_sec: 31_250_000                          # 1 GHz / 32 cycles per dot
    derivation: |
      CDAS does 32-lane dot product per cycle. For 128-dim Q·K^T: 4 cycles
      per score. At 1 GHz that's 250M scores/sec. For 8B-class model with
      4K context and 32 query heads: 4096 × 32 = 131K scores per token
      attention pass. Time per pass: 131K / 250M = 524 µs. Negligible.
    bottleneck: |
      The actual bottleneck is the host serial bandwidth (4 GB/s) feeding
      Q vectors and consuming scores. At 4 GB/s and ~520 bytes per Q vector
      (32 query heads × 128 dim × FP16 / 8), serial round-trip dominates.
      Lambda v1 is host-bandwidth-bound, not compute-bound.

  effective_speedup_vs_cpu_only:
    target_factor: 4_to_8x
    derivation: |
      CPU-only inference on a 7B model with 4K context at FP16 KV reads ~540
      MB of cache per token from system DRAM (~13.5 ms at 40 GB/s DDR4). At
      TurboQuant 3.5b that becomes ~120 MB → 3 ms. With Lambda v1 holding
      compressed KV on-die, the HOST CPU never reads compressed KV from DRAM
      — Lambda v1 answers scoring queries directly. Saved: ~10 ms of DRAM
      traffic per token, plus actual scoring compute. Net: ~4-8× speedup on
      the attention-scoring portion of CPU-only inference.
    sensitivity: |
      Depends on the host's compute headroom for FFN/MLP (where Lambda v1
      doesn't help). At batch 1 with 7B model on a modern x86, CPU is
      ~88% memory-stalled per token; halving cache traffic claws back ~4×
      end-to-end inference latency. At batch 8+, memory amortizes and the
      relative speedup drops to ~2×.

  power_budget:
    target_watts: 3
    target_watts_basis: |
      No LPDDR PHY (-3 W vs flagship), no PCIe (-1 W), no MatE (-3 W),
      no big VecU (-1 W). What's left: KCE + CDAS + 1.5 MB SRAM + serial
      host iface ≈ 3 W. USB-C class power envelope.
    estimate: true

# -----------------------------------------------------------------------------
# Verification
# -----------------------------------------------------------------------------
verification:
  total_tests_estimated: 230
  breakdown_by_block:
    kce: 80                                                    # carryover from LASSO A3+
    cdas: 35
    msc_minimal: 40
    lsu_minimal: 25
    serial_host_iface: 50
  reuse_from_lasso: ~80%                                       # KCE is direct port
  effective_new_tests: ~140
  estimated_person_months_at_student_velocity: ~22
  notes: |
    Verification load is significantly lower than flagship Lambda (~280
    effective new tests) because: no MatE (the heaviest verif), no big VecU,
    no LPDDR PHY integration, no PCIe IP integration. KCE is the long pole
    and most of it carries from LASSO A3+ verification.

# -----------------------------------------------------------------------------
# Cost
# -----------------------------------------------------------------------------
cost_analysis:
  shuttle_cost_estimate_usd: 75_000
  shuttle_cost_basis: |
    IMEC / Europractice mini@sic 2.0 TSMC 16nm Full Block, 4 mm². Estimated $60-100K via Europractice academic-discount path; Muse Semiconductor US-equivalent is ~$75K (@$18,750/mm² × 4 mm²).
    Reconfirm with direct quote: IMEC primary path via eptsmc@imec.be; Muse US fallback at musesemi.com.
  shuttle_cost_estimate_risk: |
    Could be 1.5-2× higher if 16nm pricing has shifted upward, or if Full
    Block minimum has increased above 4 mm² (some Muse tiers do not include
    the smallest size).
  ip_licensing_cost_estimate_usd: 0_to_50_000
  ip_licensing_basis: |
    No PCIe PHY (saves ~$50K license). No LPDDR PHY (saves ~$100K license).
    Serial USB-C / LVDS PHYs are typically much cheaper or open. Total IP
    licensing should be < $50K.
  total_chip_cost_usd: 75_000_to_125_000
  vs_flagship_cost: roughly 1/5 of flagship Lambda

# -----------------------------------------------------------------------------
# Comparison to alternatives
# -----------------------------------------------------------------------------
prior_art_comparison:
  vs_lasso_sky130:
    lasso_node: SkyWater 130nm
    lasso_die_mm2: 10.28
    lasso_kv_capacity_2bit_4head: ~2048_tokens
    lasso_clock_mhz: 50
    lambda_pico_differentiator: |
      Same architectural thesis as LASSO; ~28× density and 10-20× clock at
      16nm means: 1.5 MB SRAM (vs LASSO's 0.5 MB) at 1 GHz (vs 50 MHz),
      hosts ~10× more KV at 32× the throughput, in 40% the die area. Adds
      compressed-domain attention scoring (LASSO had this only as a stretch
      goal). First-silicon TurboQuant at 16nm.

  vs_lambda_flagship_25mm2:
    flagship_die_mm2: 25
    flagship_workload: 7-8B end-to-end transformer inference
    pico_workload: KV compression + attention scoring coprocessor (host runs the model)
    differentiator: |
      Lambda v1 is NOT a transformer accelerator. It is a coprocessor that
      makes CPU-only LLM inference much faster on a memory-bandwidth-bound
      workload. The flagship runs the model end-to-end; pico requires a host.

# -----------------------------------------------------------------------------
# Architecture-specific risks
# -----------------------------------------------------------------------------
risks:

  - id: R-Lpico-01
    severity: high
    description: Use case requires modifying a CPU-only inference stack to offload KV+scoring to a coprocessor
    evidence: |
      No existing inference stack (llama.cpp, ollama, vLLM-CPU) has an
      abstraction for offloading KV management to a separate device. A Linux
      driver + llama.cpp backend integration is a real software project
      (~3-6 person-months).
    mitigation: |
      (a) Treat the software work as the chip's go-to-market dependency.
      (b) An FPGA prototype of the same RTL can demonstrate the speedup before
      silicon return — software engineering can begin with the FPGA prototype.
      (c) Open-source the backend integration alongside the silicon.

  - id: R-Lpico-02
    severity: medium
    description: IMEC mini@sic 2.0 / Muse 4 mm² minimums may have shifted in 2026
    evidence: |
      The $18,750/mm² × 4 mm² = $75K Muse data point may be stale; IMEC pricing is non-public. Both vendor pricing
      tiers and minimums shift each year.
    mitigation: |
      Get written quotes for 4 mm² N16FFC Full Block: IMEC / Europractice (primary) and Muse Semiconductor (US fallback) in Q2 2026 before
      committing. If 4 mm² minimum is no longer offered at either vendor, the chip cannot be built at this budget; reconsider scope.

  - id: R-Lpico-03
    severity: medium
    description: Serial host interface choice affects timing and integration
    evidence: |
      USB-C, LVDS, and 1-lane PCIe Gen3 each have different licensing,
      verification, and host-driver implications. PCIe is most universal but
      consumes more area; USB-C is consumer-friendly but adds an internal PHY;
      LVDS is custom but cheapest.
    mitigation: |
      Decision deferred to v0.2. Default plan: USB-C 3.2 for ease of host
      pairing with any modern PC.

  - id: R-Lpico-04
    severity: low
    description: KCE inheritance from LASSO depends on LASSO-RTL maturity
    evidence: |
      If the LASSO 130nm tape-out has not happened or has not converged on a
      working KCE design by the time Lambda v1 needs it, the inheritance
      story weakens.
    mitigation: |
      KCE has been spec'd in YAML and the algorithm is well-validated; even if
      LASSO is not back from fab, the RTL can be lifted from LASSO's Github
      and re-verified at 16nm in commercial flow.

# -----------------------------------------------------------------------------
# When this tier is the right choice
# -----------------------------------------------------------------------------
recommendation:
  status: PROPOSED_AS_OPTIONAL_RESEARCH_VEHICLE
  one_line: |
    Build Lambda v1 if (a) flagship Lambda funding falls through, OR (b) the
    team wants a faster first-silicon win that proves the KCE block in 16nm
    before committing to the full 25 mm² flagship.

  when_to_choose_lambda_pico:
    - Flagship Lambda shuttle cost ($400-500K?) is unfundable
    - Team needs a near-term silicon return for credibility/recruiting before flagship
    - Research story is "first-silicon TurboQuant + compressed-domain attention" — sufficient as a paper
    - Customer/sponsor interest is in CPU-paired KV compression, not end-to-end inference

  when_to_NOT_choose_lambda_pico:
    - Funding for flagship is in hand
    - Customer interest is end-to-end transformer inference (Lambda v1 cannot serve a model)
    - Software stack work to integrate a KV coprocessor is unfunded
    - Team capacity is sufficient for the flagship

  why_proceed: |
    Lambda v1 is a defensible academic artifact at the lowest possible cost.
    Even if the flagship is the desired target, the silicon-return time and
    cost of Lambda v1 make it a credible first-step that de-risks the
    flagship by proving KCE in 16nm.

  next_concrete_steps:
    - 1_decide_whether_to_pursue:
        owner: architecture_lead + faculty_advisor
        deliverable: explicit go/no-go on Lambda v1 vs flagship-only path
        deadline: 2026-06
    - 2_quote_muse_4mm2:
        owner: architecture_lead
        deliverable: written IMEC / Europractice quote (primary) and Muse Semiconductor quote (fallback) for 4 mm² N16FFC Full Block
        deadline: 2026-05
    - 3_choose_serial_host_iface:
        owner: rtl_lead
        deliverable: USB-C vs LVDS vs simple-PCIe decision
        deadline: 2026-07

# -----------------------------------------------------------------------------
# Open questions
# -----------------------------------------------------------------------------
open_questions:
  - id: Q-Lpico-01
    question: |
      Should compressed-domain attention scoring be in the chip, or just KV
